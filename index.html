<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linjekontroll v11</title>

<style>
body {
    font-family: Arial;
    background:#f4f4f4;
    margin:0;
}

.container {
    max-width:520px;
    margin:auto;
    padding:12px;
}

/* INPUT */
input {
    width:100%;
    padding:14px;
    margin:6px 0;
    font-size:18px;
}

/* KONTROLLPUNKT */
.kontroll {
    width:100%;
    padding:18px;
    margin:8px 0;
    border:none;
    border-radius:12px;
    background:#2e7d32;
    color:white;
    font-size:18px;
}

/* AVVIK */
.avvik button {
    width:100%;
    padding:14px;
    margin:4px 0;
    border:none;
    border-radius:10px;
    background:#e0e0e0;
    font-size:16px;
}

/* KAMERA */
.kamera {
    width:100%;
    padding:16px;
    margin-top:6px;
    border:none;
    border-radius:10px;
    background:#43a047;
    color:white;
    font-size:18px;
}

/* MERKNAD */
textarea {
    width:100%;
    padding:12px;
    margin-top:6px;
    font-size:16px;
}

.hidden { display:none; }

.mastok {
    background:#66bb6a;
    color:white;
    font-size:18px;
    padding:16px;
    border:none;
    border-radius:12px;
    width:100%;
    margin:8px 0;
}

</style>
</head>

<body>

<div class="container">

<h2 style="text-align:center;">Linjekontroll v11</h2>

<input placeholder="Netteier">
<input placeholder="LinjeID">
<input placeholder="Mast nr">

<button id="mastok" class="mastok" onclick="mastOK()">✔ Mast OK</button>

<div id="liste"></div>

<button class="kontroll" onclick="lagre()">Lagre mast</button>
<button class="kontroll" onclick="nyMast()">Ny mast</button>

</div>

<script>

const data = {};

const kontrollpunkter = {
"Skjev mast/fundament":["Skjev"],
"Barduner":["Anvisere defekt","Slakk","Rust"],
"Stolper":["Råte","Sprekk"],
"Stålmast":["Armering synlig","Fundament erodert","Fundament oppsprukket"],
"Topphette":["Mangler","Defekt"],
"Traversfeste":["Defekt","Sprukket"],
"Travers":["Skade","Mosegrodd","Skjev"],
"Isolatorfeste":["Slitasje","Rust"],
"Isolator":["Sprukket","Knust","Krypestrømsvei"],
"Bendsling":["Korrosjon","Løs"],
"Liner":["Korrosjon","Kordelbrudd"],
"Strekking":["Skjev","Lav høyde"],
"Skjøter/klemmer":["Korrodert","Varmgang","Tape i klemme"],
"Topp/jordline":["Korrosjon","Beslag rust"],
"Jordinger":["Brudd","Løs"],
"Trasé":["Kratt","Sideskog","Underskog"],
"Merking":["Hinderlys","HS mangler","Mnr mangler","Farvannskilt"]
};

const container = document.getElementById("liste");

Object.keys(kontrollpunkter).forEach(navn => {

    let wrapper = document.createElement("div");

    let knapp = document.createElement("button");
    knapp.className = "kontroll";
    knapp.innerText = navn;

    let avvikDiv = document.createElement("div");
    avvikDiv.className = "avvik hidden";

    kontrollpunkter[navn].forEach(avvik => {
        let b = document.createElement("button");
        b.innerText = avvik;

        b.onclick = () => {
            knapp.style.background = "#c62828"; // 🔴 kontrollpunkt blir rødt
            data[navn] = avvik;
            avvikDiv.classList.add("hidden");
        };

        avvikDiv.appendChild(b);
    });

    let kamera = document.createElement("input");
    kamera.type = "file";
    kamera.accept = "image/*";
    kamera.capture = "environment";
    kamera.className = "kamera hidden";

    let merknad = document.createElement("textarea");
    merknad.placeholder = "Merknad";
    merknad.classList.add("hidden");

    knapp.onclick = () => {
        avvikDiv.classList.toggle("hidden");
        kamera.classList.toggle("hidden");
        merknad.classList.toggle("hidden");
    };

    wrapper.appendChild(knapp);
    wrapper.appendChild(avvikDiv);
    wrapper.appendChild(kamera);
    wrapper.appendChild(merknad);

    container.appendChild(wrapper);
});

function mastOK(){
    document.getElementById("mastok").style.background = "#2e7d32";
}

function lagre(){
    alert("Lagring kommer i Excel neste steg");
}

function nyMast(){
    document.querySelectorAll("textarea").forEach(t=>t.value="");
    document.querySelectorAll(".kontroll").forEach(k=>{
        k.style.background="#2e7d32";
    });
}

</script>

</body>
</html>
