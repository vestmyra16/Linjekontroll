<!DOCTYPE html>

<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Linjekontroll v2.25</title>

<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {font-family: Arial; max-width: 500px; margin:auto; padding:10px;}
input {width:100%; padding:10px; margin:5px 0;}

.btn {
  width:100%;
  padding:14px;
  margin:6px 0;
  border:none;
  border-radius:8px;
  font-size:16px;
  text-align:left;
}

.gronn {background:#2e7d32; color:white;}
.rod {background:#c62828; color:white;}
.graa {background:#ddd; color:black;}

.skult {display:none;}
</style>

</head>

<body>

<h2>Linjekontroll v2.25</h2>

<label>Netteier</label> <input id="netteier">

<label>LinjeID</label> <input id="linje">

<label>Mast nr</label> <input id="mast">

<div id="gps"></div>

<button class="btn gronn" onclick="nyMast()">Ny mast</button>

<button class="btn gronn" onclick="mastOK()">
Ingen synlige avvik - Mast OK
</button>

<div id="kontrollpunkter"></div>

<button class="btn gronn" onclick="lagre()">Lagre</button> <button class="btn gronn" onclick="excel()">Last ned Excel</button>

<input type="file" id="kamera" accept="image/*" capture="environment" class="skult">

<script>

let data = [];
let bilder = {};
let aktiv = {};

navigator.geolocation.getCurrentPosition(pos=>{
 document.getElementById("gps").innerText =
 "GPS: "+pos.coords.latitude.toFixed(5)+", "+pos.coords.longitude.toFixed(5);
});

const punkter = {

"Skjev mast/fundament":["Skjev","Setning","Fundament feil"],
"Barduner":["Slakk","Brudd","Rust"],
"Stolper":["Råte","Sprekk"],

"Stålmast":["Fundamentfeil","Rust"],
"Topphette":["Mangler","Defekt"],
"Traversfeste":["Sprukket","Defekt"],
"Travers":["Skade","Mosegrodd"],
"Isolatorfeste":["Slitasje","Rust"],
"Toppline":["Korrodert"],

"Isolator":["Knust","Krypestrøm"],
"Bendsling, heng, avspenning":["Løs","Brudd"],
"Liner":["Kordelbrudd","Korrosjon"],
"Strekking":["Skjev"],
"Skjøter/klemmer":["Korrosjon","Brudd"],
"Topp/jordline og beslag":[],
"Jordinger":["Løs","Brudd"],
"Trasé":["Skog","Kratt"],
"Merking":["HS mangler","Mnr mangler"]

};

const container = document.getElementById("kontrollpunkter");

for(let p in punkter){

 let btn = document.createElement("button");
 btn.className="btn gronn";
 btn.innerText=p;
 btn.onclick=()=>toggle(p,btn);
 container.appendChild(btn);

 let div=document.createElement("div");
 div.id="div_"+p;
 div.className="skult";

 punkter[p].forEach(a=>{
   let b=document.createElement("button");
   b.className="btn graa";
   b.innerText=a;

   b.onclick=()=>{
     b.classList.toggle("rod");
     registrer(p,a);
     btn.classList.add("rod");
   };

   div.appendChild(b);
 });

 let cam=document.createElement("button");
 cam.className="btn graa";
 cam.innerText="📷 Ta bilde";
 cam.onclick=()=>kamera(p);
 div.appendChild(cam);

 let merknad=document.createElement("input");
 merknad.placeholder="Merknad";
 merknad.onchange=()=>registrer(p,"Merknad: "+merknad.value);
 div.appendChild(merknad);

 container.appendChild(div);
}

function toggle(p){
 document.getElementById("div_"+p).classList.toggle("skult");
}

function registrer(p,a){
 data.push({
  netteier:netteier.value,
  linje:linje.value,
  mast:mast.value,
  punkt:p,
  avvik:a,
  bilde:bilder[p]||""
 });
}

function mastOK(){
 data.push({
  netteier:netteier.value,
  linje:linje.value,
  mast:mast.value,
  punkt:"Mast OK",
  avvik:"Ingen",
  bilde:""
 });
 alert("Mast OK registrert");
}

function kamera(p){
 aktiv.punkt=p;
 document.getElementById("kamera").click();
}

document.getElementById("kamera").addEventListener("change", e=>{
 let file=e.target.files[0];
 let reader=new FileReader();

 reader.onload=ev=>{
   bilder[aktiv.punkt]=ev.target.result;
   alert("Bilde lagret ✔");
 };

 reader.readAsDataURL(file);
});

function nyMast(){
 mast.value="";
 data=[];
 bilder={};

 document.querySelectorAll(".rod").forEach(e=>e.classList.remove("rod"));
 document.querySelectorAll(".skult").forEach(e=>e.classList.add("skult"));
}

function lagre(){
 localStorage.setItem("linjeData",JSON.stringify(data));
 alert("Lagret ✔");
}

function excel(){
 let ws=XLSX.utils.json_to_sheet(data);
 let wb=XLSX.utils.book_new();
 XLSX.utils.book_append_sheet(wb,ws,"Rapport");
 XLSX.writeFile(wb,"Linjekontroll.xlsx");
}

</script>

</body>
</html>
