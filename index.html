<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Linjekontroll</title>

<style>
body {
  font-family: Arial;
  margin:0;
  background:#f4f4f4;
}

.header {
  background:#fff;
  padding:10px;
  border-bottom:3px solid #2e7d32;
}

h1 {
  margin:0 0 10px 0;
  font-size:20px;
}

/* 🔥 NY – label over felt */
.label {
  font-weight:bold;
  color:#000;
  margin-top:8px;
}

/* INPUT */
input {
  width:100%;
  padding:12px;
  margin-top:2px;
  font-size:16px;
  color:#000;
  background:#fff;
  border:2px solid #444;
}

input::placeholder {
  color:#999;
}

/* BUTTON */
.btn {
  width:100%;
  padding:14px;
  margin:4px 0;
  border:none;
  border-radius:6px;
}

.green { background:#2e7d32; color:white; }
.lightgreen { background:#66bb6a; color:white; }
.red { background:#c62828; color:white; }
.gray { background:#e0e0e0; color:black; }

.section { margin:6px; }
.inner { display:none; }

textarea {
  width:100%;
  height:60px;
}
</style>
</head>

<body>

<div class="header">
  <h1>Linjekontroll v1.23</h1>

  <div class="label">Netteier</div>
  <input id="netteier" placeholder="Skriv netteier">

  <div class="label">LinjeID</div>
  <input id="linje" placeholder="Skriv linje">

  <div class="label">Mast nr</div>
  <input id="mast" placeholder="Skriv mast nr">

  <div id="gps">GPS: henter...</div>
</div>

<button class="btn lightgreen" onclick="mastOK()">Mast OK</button>

<div id="kontroll"></div>

<button class="btn gray" onclick="nesteMast()">Neste mast</button>

<script>

/* GPS */
navigator.geolocation.getCurrentPosition(pos=>{
  document.getElementById("gps").innerText =
  "GPS: " + pos.coords.latitude.toFixed(5) + ", " + pos.coords.longitude.toFixed(5);
});

/* DATA */
const data = {
"Skjev mast":["Skjev","Setning","Fund.feil"],
"Barduner":["Slakk","Brudd","Rust"],
"Stolper":["Råte","Sprekk"],
"Stålmast":["Korrosjon","Skade"],
"Topphatte":["Mangler","Skadet"],
"Traversfeste":["Løs","Skade"],
"Travers":["Skjev","Skade"],
"Isolatorfeste":["Slitasje","Skade"],
"Isolator":["Knust","Krypestrømsvei"],
"Bendsling":["Løs","Brudd"],
"Liner":["Korrosjon","Kordelbrudd"],
"Strekking":["Skjev"],
"Skjøter/Klemmer":["Korrodert"],
"Toppline":["Slakk","Korrosjon"],
"Jordinger":["Løs","Brudd"],
"Trasé":["Skog","Kratt"],
"Merking":[]
};

const container = document.getElementById("kontroll");

/* UI */
function lagUI(){
  container.innerHTML="";

  for(let key in data){

    let div=document.createElement("div");
    div.className="section";

    let hoved=document.createElement("button");
    hoved.className="btn green";
    hoved.innerText=key;

    hoved.onclick=()=>{
      inner.style.display = inner.style.display==="block" ? "none":"block";
    };

    div.appendChild(hoved);

    let inner=document.createElement("div");
    inner.className="inner";

    data[key].forEach(avvik=>{
      let b=document.createElement("button");
      b.className="btn gray";
      b.innerText=avvik;

      b.onclick=()=>{
        hoved.classList.remove("green");
        hoved.classList.add("red");
      };

      inner.appendChild(b);
    });

    /* BILDE */
    let cam=document.createElement("input");
    cam.type="file";
    cam.accept="image/*";
    cam.capture="environment";
    cam.multiple=true;
    cam.style.display="none";

    cam.onchange=()=>{
      if(cam.files.length>0){
        hoved.classList.remove("green");
        hoved.classList.add("red");
      }
    };

    let camBtn=document.createElement("button");
    camBtn.className="btn gray";
    camBtn.innerText="📸 Ta bilde";
    camBtn.onclick=()=>cam.click();

    inner.appendChild(camBtn);
    inner.appendChild(cam);

    /* MERKNAD */
    let txt=document.createElement("textarea");
    txt.placeholder="Merknad";

    txt.oninput=()=>{
      if(txt.value.length>0){
        hoved.classList.remove("green");
        hoved.classList.add("red");
      }
    };

    inner.appendChild(txt);

    div.appendChild(inner);
    container.appendChild(div);
  }
}

/* FUNKSJONER */
function mastOK(){
  document.querySelectorAll(".section button:first-child").forEach(b=>{
    b.classList.remove("green","red");
    b.classList.add("lightgreen");
  });
}

function nesteMast(){

  let netteier = document.getElementById("netteier").value;
  let linje = document.getElementById("linje").value;

  lagUI();

  document.getElementById("netteier").value = netteier;
  document.getElementById("linje").value = linje;
  document.getElementById("mast").value = "";
}

lagUI();

</script>

</body>
</html>
