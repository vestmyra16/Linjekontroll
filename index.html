    <style>
        body {

        button {
            width:100%; padding:20px; margin-top:10px; border:none; border-radius:12px; 
            font-size:18px; font-weight:bold; touch-action: manipulation; cursor: pointer;
        }
        .kp {background:#2e7d32; color:white;}
        .kp.ok { background:#66bb6a; }
        .kp.avvik { background:#c62828; }
        .avvik {background:#ccc; color:#000; margin-top:5px;}
        .avvik.valgt { background:#ef9a9a; border: 2px solid #c62828; font-weight: bold; }
        .avvik.valgt-ok { background:#a5d6a7; border: 2px solid #2e7d32; font-weight: bold; }
        .green {background:#2e7d32; color:white;}
        .lightgreen {background:#4caf50; color:white; margin-bottom: 20px; border: 3px solid #1b5e20;}
        .darkgreen {background:#1b5e20; color:white;}
        .blue-btn { background:#0284c7; color: white; border: 2px solid #0369a1; }
        .report-btn { background:#f57c00; color: white; border: 2px solid #e65100;}
        
        #loginBox { max-width:400px; margin:60px auto; padding:25px; background:#fff; border:1px solid #ccc; border-radius:12px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .skjult { display: none !important; }

        .stolpe-valg-boks {
            background: #fff; border: 2px dashed #c62828; border-radius: 8px; padding: 10px; margin-top: 5px; box-sizing: border-box;
        }
        .stolpe-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px; margin-top: 5px; }
        .stolpe-grid button { padding: 12px 2px; font-size: 14px; margin-top: 0; background: #eee; color: #000; border: 1px solid #ccc; border-radius: 6px; }
        .stolpe-grid button.aktiv { background: #c62828; color: white; font-weight: bold; border-color: #c62828; }
        .dyplenke-knapp { background: #2e7d32; color: white; text-decoration: none; display: block; text-align: center; padding: 15px; margin-top: 10px; border-radius: 8px; font-weight: bold; font-size: 16px; box-sizing: border-box; }
        
        .kp-rad { display: flex; gap: 6px; margin-top: 10px; width: 100%; box-sizing: border-box; }
        .kp-rad button.kp { margin-top: 0; flex-grow: 1; width: auto; }
        .help-btn { margin-top: 0 !important; width: 60px !important; padding: 0 !important; background: #0284c7 !important; color: white !important; border: none !important; border-radius: 12px !important; font-size: 20px !important; display: flex !important; align-items: center !important; justify-content: center !important; cursor: pointer; flex-shrink: 0; }

            #printSone { display: block !important; }
            .page { background: white; width: 100%; padding: 20px; box-sizing: border-box; }
            h2 { color: #2e7d32; border-bottom: 2px solid #2e7d32; padding-bottom: 10px; margin-top: 0; }
            h3 { color: #333; border-bottom: 1px solid #ccc; padding-bottom: 5px; }
            table { border-collapse: collapse; width: 100%; margin-top: 15px; font-size: 14px; }
            th, td { border: 1px solid #cbd5e1; padding: 10px; text-align: left; }
            th { background: #f8fafc; font-weight: bold; }
            .status-ok { color: #166534; font-weight: bold; }
            .status-avvik { color: #b91c1c; font-weight: bold; }
        }
    </style>
</head>
<body>
<div class="vannmerke">Kun for autorisert bruk - Vestmyra16</div>

<div id="loginBox" class="no-print">
    <h3 style="color: #2e7d32; margin-bottom: 10px;">Sikker Sone</h3>
    <p style="font-size: 14px; color: #555; margin-bottom: 20px;">Vennligst logg inn med din bedriftsbruker for å få tilgang til Linjekontroll.</p>
    <div data-netlify-identity-button></div>
</div>

<div id="containerApp" class="container skjult no-print">
    <h2>Linjekontroll v28.3</h2>
    <button class="lightgreen" onclick="nyttAnlegg()">➕ NYTT ANLEGG / ENDRE ANLEGG</button>
    <label>Netteier</label> <input id="netteier">
    <label>LinjeID</label> <input id="linje">
    <label>Kontrollert av:</label> <input id="kontrollor" oninput="lagreKontrollor()" placeholder="F.eks. Ola Nordmann">
    <label>Dato kontrollert:</label> <input type="text" id="datoKontrollert" readonly style="background: #eec; font-weight: bold; text-align: center; color: #333;">
    <hr style="margin:20px 0;">
    <label>Mast nr</label> <input id="mast">
    <label>Mast type</label>
    <select id="mastType" onchange="sjekkMastType(this.value)">
        <option value="E">E</option>
        <option value="H" selected>H</option>
        <option value="DH">DH</option>
        <option value="3H">3H</option>
        <option value="2A">2A</option>
        <option value="3A">3A</option>
        <option value="Annet">Annen type...</option>
    </select>
    <div id="egendefinertMastDiv" class="skjult">
        <label>Skriv inn mast type</label>
        <input id="egenMastType" placeholder="F.eks. Portal, Gitter...">
    </div>
    <label>Vertikalkrefter</label>
    <select id="vertikalkraft">
        <option value="Lav">Lav</option>
        <option value="Normal" selected>Normal</option>
        <option value="Høy">Høy</option>
    </select>
    <label>GPS</label> <input id="gps">
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <button class="green" onclick="startGPS()" style="margin-top: 5px;">Slå på GPS</button>
        <button class="green" onclick="stopGPS()" style="margin-top: 5px; background: #555;">Slå av GPS</button>
    </div>
    <div id="punkter"></div>
    
    <button class="blue-btn" onclick="aapneTraversRegistrering()" style="margin-top: 25px;">🪵 Sjekk Travers (Feltregistrering)</button>

    <button class="darkgreen" onclick="lagre()" style="margin-top: 10px;">Lagre mast i historikk</button>
    
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 5px;">
        <button class="darkgreen" onclick="lastNed()" style="margin-top: 0; background: #1565c0;">Last ned Excel</button>
        <button class="report-btn" onclick="genererPDF()" style="margin-top: 0;">📄 Lagre PDF</button>
    </div>
    
    <button class="green" onclick="nyMast()" style="margin-top: 15px; background: #c62828;">Neste mast</button>
</div>

<div id="hjelpModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:10000; flex-direction:column; justify-content:center; align-items:center; padding:15px;" onclick="lukkHjelpModal()" class="no-print">
    <div style="background:white; width:100%; max-width:500px; border-radius:12px; overflow-y:auto; max-height:90vh; display:block;" onclick="event.stopPropagation()">
        <div style="background:#0284c7; color:white; padding:15px; text-align:center; position:sticky; top:0; z-index:10;">
            <h3 id="hjelpModalTittel" style="margin:0; font-size:16px; font-weight:900;">Veileder</h3>
            <button onclick="lukkHjelpModal()" style="position:absolute; right:10px; top:50%; transform:translateY(-50%); width:35px; height:35px; padding:0; margin:0; line-height:35px; background:#c62828; color:white; border-radius:50%; font-size:16px; border:none; font-weight:bold; cursor:pointer;">X</button>
        </div>
        <div style="padding:15px; font-size:14px; line-height:1.5; color:#334155;" id="hjelpModalInnhold">
        </div>
        <div id="hjelpModalBilderSone" style="background:#f8fafc; border-top:1px solid #e2e8f0; padding:15px; display:flex; flex-direction:column; gap:10px;">
        </div>
    </div>
</div>

<div id="printSone"></div>

<script>
    const hjelpData = {
        1: {
            tittel: "Veileder: Skjev mast & Fundament",
            tekst: "<b>REN-krav og akseptabel helling:</b><br>I henhold til bransjestandard (REN) skal master i utgangspunktet stå i lodd. For eksisterende anlegg aksepteres det normalt en maksimal helling på <b>1 til 2 % av stolpehøyden</b> over bakken før det registreres som et avvik som krever retting. For en 10 meter høy stolpe utgjør dette 10–20 cm avvik i toppen. For avspenningsmaster er kravene ofte strengere for å ivareta riktig fordeling av strekkrefter.<br><br><b>Helling på langs av linjeretning (LR):</b><br>Oppstår oftest som følge av ulikt strekk i spennene på hver side (f.eks. islast, trefall over linja, eller brudd i ett spenn). Can også skyldes at masta gradvis gir etter for et ensidig strekk som ikke har blitt fanget opp av barduneringen.<br><br><b>Helling på tvers av linjeretning:</b><br>Skyldes ofte langvarig vindbelastning fra én dominerende retning, dårlig fundamentering (f.eks. i myr/bløtt terreng), eller ujevn telehiv. Dette er ekstra kritisk fordi det endrer statikken i masta betraktelig, reduserer faseavstander og frittrom, og kan føre til at masta til slutt velter.",
            bilder: [
                { fil: "skjev_langs.jpg", tekst: "Skjev mast på langs av linjeretning (LR). Ofte forårsaket av ulikt strekk i linja." },
                { fil: "skjev_tvers.jpg", tekst: "Skjev mast på tvers av linjeretning. Ofte forårsaket av langvarig vind eller sviktende fundament." }
            ]
        },
        2: {
            tittel: "Veileder: Barduner (Galvanisert Stål)",
            tekst: "<b>Korrosjon på kritiske bæreelementer:</b><br>Barduner are selve bæresystemet for master som utsettes for store sidekrefter. De er nesten utelukkende laget av galvanisert stål (Fe).<br><br>• <b>Korrosjonsprosessen:</b> Når det beskyttende sinklaget er ofret (galvanisk korrosjon), brytes selve stålet ned. Dette starter som rød/brun *piting* (gropbærende tæring). Denne typen tæring spiser raskt opp trådens tverrsnitt. Siden stållina ikke eser ut som en FeAl-line, skjer bruddet ofte brått uten tydelig buling på forhånd.<br><br><b>Korrosjon i jordovergangen:</b> Bardunstag ruster ofte aller kraftigst akkurat i overgangen mellom luft og jord. Her er det rikelig med både fuktighet og oksygen, noe som gir optimale forhold for tæring.<br><br><b>Nedsatt mekanisk styrke:</b> Synlig rødbrun gravrust på en bardun eller et bardunstag er et kritisk avvik. Det betyr at tverrsnittet og bruddstyrken er redusert, og masta er i fare for mekanisk kollaps.",
            bilder: [
                { fil: "274 korosjon bardun s1-b (2).jpg", tekst: "Kritisk rødbrun gravrust på barduntråder. Dyp tæring som har redusert tverrsnittet og bruddstyrken betydelig." },
                { fil: "PA130011re.jpg", tekst: "Avansert rødbrun tæring på galvanisert ståltråd. Overflaten er herjet av gropbærende korrosjon." },
                { fil: "Bardunstag og bolt med korrosjon (2).jpg", tekst: "Kraftig korrosjon på bardunstag i overgangen mellom luft og jord. Dette er et typisk farepunkt som kan føre til at forankringen ryker." }
            ]
        },
        7: {
            tittel: "Veileder: Traverser og Reststyrke",
            tekst: "<b>Biologisk nedbrytning (Mose og vegetasjon):</b><br>Mose og lav på toppen av traversen fungerer som en svamp som holder konstant på fuktigheten. Dette hindrer treverket i å tørke ut og skaper et perfekt mikroklima for råtesopp. Over tid hules traversen ut, og i verste fall slår busker og trær rot direkte i selve treverket. Slike traverser har mistet mesteparten av sin mekaniske bæreevne og er livsfarlige ved store is- eller vindlaster.<br><br><b>Mekanisk nedbrytning og sprekker:</b><br>Vann samler seg også i dype sprekker og ved boltede forbindelser. Dette fører til kvit- og brunråte som spiser opp innsiden av limtreet eller heltreet. En travers kan se intakt ut på utsiden, men være helt hul inni. Dette krever ofte een grundig reststyrkeanalyse i E.T. Travers.",
            bilder: [
                { fil: "32267FD2-0DF6-4E2B-BBFA-1DBE6155AF8F.jpeg", tekst: "Mosegrodd travers. Mosen fungerer som en fuktig svamp og er selve katalysatoren for fremtidige råteangrep." },
                { fil: "Råtetravers re.jpg", tekst: "Ekstrem biologisk nedbrytning: Råten har hulet ut traversen så mye at den fungerer som 'blomsterkasse' for trær. Kritisk tap av reststyrke." },
                { fil: "308 råte i travers.JPG", tekst: "Dyp, åpen råtesprekk langs traversens lengde. Vann og fuktighet renner rett ned i kjernen av treverket." },
                { fil: "Limtretravers totalt oppråtnet.png", tekst: "Limtretravers som er fullstendig oppråtnet på innsiden på grunn av fuktinntrengning." }
            ]
        },
        8: {
            tittel: "Veileder: Isolatorfeste",
            tekst: "<b>Mekanisk slitasje:</b><br>Kontinuerlig bevegelse fra vind og vibrasjoner fører til mekanisk gnag på sjakler, øyer og bolter. Stål mot stål over tid spiser opp godset og krever utskifting lenge før det ryker. Dette er spesielt kritisk i vindutsatte spenn.<br><br><b>Ulmebrann og Strømtetthet:</b><br>Dersom det oppstår en jordfeil eller et isolatorbrudd/krypestrøm, kan det gå en feilstrøm gjennom beslaget og videre inn i treverket. Selv om selve strømmen er liten, vil <i>strømtettheten</i> bli enorm akkurat i kontaktpunktet mellom bolten og veden. Dette fungerer som et varmeelement som skaper en intens, lokal varmeutvikling. Resultatet er eine ulmebrann som spiser opp treet rundt beslaget fra innsiden.",
            bilder: [
                { fil: "373slitasje.jpg", tekst: "Kritisk slitasje på kjettingledd. Stål mot stål har nesten gnagd seg helt gjennom godset på grunn av vibrasjoner." },
                { fil: "285 slitasje f3 -b.JPG", tekst: "Ekstrem slitasje i sjakkel/øye-forbindelse i silhuett. Tverrsnittet er redusert til et absolutt minimum, med fare for snarlig brudd." },
                { fil: "5 Slitasje b.JPG", tekst: "Tydelig gnag og materialtretthet i opphenget. Et klassisk punkt for visuell slitasjekontroll." },
                { fil: "ulmebrann.jpg", tekst: "Ulmebrann i travers rundt isolatorfeste. Forårsaket av enorm lokal strømtetthet gjennom beslaget." }
            ]
        },
        9: {
            tittel: "Veileder: Isolatorer & Oppheng",
            tekst: "<b>Korrosjon på kule/skål (Rust):</b><br>Når galvaniseringen slites bort, begynner isolatorpinnen å ruste. Rust tar større plass enn stål (det eser ut). Dette skaper et enormt sprengtrykk innvendig som til slutt kan knuse glasset/porselenet, noe som fører til at linja faller ned.<br><br><b>Knust eller Sprukket:</b><br>Avslåtte skåler reduserer isolatorens <i>krypavstand</i> (veien strømmen må krype for å nå jord), noe som øker faren for overslag i regn/tåke. Sprekker er kritiske fordi fukt trekker inn, noe som kan gi frostsprenging eller innvendig overslag.<br><br><b>Forurensning og Kreosot:</b><br>Tester fra SINTEF viser at kreosot som svetter fra traversen og legger seg på isolatoren <i>ikke</i> reduserer isolasjonsevnen i seg selv. Problemet oppstår fordi den seige kreosoten fungerer som et fluepapir som tiltrekker seg annen forurensning (havsalt, industristøv, pollen). Det er denne blandingen som sammen med fukt skaper farlige krypestrømsveier og gnistring (tørrbånds-arcing).<br><br><b>Punktering:</b><br>Ved lynnedslag eller overspenning kan isolatoren punkteres innvendig (ofte synlig som små brennemerker ved kappen). Den er da i praksis permanent kortsluttet.",
            bilder: [
                { fil: "Rust på isolator.JPG", tekst: "Kritisk: Kraftig rust på isolatorpinnen. Rusten eser ut og vil til slutt sprenge glasset fra innsiden." },
                { fil: "302 defekt isolator.JPG", tekst: "Knust/avslått isolatorskål. Dette reduserer krypavstanden betydelig." },
                { fil: "332 sprukket isolator F1.jpg", tekst: "Sprekk i porselenet. Fukt vil trenge inn og skape frostsprenging eller innvendig overslag." },
                { fil: "mulig krypestrømsveier.jpg", tekst: "Tydelige spor etter krypestrømmer og ujevn forurensning på porselenets overflate." },
                { fil: "60 mye kreosot på isolatorene.JPG", tekst: "Kreosot på glasset reduserer ikke isolasjonsevnen i seg selv, men fungerer som 'fluepapir' for salt og støv som forårsaker krypestrømmer." },
                { fil: "P1020720.JPG", tekst: "Punktering/overslag: Tydelig brennsår ved metallkappen. Isolatoren er defekt." },
                { fil: "Herlig bilde av både rust, slitasje og natur.jpg", tekst: "Isolatoroppheng i saltholdig kystmiljø med kraftig overflaterust på metalldeler." }
            ]
        },
        10: {
            tittel: "Veileder: Bendsling & Gnag",
            tekst: "<b>Mekanisk slitasje og gnag:</b><br>Eoliske vibrasjoner og konstante mikrobevegelser fører til mekanisk gnag mellom lina og bendslingstråden dersom bendslingen blir løs. Dette sliper ned aluminiumsoverflaten og lager initieringspunkter for utmatting.",
            bilder: [
                { fil: "bendsling_gnag.jpg", tekst: "Nærbilde av mekanisk gnag på bendslingstråder på grunn av løs forbindelse og vibrasjoner." }
            ]
        },
        11: {
            tittel: "Veileder: Liner & Kordelskader (FeAl)",
            tekst: "<b>Verktøyhakk og Vibrasjon (Tretthetsbrudd):</b><br>Når det oppstår et skarpt hakk i aluminiumen fra verktøy, oppstår det <i>spenningskonsentrasjon</i> (kervvirkning). Under eoliske vibrasjoner vil en tretthetssprekk starte i hakket og spise seg tvers gjennom tråden til den ryker med et flatt, skarpt brudd.<br><br><b>Galvanisk korrosjon i FeAl-liner:</b><br>Siden FeAl-liner (f.eks. 50 eller 70 6/1) består av to ulike metaller (aluminium utvendig og galvanisert stål i kjernen), dannes det et galvanisk element hvis fuktighet trenger inn mellom lagene. Det oppstår kraftig tæring i grensesnittet der aluminiumskordelene ligger presset mot stålkjernen.<br><br><b>Ekstremt Strekk og Islast (Seigt brudd):</b><br>Når lina utsettes for massivt, statisk strekk (som ved islast), strekkes aluminiumskordelene plastisk før de ryker. De smalner inn og former en karakteristisk «blyantspiss».<br><br><b>Korrosjonsatlas (Trinn 1-4):</b><br>• <b>Trinn 1:</b> Normal overflate.<br>• <b>Trinn 2:</b> Begynnende hvitrust (sinkoksid).<br>• <b>Trinn 3:</b> Fremskredet buling (stålet ruster og presser aluminiumen ut).<br>• <b>Trinn 4:</b> Kritisk fuglebur.",
            bilder: [
                { fil: "Vibrasjonsbrudd som følge av hakk i lina..jpg", tekst: "Tretthetsbrudd: Skarpe, flate bruddflater forårsaket av vibrasjoner (ofte initiert av hakk)." },
                { fil: "Seigt brudd.png", tekst: "Seigt brudd: Islast-havari på FeAl 6/1. Aluminiumskordelene har strukket seg til 'blyantspisser' før de røk." },
                { fil: "Galvanisk korrosjon.png", tekst: "Galvanisk korrosjon på FeAl 6/1: Omfattende tæring i kontaktflaten mellom aluminiumskordelene og den indre stålkjernen." },
                { fil: "Hakk på tvers av linen.png", tekst: "Skarpe hakk fra verktøy. Dette er døden for en aluminiumsline i vibrasjon." },
                { fil: "IMG_0113.JPG", tekst: "Trinn 2: Tydelig hvitrust (sinkoksid-pulver) mellom kordelene." },
                { fil: "7 kraftig korrosjon og mulig punktering av stålkjerne.jpg", tekst: "Trinn 3: Buling. Sinken er borte, og rusten presser kordelene ut." },
                { fil: "Burdannelse.png", tekst: "Trinn 4: Kritisk mekanisk skade (Fuglebur)." }
            ]
        },
        13: {
            tittel: "Veileder: Toppline/Jordline (Galvanisert Stål)",
            tekst: "<b>Korrosjonsatlas for galvanisert stål (Grå -> Brun):</b><br>I motsetning to FeAl-liner, buler ikke rene stålliner når de ruster. Nedbrytningen skjer i en tydelig visuell rekkefølge:<br><br>• <b>Normal tilstand (Grå):</b> Blank eller jevnt matt grå overflate.<br>• <b>Galvanisk korrosjon (Grå/Hvit):</b> Sinklaget ofrer seg og danner et hvitt kritt-belegg over metallet. Selve stålet er fortsatt beskyttet.<br>• <b>Rødbrun tæring (Brun/Rød):</b> Sinken er oppbrukt, stålet ruster og det dannes rød/brun *piting* (gravrustflekker). Dette spiser raskt opp tverrsnittet og reduserer bruddstyrken drastisk.",
            bilder: [
                { fil: "DJI_20251003201920_0510_Dre.jpg", tekst: "Overgangs-fase: Sinklaget er matt og det dannes rødbrune gravrustflekker (piting) på klemmen/lina." },
                { fil: "PA130018re.jpg", tekst: "Kritisk rødbrun korrosjon på Toppline (Fe). Lina har mistet mekanisk styrke." }
            ]
        }
    };
    
    document.addEventListener("DOMContentLoaded", () => {
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.addEventListener('copy', event => event.preventDefault());

        const gyldigDomene = window.location.hostname;
        if (window.location.hostname !== "" && window.location.hostname !== gyldigDomene) {
            document.body.innerHTML = ""; 
            return; 
        }

        if (window.netlifyIdentity) {
            if (window.netlifyIdentity.currentUser()) {
                visAppen();
            }

            window.netlifyIdentity.on("init", user => {
                if (user) {
                    visAppen(); 
                }
            });
            window.netlifyIdentity.on("login", user => {
                visAppen(); 
                window.netlifyIdentity.close(); 
            });
            window.netlifyIdentity.on("logout", () => {
                location.reload(); 
            });
        }
    });

    function lagreKontrollor() {
        localStorage.setItem("linje_kontrollor", document.getElementById("kontrollor").value);
    }

    function visAppen() {
        document.getElementById("loginBox").classList.add("skjult");
        document.getElementById("containerApp").classList.remove("skjult");
        document.getElementById('kontrollor').value = localStorage.getItem('linje_kontrollor') || "";

        let dagensDato = new Date().toLocaleDateString('no-NO', {day: '2-digit', month: '2-digit', year: 'numeric'});
        document.getElementById('datoKontrollert').value = dagensDato;

        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('retur') === 'ja') {
            if (urlParams.get('netteier')) document.getElementById('netteier').value = urlParams.get('netteier');
            if (urlParams.get('linje')) document.getElementById('linje').value = urlParams.get('linje');
            if (urlParams.get('mast')) document.getElementById('mast').value = urlParams.get('mast');
        }
        render();
    }

    let gpsWatch = null;
    let data = JSON.parse(localStorage.getItem('linjekontroll_data')) || [];
    let status = {};
    let valgtStolpeNrForRaate = ""; 

    let punkter = [
        {navn:"Mast OK", avvik:[]},
        {navn:"Skjev mast/fundament", avvik:["Skjev","Fundament feil"]},
        {navn:"Barduner", avvik:["Løs","Brudd","Korrosjon"]},
        {navn:"Stolper", avvik:["Stolper OK","Råte","Skade"]},
        {navn:"Stålmast", avvik:["Rust","Skade"]},
        {navn:"Topphette", avvik:["Mangler","Defekt"]},
        {navn:"Traversfeste", avvik:["Bruddanvisning","Skade"]},
        {navn:"Travers", avvik:["Travers OK","Mosegrodd","Annen skade","Råte","Sprekk"]},
        {navn:"Isolatorfeste", avvik:["Slitasje"]},
        {navn:"Isolator", avvik:["Knust","Krypestrøm"]},
        {navn:"Bendsling", avvik:["Løs","Brudd"]},
        {navn:"Liner", avvik:["Korrodert","Kordellbrudd"]},
        {navn:"Strekking", avvik:["Skjev"]},
        {navn:"Topp/jordline", avvik:["Korrodert","Kordellbrudd"]},
        {navn:"Merking", avvik:["HS mangler","Mnr mangler"]},
        {navn:"Trase", avvik:["Skog","Kratt"]}
    ];

    function nyttAnlegg() {
        if(confirm("Vil du starte et nytt anlegg? Dette tømmer Netteier og LinjeID.")) {
            document.getElementById("netteier").value = "";
            document.getElementById("linje").value = "";
            document.getElementById("mast").value = "";
            status = {};
            valgtStolpeNrForRaate = "";
            render();
            window.scrollTo(0,0);
        }
    }

    function sjekkMastType(verdi) {
        let egenDiv = document.getElementById("egendefinertMastDiv");
        if (verdi === "Annet") {
            egenDiv.classList.remove("skjult");
        } else {
            egenDiv.classList.add("skjult");
            document.getElementById("egenMastType").value = "";
        }
    }

    function render(){
        let html = "";
        punkter.forEach((p,i)=>{
            let cls = "kp";
            if(status[i] == "ok") cls += " ok";
            if(status[i] && status[i].indexOf("avvik:") === 0) cls += " avvik";
            
            html += `<div class="kp-rad">`;
            html += `<button class="${cls}" onclick="toggle(${i})">${p.navn}</button>`;
            if (hjelpData[i]) {
                html += `<button type="button" class="help-btn" onclick="aapneHjelpModal(${i}); event.stopPropagation();" title="Åpne digital lærebok">📖</button>`;
            }
            html += `</div>`;
            
            if(p.avvik.length > 0 && (status[i] == "vis" || (status[i] && status[i].indexOf("avvik:") === 0))){
                p.avvik.forEach(a=>{
                    let avvikCls = "avvik";
                    if(status[i] === "avvik:" + a) {
                        avvikCls += (a === "Stolper OK" || a === "Travers OK") ? " valgt-ok" : " valgt";
                    }
                    html += `<button class="${avvikCls}" onclick="settAvvik(${i}, '${a}')">${a}</button>`;
                });

                if(p.navn === "Stolper" && status[i] && (status[i] === "avvik:Råte" || status[i] === "avvik:Skade")) {
                    html += `<div class="stolpe-valg-boks">`;
                    html += `<label style="margin-top:0; font-size:14px; color:#c62828;">Hvilken stolpe (1-12) har råte/skade?</label>`;
                    html += `<div class="stolpe-grid">`;
                    for(let s=1; s<=12; s++) {
                        let aktivCls = (valgtStolpeNrForRaate == s) ? "aktiv" : "";
                        html += `<button class="${aktivCls}" onclick="velgStolpeForLenke(${s})">${s}</button>`;
                    }
                    html += `</div>`;
                    
                    if(valgtStolpeNrForRaate !== "") {
                        let n_eier = encodeURIComponent(document.getElementById("netteier").value || "");
                        let l_id = encodeURIComponent(document.getElementById("linje").value || "");
                        let m_nr = encodeURIComponent(document.getElementById("mast").value || "");
                        let url = `https://et-stolpekontroll.netlify.app/?netteier=${n_eier}&linje=${l_id}&mast=${m_nr}&stolpenr=${valgtStolpeNrForRaate}`;
                        html += `<a href="${url}" class="dyplenke-knapp">🚀 Åpne Stolpekontroll for Stolpe ${valgtStolpeNrForRaate}</a>`;
                    }
                    html += `</div>`;
                }

                if(p.navn === "Travers" && status[i]) {
                    let valgtAvvik = status[i].replace("avvik:", "");
                    
                    if(valgtAvvik === "Mosegrodd" || valgtAvvik === "Annen skade") {
                        html += `<div style="background:#fff3e0; border:1px dashed #ff9800; border-radius:6px; padding:10px; margin-top:5px; text-align:center;">`;
                        html += `<p style="margin:0; font-size:12px; font-weight:bold; color:#e65100;">📸 Dokumentasjon påkrevd: Ta bilde av skaden og beskriv den i merknadsfeltet under.</p>`;
                        html += `</div>`;
                    } 
                    else if(valgtAvvik === "Råte" || valgtAvvik === "Sprekk") {
                        let n_eier = encodeURIComponent(document.getElementById("netteier").value || "");
                        let l_id = encodeURIComponent(document.getElementById("linje").value || "");
                        let m_nr = encodeURIComponent(document.getElementById("mast").value || "");
                        
                        let url = `https://et-trav-reg-felt.netlify.app/?netteier=${n_eier}&linje=${l_id}&mast=${m_nr}&retur=ja`;
                        
                        html += `<div style="background:#ffebee; border:2px dashed #c62828; border-radius:8px; padding:15px; margin-top:10px; text-align:center;">`;
                        html += `<p style="margin-top:0; font-size:12px; font-weight:900; color:#c62828; text-transform:uppercase;">Feltregistrering påkrevd</p>`;
                        html += `<p style="font-size:14px; color:#b71c1c; margin-bottom:10px; font-weight:bold;">Registrer mål for råte/sprekk i felt-modulen.</p>`;
                        html += `<a href="${url}" class="dyplenke-knapp" style="background:#b71c1c;">🪵 ÅPNE TRAVERS FELTREGISTRERING</a>`;
                        html += `</div>`;
                    }
                }

                html += `<textarea placeholder="📸 Husk bilde! Merknad:" id="m${i}" onblur="lagreMerknad(this, ${i})">${status["m"+i] || ""}</textarea>`;
            }
        });
        document.getElementById("punkter").innerHTML = html;
    }

    function aapneHjelpModal(i) {
        const item = hjelpData[i];
        if(!item) return;
        
        document.getElementById("hjelpModalTittel").innerHTML = "📖 " + item.tittel;
        document.getElementById("hjelpModalInnhold").innerHTML = item.tekst;
        
        let bildeHtml = "";
        if(item.bilder && item.bilder.length > 0) {
            item.bilder.forEach(b => {
                bildeHtml += `
                    <div style="border:1px solid #cbd5e1; border-radius:8px; overflow:hidden; background:black; margin-bottom:5px;">
                        <img src="${b.fil}" style="width:100%; height:auto; display:block;" onerror="this.style.display='none';">
                        <div style="background:white; padding:8px; font-size:11px; font-weight:bold; color:#475569; border-top:1px solid #cbd5e1;">📸 ${b.tekst}</div>
                    </div>
                `;
            });
        }
        document.getElementById("hjelpModalBilderSone").innerHTML = bildeHtml;
        document.getElementById("hjelpModal").style.display = "flex";
    }

    function lukkHjelpModal() {
        document.getElementById("hjelpModal").style.display = "none";
    }

    function velgStolpeForLenke(nr) {
        valgtStolpeNrForRaate = nr;
        render(); 
    }

    function lagreMerknad(el, i) { status["m"+i] = el.value; }

    function toggle(i) {
        if (status[i] === "vis" || status[i] === "ok" || (status[i] && status[i].indexOf("avvik:") === 0)) {
            delete status[i];
            delete status["m"+i];
            if(punkter[i].navn === "Stolper") valgtStolpeNrForRaate = ""; 
        } else {
            status[i] = (punkter[i].navn === "Mast OK") ? "ok" : "vis";
        }
        render();
    }

    function settAvvik(i, avviksTekst) { 
        status[i] = "avvik:" + avviksTekst; 
        if(punkter[i].navn === "Stolper" && avviksTekst !== "Råte" && avviksTekst !== "Skade") {
            valgtStolpeNrForRaate = ""; 
        }
        render(); 
    }

    function startGPS() {
        if (navigator.geolocation) {
            gpsWatch = navigator.geolocation.watchPosition(p => {
                document.getElementById("gps").value = p.coords.latitude.toFixed(6)+", "+p.coords.longitude.toFixed(6);
            }, e => alert("GPS-feil"), {enableHighAccuracy: true});
        }
    }

    function stopGPS() { if(gpsWatch) navigator.geolocation.clearWatch(gpsWatch); }

    function aapneTraversRegistrering() {
        let netteier = document.getElementById('netteier').value || '';
        let linje = document.getElementById('linjeId') ? document.getElementById('linjeId').value : document.getElementById('linje').value || '';
        let mast = document.getElementById('mast').value || '';
        
        let url = `https://et-trav-reg-felt.netlify.app/?netteier=${encodeURIComponent(netteier)}&linje=${encodeURIComponent(linje)}&mast=${encodeURIComponent(mast)}&retur=ja`;
        window.location.href = url;
    }

    function lagre() {
        let valgtType = document.getElementById("mastType").value;
        if (valgtType === "Annet") valgtType = document.getElementById("egenMastType").value || "Uoppgitt";
        
        let datoVerdi = document.getElementById("datoKontrollert").value;

        let rad = {
            dato: datoVerdi,
            kontrollor: document.getElementById("kontrollor").value,
            netteier: document.getElementById("netteier").value,
            linje: document.getElementById("linje").value,
            mast: document.getElementById("mast").value,
            mastType: valgtType,
            vertikalkraft: document.getElementById("vertikalkraft").value,
            gps: document.getElementById("gps").value,
            punkter: punkter.map((p,i) => ({navn:p.navn, status:status[i]||"", merknad:status["m"+i]||""}))
        };
        data.push(rad);
        localStorage.setItem('linjekontroll_data', JSON.stringify(data));
        alert("Mast " + rad.mast + " lagret!");
    }

    function lastNed() {
        if (data.length === 0) return;
        
        let csv = "sep=;\n\ufeffDato;Kontrollør;Netteier;Linje;Mast;Masttype;Vertikalkrefter;GPS;Kontrollpunkt;Status;Merknad\n";
        
        data.forEach(d => {
            d.punkter.forEach(p => {
                if (p.status !== "") {
                    let visStatus = p.status;
                    if(visStatus.indexOf("avvik:") === 0) {
                        visStatus = visStatus.replace("avvik:", "");
                    }
                    if(visStatus === "Stolper OK" || visStatus === "Travers OK") {
                        visStatus = "OK";
                    }
                    let merknadRenset = (p.merknad || "").replace(/(\r\n|\n|\r|;)/gm, " ");
                    
                    csv += `"${d.dato || ""}";"${d.kontrollor || ""}";"${d.netteier}";"${d.linje}";"${d.mast}";"${d.mastType}";"${d.vertikalkraft}";"${d.gps}";"${p.navn}";"${visStatus}";"${merknadRenset}"\n`;
                }
            });
        });
        
        let blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
        let a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "linjekontroll_eksport.csv";
        a.click();
    }

    function genererPDF() {
        let netteier = document.getElementById("netteier").value || "-";
        let linje = document.getElementById("linje").value || "-";
        let mast = document.getElementById("mast").value || "-";
        let valgtType = document.getElementById("mastType").value;
        if (valgtType === "Annet") valgtType = document.getElementById("egenMastType").value || "Uoppgitt";
        let vertikalkraft = document.getElementById("vertikalkraft").value;
        let gps = document.getElementById("gps").value || "-";
        let kontrollor = document.getElementById("kontrollor").value || "-";
        let datoVerdi = document.getElementById("datoKontrollert").value || "-";

        let sjekklisteHtml = "";
        punkter.forEach((p, i) => {
            if (status[i] && status[i] !== "vis") {
                let visStatus = status[i];
                let statusClass = "status-ok";
                if(visStatus.indexOf("avvik:") === 0) {
                    visStatus = visStatus.replace("avvik:", "");
                    if(visStatus !== "Stolper OK" && visStatus !== "Travers OK") {
                        statusClass = "status-avvik";
                    }
                } else if (visStatus === "ok") {
                    visStatus = "OK";
                }
                let merknad = status["m"+i] ? status["m"+i] : "";

                sjekklisteHtml += `
                    <tr>
                        <td><strong>${p.navn}</strong></td>
                        <td class="${statusClass}">${visStatus}</td>
                        <td>${merknad}</td>
                    </tr>
                `;
            }
        });

        if (sjekklisteHtml === "") {
            sjekklisteHtml = "<tr><td colspan='3' style='text-align:center;'>Ingen punkter vurdert enda.</td></tr>";
        }

        let printSone = document.getElementById("printSone");
        printSone.innerHTML = `
            <div class="page">
                <h2>Inspeksjonsrapport - Linjekontroll</h2>
                <p><strong>Dato:</strong> ${datoVerdi} | <strong>Kontrollør:</strong> ${kontrollor}</p>
                <p><strong>Netteier:</strong> ${netteier} | <strong>LinjeID:</strong> ${linje}</p>
                
                <table>
                    <tr><th>Mast nr</th><td>${mast}</td></tr>
                    <tr><th>Mast type</th><td>${valgtType}</td></tr>
                    <tr><th>Vertikalkraft</th><td>${vertikalkraft}</td></tr>
                    <tr><th>GPS posisjon</th><td>${gps}</td></tr>
                </table>

                <h3 style="margin-top: 25px;">Sjekkliste og Avvik</h3>
                <table>
                    <thead>
                        <tr>
                            <th style="width:30%;">Kontrollpunkt</th>
                            <th style="width:25%;">Status</th>
                            <th>Merknad</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${sjekklisteHtml}
                    </tbody>
                </table>
            </div>
        `;

        let originalTitle = document.title;
        document.title = "Linjekontroll_Linje_" + linje + "_Mast_" + mast;
        
        window.print();
        
        setTimeout(() => { document.title = originalTitle; }, 1000);
    }

    function nyMast() {
        document.getElementById("mast").value = "";
        document.getElementById("mastType").value = "H";
        sjekkMastType("H");
        status = {};
        valgtStolpeNrForRaate = ""; 
        render();
        window.scrollTo(0,0);
    }
</script>
</body>
</html>
