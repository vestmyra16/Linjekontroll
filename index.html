<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Linjekontroll v2</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{font-family:Arial;max-width:700px;margin:auto;padding:15px;}
label{font-weight:bold;display:block;margin-top:10px;}
input,select,textarea{width:100%;padding:10px;margin-top:4px;}
button{margin-top:10px;padding:16px;width:100%;background:green;color:white;border:none;font-size:16px;}
.avvik-btn{background:#ddd;color:black;}
</style>
</head>

<body>

<h2>Grunnlagsdata</h2>

<label>Netteier</label>
<input id="netteier">

<label>Linje</label>
<input id="linje">

<label>Mastnr</label>
<input id="mast">

<button onclick="nyMast()">Ny mast</button>

<hr>

<h2>Kontrollpunkt</h2>

<label>Kontrollpunkt</label>
<select id="punkt">
<option value="">Velg</option>
<option>Barduner</option>
<option>Toppline</option>
<option>Jordinger</option>
<option>Merking</option>
<option>Stolper</option>
<option>Topphatte</option>
<option>Bendsling</option>
<option>Skjev mast</option>
</select>

<label>Avvik</label>
<select id="avvik" onchange="visAvvik()">
<option value="">Velg</option>
<option>Mast OK</option>
<option>Brudd</option>
<option>Rust</option>
<option>Slakk</option>
<option>Løs</option>
<option>Mangler</option>
<option>Råte</option>
<option>Skjev</option>
</select>

<div id="bildeDiv" style="display:none;">
<button onclick="taBilde()">📷 Ta bilde</button>
<input type="file" id="kamera" accept="image/*" capture="environment" style="display:none">
</div>

<div id="merknadDiv" style="display:none;">
<label>Merknad</label>
<textarea id="merknad"></textarea>
</div>

<button onclick="leggTil()">Legg til avvik</button>

<hr>

<button onclick="lagreMast()">Lagre mast</button>
<button onclick="lastNed()">Last ned Excel</button>

<script>

let avvikListe=[];
let alleData=[];

/* Vis/skjul bilde og merknad */
function visAvvik(){
    let valg = document.getElementById("avvik").value;

    if(valg === "Mast OK" || valg === ""){
        bildeDiv.style.display="none";
        merknadDiv.style.display="none";
    } else {
        bildeDiv.style.display="block";
        merknadDiv.style.display="block";
    }
}

/* Kamera */
function taBilde(){
    kamera.click();
}

/* Legg til avvik */
function leggTil(){

let punkt = document.getElementById("punkt").value;
let avvik = document.getElementById("avvik").value;
let merknad = document.getElementById("merknad").value;

if(!punkt || !avvik){
    alert("Velg kontrollpunkt og avvik");
    return;
}

if(avvik === "Mast OK"){
    avvikListe = []; // nullstill hvis OK
    alert("Mast satt til OK");
    return;
}

avvikListe.push({
    punkt:punkt,
    avvik:avvik,
    merknad:merknad
});

/* Nullstill felt */
document.getElementById("avvik").value="";
document.getElementById("merknad").value="";
bildeDiv.style.display="none";
merknadDiv.style.display="none";

}

/* Lagre mast */
function lagreMast(){

let netteier = document.getElementById("netteier").value;
let linje = document.getElementById("linje").value;
let mast = document.getElementById("mast").value;

if(!mast){
    alert("Mangler mastnr");
    return;
}

/* Ingen avvik → Mast OK */
if(avvikListe.length === 0){
    alleData.push({
        netteier:netteier,
        linje:linje,
        mast:mast,
        punkt:"Mast OK",
        avvik:"Ingen",
        merknad:""
    });
} else {
/* Lagre kun avvik */
avvikListe.forEach(a=>{
    alleData.push({
        netteier:netteier,
        linje:linje,
        mast:mast,
        punkt:a.punkt,
        avvik:a.avvik,
        merknad:a.merknad
    });
});
}

/* Nullstill for neste mast */
avvikListe=[];
document.getElementById("mast").value="";
alert("Mast lagret");

}

/* Ny mast */
function nyMast(){
    avvikListe=[];
    document.getElementById("mast").value="";
}

/* Excel */
function lastNed(){

let wb = XLSX.utils.book_new();
let ws = XLSX.utils.json_to_sheet(alleData);

XLSX.utils.book_append_sheet(wb, ws, "Kontroll");

let navn = document.getElementById("linje").value || "Linjekontroll";
XLSX.writeFile(wb, navn + ".xlsx");

}

</script>

</body>
</html>
