<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Linjekontroll</title>

<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#2e7d32">

<style>
body { font-family: Arial; margin:10px; background:#f5f5f5; }

.header {
  position: sticky;
  top:0;
  background:white;
}

.label { font-weight:bold; color:black; }

input {
  width:100%;
  padding:8px;
  margin-bottom:6px;
}

.btn {
  background:#2e7d32;
  color:white;
  padding:12px;
  margin:6px 0;
  border-radius:6px;
  cursor:pointer;
}

.btn.red { background:#c62828; }
.btn.ok { background:#66bb6a; }

.sub {
  background:#e0e0e0;
  padding:10px;
  margin:2px 0;
}

.camera {
  background:#1b5e20;
  color:white;
  padding:10px;
  text-align:center;
  border-radius:6px;
  margin-top:5px;
}

textarea {
  width:100%;
  padding:8px;
  margin-top:4px;
}
</style>
</head>

<body>

<div class="header">

<h3>Linjekontroll v2.20</h3>

<div class="label">Netteier</div>
<input id="netteier">

<div class="label">LinjeID</div>
<input id="linje">

<div class="label">Mast nr</div>
<input id="mast">

<div id="gps"></div>

</div>

<div id="app"></div>

<div class="btn" onclick="nextMast()">➡ Neste mast</div>
<div class="btn" onclick="saveMast()">💾 Lagre mast</div>
<div class="btn" onclick="downloadExcel()">📥 Last ned Excel</div>
<div class="btn" onclick="resetAll()">🆕 Ny kontroll</div>

<script>

let allMasts = [];
let current = {};
let open = null;

const controls = [
["Mast OK", []],
["Skjev mast", ["Skjev","Setning","Fund.feil"]],
["Barduner", ["Slakk","Brudd","Rust"]],
["Stolper", ["Råte","Sprekk"]],
["Stålmast", ["Korrosjon","Skade"]],
["Topphette", ["Mangler","Skadet"]],
["Traversfeste", ["Løs","Skade"]],
["Travers", ["Skjev","Skade"]],
["Isolatorfeste", ["Slitasje","Skade"]],
["Isolator", ["Knust","Krypestrømsvei"]],
["Bendsling", ["Løs","Brudd"]],
["Liner", ["Korrosjon","Kordelbrudd"]],
["Strekking", ["Skjev"]],
["Skjøter/Klemmer", ["Korrodert"]],
["Toppline", ["Slakk","Korrosjon"]],
["Jordinger", ["Løs","Brudd"]],
["Trasé", ["Skog","Kratt"]],
["Merking", ["HS mangler/defekt","Mnr mangler/defekt"]]
];

function render(){

  let html="";

  controls.forEach((c,i)=>{

    let state = current[i];
    let color = "";

    if(state){
      if(state.ok) color = "ok";
      if(state.avvik || state.note || state.img) color = "red";
    }

    html += `<div class="btn ${color}" onclick="toggle(${i})">${c[0]}</div>`;

    if(open===i){

      if(c[0] === "Mast OK"){
        html += `<div class="sub" onclick="setMastOK()">Sett Mast OK</div>`;
      } else {

        c[1].forEach(s=>{
          html += `<div class="sub" onclick="setAvvik(${i},'${s}')">${s}</div>`;
        });

        html += `
        <div class="camera">
          <label>
            📸 Ta bilde
            <input type="file" accept="image/*" capture="environment"
            style="display:none;"
            onchange="setPhoto(${i})">
          </label>
        </div>
        `;

        html += `<textarea placeholder="Merknad" onchange="setNote(${i},this.value)"></textarea>`;
      }
    }

  });

  app.innerHTML = html;
}

function toggle(i){
  open = open===i ? null : i;
  render();
}

function setMastOK(){
  current = { mastOK: true };
  render();
}

function setAvvik(i,val){
  current[i] = current[i] || {};
  current[i].avvik = val;
  render();
}

function setPhoto(i){
  current[i] = current[i] || {};
  current[i].img = true;
  render();
}

function setNote(i,val){
  current[i] = current[i] || {};
  current[i].note = val;
  render();
}

function saveMast(){

  allMasts.push({
    netteier: netteier.value,
    linje: linje.value,
    mast: mast.value,
    data: JSON.parse(JSON.stringify(current))
  });

  alert("Mast lagret");
}

function nextMast(){
  saveMast();
  mast.value="";
  current = {};
  open = null;
  render();
}

function resetAll(){
  if(confirm("Start ny kontroll?")){
    allMasts=[];
    current={};
    open=null;
    netteier.value="";
    linje.value="";
    mast.value="";
    render();
  }
}

function downloadExcel(){

  let csv = "Netteier,LinjeID,Mast,Kontrollpunkt,Avvik,Merknad\n";

  allMasts.forEach(m=>{

    if(m.data.mastOK){
      csv += `${m.netteier},${m.linje},${m.mast},Mast OK,Ingen,\n`;
      return;
    }

    controls.forEach((c,i)=>{

      let d = m.data[i];

      if(d && (d.avvik || d.note || d.img)){
        csv += `${m.netteier},${m.linje},${m.mast},${c[0]},${d.avvik||""},${d.note||""}\n`;
      }

    });

  });

  let blob = new Blob([csv], {type:"text/csv"});
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "linjekontroll.csv";
  a.click();
}

navigator.geolocation.getCurrentPosition(pos=>{
  gps.innerHTML =
  "GPS: " + pos.coords.latitude.toFixed(5) + ", " +
  pos.coords.longitude.toFixed(5);
});

render();

</script>

</body>
</html>
