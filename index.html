<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Linjekontroll v1.4</title>

<link rel="apple-touch-icon" href="icon.png">

<style>
body { font-family: Arial; margin:0; background:#f4f4f4; }

/* 🔝 FAST TOPP */
.header {
position:sticky;
top:0;
background:white;
padding:10px;
z-index:1000;
border-bottom:2px solid #ccc;
}

.header h2 {
margin:0 0 5px 0;
color:black;
}

input {
width:100%;
padding:8px;
margin:3px 0;
font-size:14px;
color:black;
}

button {
width:100%;
padding:14px;
margin:4px 0;
border-radius:10px;
border:none;
font-size:15px;
}

.cat { background:#2e7d32; color:white; }
.active { background:#c62828; color:white; }
.option { background:#eee; }

.hidden { display:none; }
.small { font-size:12px; color:#000; }

</style>
</head>

<body>

<div class="header">
<h2>Linjekontroll v1.4</h2>

<input id="netteier" placeholder="Netteier">
<input id="linje" placeholder="LinjeID">
<input id="mast" type="number" placeholder="Mast nr">

<div id="gps" class="small">GPS...</div>

<button class="cat" onclick="mastOK()">Mast OK</button>
</div>

<div id="categories"></div>

<button onclick="nextMast()">Neste mast</button>
<button onclick="exportCSV()">Last ned Excel</button>

<script>

let data=[];
let gps={lat:"",lon:""};

/* 🔴 OPPDATERT AVVIK */
const avvikData = {

"Skjev mast": ["Skjev","Setning","Fund.feil"],

"Barduner": ["Slakk","Brudd","Rust"],

"Stolper": ["Råte","Sprekk"],

"Stålmast": ["Korr","Skade"],

"Topphette": ["Mangler","Skadet"],

"Traversfeste": ["Løs","Skade"],

"Travers": ["Skjev","Skade"],

"Isolatorfeste": ["Slitasje","Skade"],

"Isolator": ["Knust","Sprekk","Forur"],

"Bendsling": ["Slakk","Skade"],

"Liner": ["Korr","Kordelbrudd"],

"Strekning": ["Sig","Høyde"],

"Skjøter/klemmer": ["Korr","Kordelbrudd"],

"Toppline": ["Slakk","Korr"],

"Jordinger": ["Brudd","Korr"],

"Trasé": ["Skog","Kratt"],

"Merking": ["Mangler","Utydelig"]

};

const container=document.getElementById("categories");

Object.keys(avvikData).forEach(cat=>{

let div=document.createElement("div");

let btn=document.createElement("button");
btn.innerText=cat;
btn.className="cat";

let options=document.createElement("div");
options.className="hidden";

avvikData[cat].forEach(a=>{
let o=document.createElement("button");
o.innerText=a;
o.className="option";

o.onclick=()=>addAvvik(cat,a,btn);

options.appendChild(o);
});

btn.onclick=()=>options.classList.toggle("hidden");

div.appendChild(btn);
div.appendChild(options);

container.appendChild(div);

});

function addAvvik(cat,type,btn){

data.push({
netteier:val("netteier"),
linje:val("linje"),
mast:val("mast"),
kategori:cat,
type:type,
lat:gps.lat,
lon:gps.lon,
tid:new Date().toLocaleString()
});

btn.classList.add("active");
}

function mastOK(){
data.push({
netteier:val("netteier"),
linje:val("linje"),
mast:val("mast"),
kategori:"OK",
type:"",
lat:gps.lat,
lon:gps.lon,
tid:new Date().toLocaleString()
});
nextMast();
}

function nextMast(){
document.getElementById("mast").value =
parseInt(val("mast")||0)+1;

document.querySelectorAll(".cat").forEach(b=>b.classList.remove("active"));
}

function exportCSV(){

let csv="Netteier,Linje,Mast,Kategori,Type,Lat,Lon,Tid\n";

data.forEach(d=>{
csv+=`${d.netteier},${d.linje},${d.mast},${d.kategori},${d.type},${d.lat},${d.lon},${d.tid}\n`;
});

let blob=new Blob([csv],{type:"text/csv"});
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="Linjekontroll.csv";
a.click();
}

function val(id){return document.getElementById(id).value;}

navigator.geolocation.watchPosition(pos=>{
gps.lat=pos.coords.latitude.toFixed(6);
gps.lon=pos.coords.longitude.toFixed(6);

document.getElementById("gps").innerText=
"GPS: "+gps.lat+", "+gps.lon;
});

</script>

</body>
</html>
