<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="/Linjekontroll/icon-180.png">
<meta name="theme-color" content="#2e7d32">

<title>Linjekontroll v14</title>

<style>
body {
    font-family: Arial;
    background:#f4f4f4;
    margin:0;
}

.container {
    max-width:520px;
    margin:auto;
    padding:12px;
}

h2 {
    text-align:center;
    font-size:22px;
}

/* LABEL */
label {
    display:block;
    margin-top:10px;
    font-size:16px;
    font-weight:bold;
    color:#000;
}

/* INPUT */
input {
    width:100%;
    padding:16px;
    margin-top:4px;
    font-size:18px;
}

/* KNAPPER */
.kontroll {
    width:100%;
    padding:20px;
    margin:10px 0;
    border:none;
    border-radius:12px;
    font-size:20px;
    color:white;
}

.morkgronn { background:#2e7d32; }
.lysgronn { background:#66bb6a; }
.rod { background:#c62828; }

.avvik button {
    width:100%;
    padding:16px;
    margin:4px 0;
    border:none;
    border-radius:10px;
    background:#e0e0e0;
    font-size:18px;
    color:black;
}

/* KAMERA */
.kamera {
    width:100%;
    padding:18px;
    margin-top:6px;
    border:none;
    border-radius:10px;
    background:#2e7d32;
    color:white;
    font-size:20px;
}

/* MERKNAD */
textarea {
    width:100%;
    padding:14px;
    margin-top:6px;
    font-size:18px;
}

.hidden { display:none; }

.mastok {
    font-size:20px;
    padding:18px;
    border:none;
    border-radius:12px;
    width:100%;
    margin:10px 0;
    color:white;
}
</style>
</head>

<body>

<div class="container">

<h2>Linjekontroll v14</h2>

<label>Netteier</label>
<input id="netteier">

<label>LinjeID</label>
<input id="linje">

<label>Mast nr</label>
<input id="mast">

<button id="mastok" class="mastok morkgronn" onclick="toggleMastOK()">Mast OK</button>

<div id="liste"></div>

<button class="kontroll morkgronn" onclick="lagre()">Lagre mast</button>
<button class="kontroll morkgronn" onclick="nyMast()">Ny mast</button>
<button class="kontroll morkgronn" onclick="lastNed()">Last ned Excel</button>

</div>

<script>

let alleMaster = [];
let valgtData = {};
let valgtMerknad = {};
let mastOKstatus = false;

const kontrollpunkter = {
"Skjev mast/fundament":["Skjev"],
"Barduner":["Anvisere defekt","Slakk","Rust"],
"Stolper":["Råte","Sprekk"],
"Stålmast":["Armering synlig","Fundament erodert","Fundament oppsprukket"],
"Topphette":["Mangler","Defekt"],
"Traversfeste":["Defekt","Sprukket"],
"Travers":["Skade","Mosegrodd","Skjev"],
"Isolatorfeste":["Slitasje","Rust"],
"Isolator":["Sprukket","Knust","Krypestrømsvei"],
"Bendsling":["Korrosjon","Løs"],
"Liner":["Korrosjon","Kordelbrudd"],
"Strekking":["Skjev","Lav høyde"],
"Skjøter/klemmer":["Korrodert","Varmgang","Tape i klemme"],
"Topp/jordline":["Korrosjon","Beslag rust"],
"Jordinger":["Brudd","Løs"],
"Trasé":["Kratt","Sideskog","Underskog"],
"Merking":["Hinderlys","HS mangler","Mnr mangler","Farvannskilt"]
};

const container = document.getElementById("liste");

Object.keys(kontrollpunkter).forEach(navn => {

    let wrapper = document.createElement("div");

    let knapp = document.createElement("button");
    knapp.className = "kontroll morkgronn";
    knapp.innerText = navn;

    let avvikDiv = document.createElement("div");
    avvikDiv.className = "avvik hidden";

    kontrollpunkter[navn].forEach(avvik => {
        let b = document.createElement("button");
        b.innerText = avvik;

        b.onclick = () => {
            if(knapp.classList.contains("rod")){
                knapp.classList.remove("rod");
                knapp.classList.add("morkgronn");
                delete valgtData[navn];
            } else {
                knapp.classList.remove("morkgronn");
                knapp.classList.add("rod");
                valgtData[navn] = avvik;
            }
            avvikDiv.classList.add("hidden");
        };

        avvikDiv.appendChild(b);
    });

    let kameraInput = document.createElement("input");
    kameraInput.type = "file";
    kameraInput.accept = "image/*";
    kameraInput.capture = "environment";
    kameraInput.style.display = "none";

    let kameraKnapp = document.createElement("button");
    kameraKnapp.innerText = "📷 Ta bilde";
    kameraKnapp.className = "kamera hidden";
    kameraKnapp.onclick = () => kameraInput.click();

    let merknad = document.createElement("textarea");
    merknad.placeholder = "Merknad";
    merknad.classList.add("hidden");
    merknad.oninput = () => {
        valgtMerknad[navn] = merknad.value;
    };

    knapp.onclick = () => {
        avvikDiv.classList.toggle("hidden");
        kameraKnapp.classList.toggle("hidden");
        merknad.classList.toggle("hidden");
    };

    wrapper.appendChild(knapp);
    wrapper.appendChild(avvikDiv);
    wrapper.appendChild(kameraInput);
    wrapper.appendChild(kameraKnapp);
    wrapper.appendChild(merknad);

    container.appendChild(wrapper);
});

function toggleMastOK(){
    let btn = document.getElementById("mastok");
    mastOKstatus = !mastOKstatus;

    if(mastOKstatus){
        btn.classList.remove("morkgronn");
        btn.classList.add("lysgronn");
    } else {
        btn.classList.remove("lysgronn");
        btn.classList.add("morkgronn");
    }
}

function lagre(){
    let mast = {
        netteier: document.getElementById("netteier").value,
        linje: document.getElementById("linje").value,
        mastnr: document.getElementById("mast").value,
        mastOK: mastOKstatus,
        data: valgtData,
        merknad: valgtMerknad
    };
    alleMaster.push(mast);
    alert("Mast lagret");
}

function nyMast(){

    let netteier = document.getElementById("netteier").value;
    let linje = document.getElementById("linje").value;

    document.querySelectorAll("textarea").forEach(t=>t.value="");

    document.getElementById("netteier").value = netteier;
    document.getElementById("linje").value = linje;
    document.getElementById("mast").value = "";

    document.querySelectorAll(".kontroll").forEach(k=>{
        k.classList.remove("rod");
        k.classList.add("morkgronn");
    });

    document.getElementById("mastok").classList.remove("lysgronn");
    document.getElementById("mastok").classList.add("morkgronn");

    valgtData = {};
    valgtMerknad = {};
    mastOKstatus = false;
}

function lastNed(){

    let csv = "Netteier,LinjeID,Mastnr,Status,Punkt,Avvik,Merknad\n";

    alleMaster.forEach(m=>{
        if(m.mastOK){
            csv += `${m.netteier},${m.linje},${m.mastnr},OK,,,\n`;
        } else if(Object.keys(m.data).length === 0){
            csv += `${m.netteier},${m.linje},${m.mastnr},Ingen avvik,,,\n`;
        } else {
            Object.keys(m.data).forEach(punkt=>{
                csv += `${m.netteier},${m.linje},${m.mastnr},Avvik,${punkt},${m.data[punkt]},${m.merknad[punkt] || ""}\n`;
            });
        }
    });

    let blob = new Blob([csv], {type:"text/csv"});
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "linjekontroll.csv";
    a.click();
}
</script>

</body>
</html>
