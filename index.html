<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" sizes="180x180" href="./icon-180.png">
<meta name="theme-color" content="#2e7d32">

<title>Linjekontroll v19</title>

<style>

body {font-family: Arial; background:#f4f4f4; margin:0;}
.container {max-width:600px; margin:auto; padding:12px;}
h2 {text-align:center;}

label {
  font-weight:bold;
  font-size:18px;
  margin-top:10px;
  display:block;
}

input, textarea {
  width:100%;
  padding:12px;
  font-size:18px;
  margin-top:5px;
}

.kontrollpunkt {
  background:#2e7d32;
  color:white;
  padding:16px;
  margin-top:10px;
  border:none;
  width:100%;
  border-radius:10px;
  font-size:18px;
}

.avvik {
  background:#e0e0e0;
  padding:12px;
  margin-top:5px;
  border:none;
  width:100%;
  border-radius:8px;
}

.aktiv {background:#c62828 !important; color:white;}

.kamera {
  background:#2e7d32;
  color:white;
  padding:12px;
  margin-top:5px;
  border:none;
  width:100%;
  border-radius:8px;
}

.bunn {
  background:#1b5e20;
  color:white;
  padding:16px;
  margin-top:12px;
  border:none;
  width:100%;
  border-radius:10px;
  font-size:18px;
}

</style>
</head>

<body>
<div class="container">

<h2>Linjekontroll v19</h2>

<label>Netteier</label>
<input id="netteier">

<label>LinjeID</label>
<input id="linje">

<label>Mast nr</label>
<input id="mast">

<label>GPS</label>
<input id="gps">

<button class="kontrollpunkt" onclick="startGPS()">Slå på GPS</button>

<button class="kontrollpunkt" id="mastok" onclick="toggleMastOK()">Mast OK</button>

<!-- FUNDAMENT -->
<button class="kontrollpunkt" onclick="toggle('fundament')">Skjev mast/fundament</button>
<div id="fundament" style="display:none;">
  <button class="avvik" onclick="velg(this,'fundament')">Skjev</button>
  <button class="avvik" onclick="velg(this,'fundament')">Setning</button>
  <button class="avvik" onclick="velg(this,'fundament')">Fundamentfeil</button>
  <button class="kamera">📷 Ta bilde</button>
  <textarea placeholder="Merknad"></textarea>
</div>

<!-- BARDUN -->
<button class="kontrollpunkt" onclick="toggle('bardun')">Barduner</button>
<div id="bardun" style="display:none;">
  <button class="avvik" onclick="velg(this,'bardun')">Slakk</button>
  <button class="avvik" onclick="velg(this,'bardun')">Rust</button>
  <button class="avvik" onclick="velg(this,'bardun')">Brudd</button>
  <button class="kamera">📷 Ta bilde</button>
  <textarea placeholder="Merknad"></textarea>
</div>

<!-- ISOLATOR -->
<button class="kontrollpunkt" onclick="toggle('isolator')">Isolator</button>
<div id="isolator" style="display:none;">
  <button class="avvik" onclick="velg(this,'isolator')">Knust</button>
  <button class="avvik" onclick="velg(this,'isolator')">Krypestrøm</button>
  <button class="kamera">📷 Ta bilde</button>
  <textarea placeholder="Merknad"></textarea>
</div>

<button class="bunn" onclick="lagre()">Lagre mast</button>
<button class="bunn" onclick="lastNed()">Last ned Excel</button>
<button class="bunn" onclick="nyMast()">Ny mast</button>

</div>

<script>

let data = [];

/* GPS */
function startGPS(){
 navigator.geolocation.getCurrentPosition(pos=>{
  document.getElementById("gps").value =
  pos.coords.latitude.toFixed(6)+","+pos.coords.longitude.toFixed(6);
 });
}

/* Toggle visning */
function toggle(id){
 let el=document.getElementById(id);
 el.style.display = el.style.display==="none"?"block":"none";
}

/* Velg avvik */
function velg(btn, gruppe){
 document.querySelector(`#${gruppe}`).previousElementSibling.classList.add("aktiv");
}

/* Mast OK */
function toggleMastOK(){
 document.getElementById("mastok").classList.toggle("aktiv");
}

/* Lagre */
function lagre(){
 data.push({
  netteier: netteier.value,
  linje: linje.value,
  mast: mast.value,
  gps: gps.value
 });
 alert("Lagret");
}

/* Ny mast */
function nyMast(){
 mast.value="";
 gps.value="";
 document.querySelectorAll(".aktiv").forEach(e=>e.classList.remove("aktiv"));
 document.querySelectorAll("textarea").forEach(e=>e.value="");
 document.querySelectorAll("div").forEach(e=>e.style.display="none");
}

/* Excel */
function lastNed(){
 let csv="Netteier,Linje,Mast,GPS\n";
 data.forEach(d=>{
  csv+=`${d.netteier},${d.linje},${d.mast},${d.gps}\n`;
 });

 let blob=new Blob([csv]);
 let a=document.createElement("a");
 a.href=URL.createObjectURL(blob);
 a.download="linjekontroll.csv";
 a.click();
}

</script>

</body>
</html>
