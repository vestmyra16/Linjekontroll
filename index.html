<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Linjekontroll v16</title>

<style>
body { font-family: Arial; background:#f4f4f4; margin:0; }

.container {
    max-width:600px;
    margin:auto;
    padding:12px;
}

h2 { text-align:center; }

label {
    font-weight:bold;
    display:block;
    margin-top:10px;
}

input, textarea {
    width:100%;
    padding:12px;
    margin-top:5px;
    font-size:16px;
}

button {
    width:100%;
    padding:16px;
    margin-top:10px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:#2e7d32;
    color:white;
}

.kontrollpunkt {
    background:#2e7d32;
}

.kontrollpunkt.rød {
    background:#c62828;
}

.mastok {
    background:#2e7d32;
}

.mastok.aktiv {
    background:#66bb6a;
}

.detalj {
    display:none;
    margin-bottom:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>Linjekontroll v16</h2>

<label>Netteier</label>
<input id="netteier">

<label>LinjeID</label>
<input id="linje">

<label>Mast nr</label>
<input id="mastnr">

<label>GPS (Lat, Lon)</label>
<input id="gps" readonly>

<button onclick="startGPS()">Slå på GPS</button>
<button onclick="stopGPS()">Slå av GPS</button>

<button class="mastok" onclick="toggleMastOK(this)">Mast OK</button>

<!-- EKSEMPEL -->
<button class="kontrollpunkt" onclick="togglePunkt(this)">Barduner</button>

<div class="detalj">
    <button onclick="markerAvvik(this)">Rust</button>
    <button onclick="markerAvvik(this)">Slakk</button>

    <button>📷 Ta bilde</button>
    <input type="file" accept="image/*">

    <textarea placeholder="Merknad"></textarea>
</div>

<button onclick="nyMast()">Ny mast</button>

</div>

<script>

let gpsWatch = null;

// GPS START
function startGPS(){
    if(navigator.geolocation){
        gpsWatch = navigator.geolocation.watchPosition(pos=>{
            let lat = pos.coords.latitude.toFixed(6);
            let lon = pos.coords.longitude.toFixed(6);
            document.getElementById("gps").value = lat + ", " + lon;
        });
    } else {
        alert("GPS støttes ikke");
    }
}

// GPS STOPP
function stopGPS(){
    if(gpsWatch){
        navigator.geolocation.clearWatch(gpsWatch);
    }
}

// Toggle kontrollpunkt
function togglePunkt(btn){
    let detalj = btn.nextElementSibling;
    detalj.style.display = detalj.style.display === "block" ? "none" : "block";
}

// Marker avvik → gjør knapp rød
function markerAvvik(btn){
    let kontrollpunkt = btn.closest(".detalj").previousElementSibling;
    kontrollpunkt.classList.add("rød");
}

// Mast OK toggle
function toggleMastOK(btn){
    btn.classList.toggle("aktiv");
}

// 🔒 Ny mast
function nyMast(){

    let bekreft = confirm("Er du sikker på at du vil starte ny mast?");
    if(!bekreft) return;

    let netteier = document.getElementById("netteier").value;
    let linje = document.getElementById("linje").value;
    let gps = document.getElementById("gps").value;

    // Tøm alt
    document.querySelectorAll("input, textarea").forEach(e => e.value = "");

    // Behold disse
    document.getElementById("netteier").value = netteier;
    document.getElementById("linje").value = linje;
    document.getElementById("gps").value = gps;

    // Reset kontrollpunkt
    document.querySelectorAll(".kontrollpunkt").forEach(btn=>{
        btn.classList.remove("rød");
    });

    // Reset Mast OK
    document.querySelectorAll(".mastok").forEach(btn=>{
        btn.classList.remove("aktiv");
    });

    // Skjul detaljer
    document.querySelectorAll(".detalj").forEach(d=>{
        d.style.display = "none";
    });

    // Fjern bilder
    document.querySelectorAll("input[type='file']").forEach(f=>{
        f.value = "";
    });
}

</script>

</body>
</html>
