<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linjekontroll v24</title>

<style>
body { font-family:Arial; background:#f4f4f4; margin:0; }
.container { max-width:600px; margin:auto; padding:12px; }

h2 { text-align:center; }

label { font-weight:bold; display:block; margin-top:10px; }
input, textarea {
 width:100%;
 padding:12px;
 margin-top:5px;
 font-size:16px;
}

button {
 width:100%;
 padding:16px;
 margin-top:8px;
 border:none;
 border-radius:10px;
 font-size:16px;
}

/* Kontrollpunkt */
.kontroll { background:#2e7d32; color:white; }

/* Avvik */
.avvik { background:#ccc; }

/* Aktiv */
.aktiv { background:#c62828 !important; color:white; }

/* Skjult */
.hidden { display:none; }
</style>
</head>

<body>
<div class="container">

<h2>Linjekontroll v24</h2>

<label>Netteier</label>
<input id="netteier">

<label>LinjeID</label>
<input id="linje">

<label>Mast nr</label>
<input id="mast">

<label>GPS</label>
<input id="gps">

<button class="kontroll" onclick="gps()">Slå på GPS</button>

<button id="mastok" class="kontroll" onclick="toggleAktiv(this)">Mast OK</button>

<!-- ===== KONTROLLPUNKT ===== -->

<div id="punkter"></div>

<!-- ===== FUNKSJONSKNAPPER ===== -->

<button class="kontroll" onclick="lagre()">Lagre mast</button>
<button class="kontroll" onclick="excel()">Last ned Excel</button>
<button class="kontroll" onclick="ny()">Ny mast</button>

</div>

<script>

/* GPS */
function gps(){
 navigator.geolocation.getCurrentPosition(p=>{
  document.getElementById("gps").value =
  p.coords.latitude.toFixed(6)+","+p.coords.longitude.toFixed(6);
 });
}

/* Toggle kontroll */
function toggleAktiv(el){
 el.classList.toggle("aktiv");
}

/* Åpne/lukke */
function åpne(id){
 document.querySelectorAll(".gruppe").forEach(e=>e.classList.add("hidden"));
 document.getElementById(id).classList.remove("hidden");
}

/* Velg avvik */
function velg(btn){
 btn.classList.toggle("aktiv");
}

/* DATA – ALLE KONTROLLPUNKT */
const data = [
 {navn:"Skjev mast/fundament", avvik:["Skjev"]},
 {navn:"Barduner", avvik:["Løs","Brudd"]},
 {navn:"Stolper", avvik:["Råte","Skade"]},
 {navn:"Stålmast", avvik:["Rust","Skade"]},
 {navn:"Topphatte", avvik:["Løs","Skade"]},
 {navn:"Traversfeste", avvik:["Løs","Skade"]},
 {navn:"Travers", avvik:["Skade","Skjev"]},
 {navn:"Isolatorfeste", avvik:["Løs","Skade"]},
 {navn:"Isolator", avvik:["Knust","Krypestrøm"]},
 {navn:"Bendsling", avvik:["Løs","Brudd"]},
 {navn:"Liner", avvik:["Korrosjon","Kordelbrudd"]},
 {navn:"Strekking", avvik:["Skjev"]},
 {navn:"Merking", avvik:["HS mangler","Mnr mangler"]},
 {navn:"Trase", avvik:["Skog","Kratt"]}
];

/* GENERER UI */
let html = "";

data.forEach((p,i)=>{

 let id="g"+i;

 html += `
<button class="kontroll" onclick="åpne('${id}')">${p.navn}</button>

<div id="${id}" class="gruppe hidden">
`;

 p.avvik.forEach(a=>{
  html += `<button class="avvik" onclick="velg(this)">${a}</button>`;
 });

 html += `<textarea placeholder="Merknad"></textarea></div>`;
});

document.getElementById("punkter").innerHTML = html;

/* Lagre */
function lagre(){
 alert("Mast lagret");
}

/* Excel */
function excel(){
 alert("Excel eksport kommer");
}

/* Ny mast */
function ny(){
 document.querySelectorAll(".aktiv").forEach(e=>e.classList.remove("aktiv"));
 document.querySelectorAll(".gruppe").forEach(e=>e.classList.add("hidden"));
 document.querySelectorAll("textarea").forEach(e=>e.value="");
 document.getElementById("mast").value="";
 document.getElementById("gps").value="";
}

</script>

</body>
</html>
