<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linjekontroll</title>

<style>
body { font-family: Arial; background:#f2f2f2; }
.container { max-width:600px; margin:auto; padding:10px; }

button {
    width:100%;
    padding:14px;
    margin:5px 0;
    border-radius:10px;
    border:2px solid #ccc;
    background:#eee;
    font-size:15px;
}

button.red { background:#ffcccc; border-color:red; }
button.green { background:#ccffcc; border-color:green; }

.hidden { display:none; }

select, textarea {
    width:100%;
    margin-top:5px;
    padding:8px;
}
</style>
</head>

<body>

<div class="container">

<h3>Linjekontroll</h3>

<label>Netteier</label>
<input id="netteier">

<label>LinjeID</label>
<input id="linje">

<label>Mastnr</label>
<input id="mastnr" type="number" value="1">

<label>GPS</label>
<input id="gps">

<button id="mastok" onclick="mastOK()">Ingen synlige avvik – Mast OK</button>

<div id="kontrollpunkter"></div>

<button onclick="lagreMast()">Lagre mast</button>
<button onclick="lastNed()">Last ned Excel</button>
<button onclick="nyMast()">Ny mast</button>

</div>

<script>

const data = [];

const kontroll = {
"Skjev mast/fundament":["Skjev"],
"Barduner":["Anvisere defekt","Slakk","Rust"],
"Stolper":["Råte","Sprekk"],
"Stålmast":["Armering synlig","Fundament erodert","Fundament oppsprukket"],
"Topphette":["Mangler","Defekt"],
"Traversfeste":["Defekt","Sprukket"],
"Travers":["Skade","Mosegrodd","Skjev"],
"Isolatorfeste":["Slitasje","Rust"],
"Isolator":["Sprukket","Knust","Krypestrømsvei"],
"Bendsling":["Korrosjon","Løs"],
"Liner":["Korrosjon","Kordelbrudd"],
"Strekking":["Skjev","Lav høyde"],
"Skjøter/klemmer":["Korrodert","Varmgang","Tape i klemme"],
"Topp/jordline":["Korrosjon","Beslag rust"],
"Jordinger":["Brudd","Løs"],
"Trasé":["Kratt","Sideskog","Underskog"],
"Merking":["Hinderlys","HS mangler","Mnr mangler","Farvannskilt"]
};

const container = document.getElementById("kontrollpunkter");

Object.keys(kontroll).forEach(punkt=>{
    let div = document.createElement("div");

    let btn = document.createElement("button");
    btn.innerText = punkt;

    let select = document.createElement("select");
    select.classList.add("hidden");

    kontroll[punkt].forEach(avvik=>{
        let opt = document.createElement("option");
        opt.value = avvik;
        opt.text = avvik;
        select.appendChild(opt);
    });

    let tekst = document.createElement("textarea");
    tekst.placeholder = "Merknad";
    tekst.classList.add("hidden");

    let bilde = document.createElement("input");
    bilde.type="file";
    bilde.accept="image/*";
    bilde.capture="camera";
    bilde.classList.add("hidden");

    btn.onclick = ()=>{
        btn.classList.add("red");
        select.classList.remove("hidden");
        tekst.classList.remove("hidden");
        bilde.classList.remove("hidden");
    };

    div.appendChild(btn);
    div.appendChild(select);
    div.appendChild(tekst);
    div.appendChild(bilde);

    container.appendChild(div);
});

function mastOK(){
    document.getElementById("mastok").classList.add("green");
}

function lagreMast(){

    let mast = {
        netteier:document.getElementById("netteier").value,
        linje:document.getElementById("linje").value,
        mastnr:document.getElementById("mastnr").value,
        gps:document.getElementById("gps").value,
        avvik:[]
    };

    document.querySelectorAll("#kontrollpunkter div").forEach(div=>{
        let btn = div.querySelector("button");
        let select = div.querySelector("select");
        let tekst = div.querySelector("textarea");

        if(btn.classList.contains("red")){
            mast.avvik.push({
                punkt:btn.innerText,
                type:select.value,
                merknad:tekst.value
            });
        }
    });

    data.push(mast);
    alert("Mast lagret");
}

function nyMast(){

    let netteier = document.getElementById("netteier").value;
    let linje = document.getElementById("linje").value;

    document.querySelectorAll("input, textarea").forEach(e=>e.value="");

    document.getElementById("netteier").value = netteier;
    document.getElementById("linje").value = linje;

    document.getElementById("mastnr").value++;

    document.querySelectorAll("button").forEach(b=>{
        b.classList.remove("red","green");
    });

    document.querySelectorAll("select, textarea, input[type=file]").forEach(e=>{
        e.classList.add("hidden");
    });
}

function lastNed(){

    let csv = "Netteier,Linje,Mastnr,GPS,Punkt,Avvik,Merknad\n";

    data.forEach(m=>{
        if(m.avvik.length===0){
            csv += `${m.netteier},${m.linje},${m.mastnr},${m.gps},OK,,\n`;
        } else {
            m.avvik.forEach(a=>{
                csv += `${m.netteier},${m.linje},${m.mastnr},${m.gps},${a.punkt},${a.type},${a.merknad}\n`;
            });
        }
    });

    let blob = new Blob([csv], {type:"text/csv"});
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "linjekontroll.csv";
    a.click();
}

</script>

</body>
</html>
