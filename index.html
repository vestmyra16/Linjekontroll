<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linjekontroll v28</title>
    <meta name="author" content="Opphavsrett 2026 - vestmyra16">
    <link rel="apple-touch-icon" href="icon-180.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2e7d32">
    <style>
        /* Sikkerhet: Hindre tekstmarkering og kopiering */
        body {
            font-family: Arial, sans-serif; background:#f4f4f4; margin:0;
            -webkit-user-select: none; user-select: none;
        }
        
        /* Vannmerke */
        .vannmerke {
            position: fixed; top: 10px; right: 10px; z-index: 9999;
            font-size: 10px; color: rgba(0,0,0,0.1); pointer-events: none;
        }

        .container {max-width:600px; margin:auto; padding:12px;}
        h2 {text-align:center;}
        label {font-weight:bold; display:block; margin-top:10px;}
        input, textarea, select {width:100%; padding:15px; margin-top:5px; font-size:18px; border:1px solid #ccc; border-radius:8px; box-sizing: border-box; background: white;}
        
        button {
            width:100%; padding:20px; margin-top:10px; border:none; border-radius:12px; 
            font-size:18px; font-weight:bold; touch-action: manipulation; cursor: pointer;
        }
        .kp {background:#2e7d32; color:white;}
        .kp.ok { background:#66bb6a; }
        .kp.avvik { background:#c62828; }
        .avvik {background:#ccc; color:#000; margin-top:5px;}
        .avvik.valgt { background:#ef9a9a; border: 2px solid #c62828; font-weight: bold; }
        .avvik.valgt-ok { background:#a5d6a7; border: 2px solid #2e7d32; font-weight: bold; }
        .green {background:#2e7d32; color:white;}
        .lightgreen {background:#4caf50; color:white; margin-bottom: 20px; border: 3px solid #1b5e20;}
        .darkgreen {background:#1b5e20; color:white;}
        
        #loginBox { max-width:400px; margin:60px auto; padding:25px; background:#fff; border:1px solid #ccc; border-radius:12px; text-align: center; }
        .skjult { display: none !important; }

        .stolpe-valg-boks {
            background: #fff; border: 2px dashed #c62828; border-radius: 8px; padding: 10px; margin-top: 5px; box-sizing: border-box;
        }
        .stolpe-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px; margin-top: 5px; }
        .stolpe-grid button { padding: 12px 2px; font-size: 14px; margin-top: 0; background: #eee; color: #000; border: 1px solid #ccc; border-radius: 6px; }
        .stolpe-grid button.aktiv { background: #c62828; color: white; font-weight: bold; border-color: #c62828; }
        .dyplenke-knapp { background: #2e7d32; color: white; text-decoration: none; display: block; text-align: center; padding: 15px; margin-top: 10px; border-radius: 8px; font-weight: bold; font-size: 16px; box-sizing: border-box; }
    </style>
</head>
<body>
<div class="vannmerke">Kun for autorisert bruk - Vestmyra16</div>

<div id="loginBox">
    <h3>Logg inn - Linjekontroll v28</h3>
    <label>Passord</label>
    <input type="password" id="pass" style="text-align: center; margin-bottom: 15px;">
    <button onclick="sjekkPassord()">Logg inn</button>
</div>

<div id="containerApp" class="container skjult">
    <h2>Linjekontroll v28</h2>
    <button class="lightgreen" onclick="nyttAnlegg()">➕ NYTT ANLEGG / ENDRE ANLEGG</button>
    <label>Netteier</label> <input id="netteier">
    <label>LinjeID</label> <input id="linje">
    <hr style="margin:20px 0;">
    <label>Mast nr</label> <input id="mast">
    <label>Mast type</label>
    <select id="mastType" onchange="sjekkMastType(this.value)">
        <option value="E">E</option>
        <option value="H" selected>H</option>
        <option value="DH">DH</option>
        <option value="3H">3H</option>
        <option value="2A">2A</option>
        <option value="3A">3A</option>
        <option value="Annet">Annen type...</option>
    </select>
    <div id="egendefinertMastDiv" class="skjult">
        <label>Skriv inn mast type</label>
        <input id="egenMastType" placeholder="F.eks. Portal, Gitter...">
    </div>
    <label>Vertikalkrefter</label>
    <select id="vertikalkraft">
        <option value="Lav">Lav</option>
        <option value="Normal" selected>Normal</option>
        <option value="Høy">Høy</option>
    </select>
    <label>GPS</label> <input id="gps">
    <button class="green" onclick="startGPS()">Slå på GPS</button>
    <button class="green" onclick="stopGPS()">Slå av GPS</button>
    <div id="punkter"></div>
    <button class="darkgreen" onclick="lagre()">Lagre mast</button>
    <button class="darkgreen" onclick="lastNed()">Last ned Excel</button>
    <button class="green" onclick="nyMast()">Neste mast</button>
</div>

<script>
    // 🔒 START SIKKERHETSLÅS
    document.addEventListener("DOMContentLoaded", () => {
        // Sperr for høyreklikk og kopiering
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.addEventListener('copy', event => event.preventDefault());

        const gyldigDomene = "vestmyra16.github.io";
        if (window.location.hostname !== "" && window.location.hostname !== gyldigDomene) {
            document.body.innerHTML = ""; 
            return; 
        }

        const utlopsDato = new Date("2026-07-13");
        if (new Date() > utlopsDato) {
            alert("Testperioden er utløpt.");
            window.location.href = "about:blank";
            return;
        }

        if (localStorage.getItem("linje_innlogget") === "ja") {
            visAppen();
        }
    });
    // 🔒 SLUTT SIKKERHETSLÅS

    function sjekkPassord() {
        const input = document.getElementById("pass").value;
        if (input === "1234") { 
            localStorage.setItem("linje_innlogget", "ja");
            visAppen();
        } else {
            alert("Feil passord!");
        }
    }

    function visAppen() {
        document.getElementById("loginBox").classList.add("skjult");
        document.getElementById("containerApp").classList.remove("skjult");
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('retur') === 'ja') {
            if (urlParams.get('netteier')) document.getElementById('netteier').value = urlParams.get('netteier');
            if (urlParams.get('linje')) document.getElementById('linje').value = urlParams.get('linje');
            if (urlParams.get('mast')) document.getElementById('mast').value = urlParams.get('mast');
        }
        render();
    }

    let gpsWatch = null;
    let data = JSON.parse(localStorage.getItem('linjekontroll_data')) || [];
    let status = {};
    let valgtStolpeNrForRaate = ""; 

    let punkter = [
        {navn:"Mast OK", avvik:[]},
        {navn:"Skjev mast/fundament", avvik:["Skjev","Fundament feil"]},
        {navn:"Barduner", avvik:["Løs","Brudd","Korrosjon"]},
        {navn:"Stolper", avvik:["Stolper OK","Råte","Skade"]},
        {navn:"Stålmast", avvik:["Rust","Skade"]},
        {navn:"Topphette", avvik:["Mangler","Defekt"]},
        {navn:"Traversfeste", avvik:["Bruddanvisning","Skade"]},
        {navn:"Travers", avvik:["Mosegrodd","Råte","Skade"]},
        {navn:"Isolatorfeste", avvik:["Slitasje"]},
        {navn:"Isolator", avvik:["Knust","Krypestrøm"]},
        {navn:"Bendsling", avvik:["Løs","Brudd"]},
        {navn:"Liner", avvik:["Korrodert","Kordellbrudd"]},
        {navn:"Strekking", avvik:["Skjev"]},
        {navn:"Topp/jordline", avvik:["Korrodert","Kordellbrudd"]},
        {navn:"Merking", avvik:["HS mangler","Mnr mangler"]},
        {navn:"Trase", avvik:["Skog","Kratt"]}
    ];

    function nyttAnlegg() {
        if(confirm("Vil du starte et nytt anlegg? Dette tømmer Netteier og LinjeID.")) {
            document.getElementById("netteier").value = "";
            document.getElementById("linje").value = "";
            document.getElementById("mast").value = "";
            status = {};
            valgtStolpeNrForRaate = "";
            render();
            window.scrollTo(0,0);
        }
    }

    function sjekkMastType(verdi) {
        let egenDiv = document.getElementById("egendefinertMastDiv");
        if (verdi === "Annet") {
            egenDiv.classList.remove("skjult");
        } else {
            egenDiv.classList.add("skjult");
            document.getElementById("egenMastType").value = "";
        }
    }

    function render(){
        let html = "";
        punkter.forEach((p,i)=>{
            let cls = "kp";
            if(status[i] == "ok") cls += " ok";
            if(status[i] && status[i].indexOf("avvik:") === 0) cls += " avvik";
            
            html += `<button class="${cls}" onclick="toggle(${i})">${p.navn}</button>`;
            
            if(p.avvik.length > 0 && (status[i] == "vis" || (status[i] && status[i].indexOf("avvik:") === 0))){
                p.avvik.forEach(a=>{
                    let avvikCls = "avvik";
                    if(status[i] === "avvik:" + a) {
                        avvikCls += (a === "Stolper OK") ? " valgt-ok" : " valgt";
                    }
                    html += `<button class="${avvikCls}" onclick="settAvvik(${i}, '${a}')">${a}</button>`;
                });

                if(p.navn === "Stolper" && status[i] && (status[i] === "avvik:Råte" || status[i] === "avvik:Skade")) {
                    html += `<div class="stolpe-valg-boks">`;
                    html += `<label style="margin-top:0; font-size:14px; color:#c62828;">Hvilken stolpe (1-12) har råte/skade?</label>`;
                    html += `<div class="stolpe-grid">`;
                    for(let s=1; s<=12; s++) {
                        let aktivCls = (valgtStolpeNrForRaate == s) ? "aktiv" : "";
                        html += `<button class="${aktivCls}" onclick="velgStolpeForLenke(${s})">${s}</button>`;
                    }
                    html += `</div>`;
                    
                    if(valgtStolpeNrForRaate !== "") {
                        let n_eier = encodeURIComponent(document.getElementById("netteier").value || "");
                        let l_id = encodeURIComponent(document.getElementById("linje").value || "");
                        let m_nr = encodeURIComponent(document.getElementById("mast").value || "");
                        let url = `https://vestmyra16.github.io/stolpekontroll/?netteier=${n_eier}&linje=${l_id}&mast=${m_nr}&stolpenr=${valgtStolpeNrForRaate}`;
                        html += `<a href="${url}" class="dyplenke-knapp">🚀 Åpne Stolpekontroll for Stolpe ${valgtStolpeNrForRaate}</a>`;
                    }
                    html += `</div>`;
                }
                html += `<textarea placeholder="📸 Husk bilde! Merknad:" id="m${i}" onblur="lagreMerknad(this, ${i})">${status["m"+i] || ""}</textarea>`;
            }
        });
        document.getElementById("punkter").innerHTML = html;
    }

    function velgStolpeForLenke(nr) {
        valgtStolpeNrForRaate = nr;
        render(); 
    }

    function lagreMerknad(el, i) { status["m"+i] = el.value; }

    function toggle(i) {
        if (status[i] === "vis" || status[i] === "ok" || (status[i] && status[i].indexOf("avvik:") === 0)) {
            delete status[i];
            delete status["m"+i];
            if(punkter[i].navn === "Stolper") valgtStolpeNrForRaate = ""; 
        } else {
            status[i] = (punkter[i].navn === "Mast OK") ? "ok" : "vis";
        }
        render();
    }

    function settAvvik(i, avviksTekst) { 
        status[i] = "avvik:" + avviksTekst; 
        if(punkter[i].navn === "Stolper" && avviksTekst !== "Råte" && avviksTekst !== "Skade") {
            valgtStolpeNrForRaate = ""; 
        }
        render(); 
    }

    function startGPS() {
        if (navigator.geolocation) {
            gpsWatch = navigator.geolocation.watchPosition(p => {
                document.getElementById("gps").value = p.coords.latitude.toFixed(6)+", "+p.coords.longitude.toFixed(6);
            }, e => alert("GPS-feil"), {enableHighAccuracy: true});
        }
    }

    function stopGPS() { if(gpsWatch) navigator.geolocation.clearWatch(gpsWatch); }

    function lagre() {
        let valgtType = document.getElementById("mastType").value;
        if (valgtType === "Annet") valgtType = document.getElementById("egenMastType").value || "Uoppgitt";

        let rad = {
            netteier: document.getElementById("netteier").value,
            linje: document.getElementById("linje").value,
            mast: document.getElementById("mast").value,
            mastType: valgtType,
            vertikalkraft: document.getElementById("vertikalkraft").value,
            gps: document.getElementById("gps").value,
            punkter: punkter.map((p,i) => ({navn:p.navn, status:status[i]||"", merknad:status["m"+i]||""}))
        };
        data.push(rad);
        localStorage.setItem('linjekontroll_data', JSON.stringify(data));
        alert("Mast " + rad.mast + " lagret!");
    }

    function lastNed() {
        if (data.length === 0) return;
        let csv = "\ufeffNetteier;Linje;Mast;Masttype;Vertikalkrefter;GPS;Kontrollpunkt;Status;Merknad\n";
        data.forEach(d => {
            d.punkter.forEach(p => {
                if (p.status !== "") {
                    let visStatus = p.status;
                    if(visStatus.indexOf("avvik:") === 0) {
                        visStatus = visStatus.replace("avvik:", "");
                    }
                    if(visStatus === "Stolper OK") {
                        visStatus = "OK";
                    }
                    let merknadRenset = (p.merknad || "").replace(/(\r\n|\n|\r|;)/gm, " ");
                    csv += `"${d.netteier}";"${d.linje}";"${d.mast}";"${d.mastType}";"${d.vertikalkraft}";"${d.gps}";"${p.navn}";"${visStatus}";"${merknadRenset}"\n`;
                }
            });
        });
        let blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
        let a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "linjekontroll_eksport.csv";
        a.click();
    }

    function nyMast() {
        document.getElementById("mast").value = "";
        document.getElementById("mastType").value = "H";
        sjekkMastType("H");
        status = {};
        valgtStolpeNrForRaate = ""; 
        render();
        window.scrollTo(0,0);
    }
</script>
</body>
</html>
