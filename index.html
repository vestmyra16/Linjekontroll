<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- PWA / IKON FIX -->
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" sizes="180x180" href="./icon-180.png">
<link rel="apple-touch-icon" sizes="192x192" href="./icon-192.png">
<link rel="apple-touch-icon" sizes="512x512" href="./icon-512.png">
<meta name="theme-color" content="#2e7d32">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>Linjekontroll v18</title>

<style>

body {
    font-family: Arial;
    background:#f4f4f4;
    margin:0;
}

.container {
    max-width:600px;
    margin:auto;
    padding:14px;
}

h2 {
    text-align:center;
    font-size:26px;
}

/* TEKST TYDELIG */
label {
    font-weight:bold;
    font-size:18px;
    display:block;
    margin-top:12px;
}

input, textarea {
    width:100%;
    padding:14px;
    font-size:18px;
    margin-top:6px;
    border:1px solid #ccc;
    border-radius:6px;
}

/* KONTROLLPUNKT (GRØNN) */
.kontrollpunkt {
    background:#2e7d32;
    color:white;
    width:100%;
    padding:18px;
    margin-top:12px;
    border:none;
    border-radius:12px;
    font-size:20px;
}

/* AVVIK (GRÅ) */
.avvik {
    background:#e0e0e0;
    color:black;
    width:100%;
    padding:14px;
    margin-top:6px;
    border:none;
    border-radius:8px;
    font-size:18px;
}

/* AKTIV (RØD) */
.aktiv {
    background:#c62828 !important;
    color:white;
}

/* KAMERA */
.kamera {
    background:#2e7d32;
    color:white;
    width:100%;
    padding:14px;
    margin-top:6px;
    border:none;
    border-radius:10px;
    font-size:18px;
}

/* GPS */
.gpsknapp {
    background:#2e7d32;
    color:white;
    padding:12px;
    border:none;
    width:100%;
    border-radius:10px;
    margin-top:8px;
    font-size:18px;
}

/* BUNNKNAPPER */
.bunn {
    background:#1b5e20;
    color:white;
    width:100%;
    padding:16px;
    margin-top:14px;
    border:none;
    border-radius:12px;
    font-size:20px;
}

</style>
</head>

<body>
<div class="container">

<h2>Linjekontroll v18</h2>

<label>Netteier</label>
<input id="netteier">

<label>LinjeID</label>
<input id="linje">

<label>Mast nr</label>
<input id="mast">

<label>GPS (Lat, Lon)</label>
<input id="gps">
<button class="gpsknapp" onclick="startGPS()">Slå på GPS</button>
<button class="gpsknapp" onclick="stopGPS()">Slå av GPS</button>

<button class="kontrollpunkt" id="mastok" onclick="toggleMastOK()">Mast OK</button>

<!-- KONTROLLPUNKT -->
<button class="kontrollpunkt" onclick="toggle('fundament')">Skjev mast/fundament</button>
<div id="fundament" style="display:none;">
    <button class="avvik" onclick="velg(this,'fundament')">Skjev</button>
    <button class="avvik" onclick="velg(this,'fundament')">Setning</button>
    <button class="avvik" onclick="velg(this,'fundament')">Fundamentfeil</button>
    <button class="kamera">📷 Ta bilde</button>
    <textarea placeholder="Merknad"></textarea>
</div>

<button class="kontrollpunkt" onclick="toggle('bardun')">Barduner</button>
<div id="bardun" style="display:none;">
    <button class="avvik" onclick="velg(this,'bardun')">Slakk</button>
    <button class="avvik" onclick="velg(this,'bardun')">Rust</button>
    <button class="avvik" onclick="velg(this,'bardun')">Brudd</button>
    <button class="kamera">📷 Ta bilde</button>
    <textarea placeholder="Merknad"></textarea>
</div>

<button class="kontrollpunkt" onclick="toggle('isolator')">Isolator</button>
<div id="isolator" style="display:none;">
    <button class="avvik" onclick="velg(this,'isolator')">Knust</button>
    <button class="avvik" onclick="velg(this,'isolator')">Krypestrøm</button>
    <button class="kamera">📷 Ta bilde</button>
    <textarea placeholder="Merknad"></textarea>
</div>

<!-- BUNN -->
<button class="bunn" onclick="lagre()">Lagre mast</button>
<button class="bunn" onclick="lastNed()">Last ned Excel</button>
<button class="bunn" onclick="nyMast()">Ny mast</button>

</div>

<script>

/* GPS */
let watchId;

function startGPS(){
    if(navigator.geolocation){
        watchId = navigator.geolocation.watchPosition(pos=>{
            document.getElementById("gps").value =
            pos.coords.latitude.toFixed(6)+", "+pos.coords.longitude.toFixed(6);
        });
    }
}

function stopGPS(){
    navigator.geolocation.clearWatch(watchId);
}

/* TOGGLE FELT */
function toggle(id){
    let el = document.getElementById(id);
    el.style.display = (el.style.display==="none") ? "block" : "none";
}

/* AVVIK -> RØDT KONTROLLPUNKT */
function velg(btn, gruppe){
    let parent = document.getElementById(gruppe);
    parent.previousElementSibling.classList.add("aktiv");
}

/* MAST OK toggle */
function toggleMastOK(){
    let btn = document.getElementById("mastok");
    btn.classList.toggle("aktiv");
}

/* LAGRE */
let data = [];

function lagre(){
    data.push({
        netteier: document.getElementById("netteier").value,
        linje: document.getElementById("linje").value,
        mast: document.getElementById("mast").value,
        gps: document.getElementById("gps").value
    });
    alert("Lagret");
}

/* NY MAST */
function nyMast(){
    document.getElementById("mast").value="";
    document.getElementById("gps").value="";
    document.querySelectorAll("textarea").forEach(e=>e.value="");
    document.querySelectorAll(".aktiv").forEach(e=>e.classList.remove("aktiv"));
}

/* LAST NED */
function lastNed(){
    let csv = "Netteier,Linje,Mast,GPS\n";
    data.forEach(d=>{
        csv += `${d.netteier},${d.linje},${d.mast},${d.gps}\n`;
    });

    let blob = new Blob([csv], {type:'text/csv'});
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "linjekontroll.csv";
    a.click();
}

</script>

</body>
</html>
