<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Linjekontroll v18</title>

<style>
body { font-family: Arial; background:#f4f4f4; margin:0; }
.container { max-width:600px; margin:auto; padding:12px; }

h2 { text-align:center; }

label { font-weight:bold; display:block; margin-top:10px; }

input, textarea {
    width:100%;
    padding:12px;
    margin-top:5px;
    font-size:16px;
}

/* Kontrollpunkt (GRØNN) */
.kontrollpunkt {
    background:#2e7d32;
    color:white;
    width:100%;
    padding:16px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    font-size:18px;
}

/* Avvik (GRÅ) */
.avvik {
    background:#cccccc;
    color:black;
    width:100%;
    padding:14px;
    margin-top:6px;
    border:none;
    border-radius:8px;
}

/* RØD når feil */
.kontrollpunkt.rød {
    background:#c62828;
}

/* Mast OK */
.mastok {
    background:#2e7d32;
}
.mastok.aktiv {
    background:#66bb6a;
}

button {
    width:100%;
    padding:16px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    font-size:18px;
    background:#2e7d32;
    color:white;
}

.detalj { display:none; }

/* Skjul "Ingen fil valgt" */
input[type="file"] {
    color:transparent;
}
input[type="file"]::-webkit-file-upload-button {
    visibility:hidden;
}
</style>
</head>

<body>
<div class="container">

<h2>Linjekontroll v18</h2>

<label>Netteier</label>
<input id="netteier">

<label>LinjeID</label>
<input id="linje">

<label>Mast nr</label>
<input id="mastnr">

<label>GPS</label>
<input id="gps" readonly>

<button onclick="startGPS()">Slå på GPS</button>
<button onclick="stopGPS()">Slå av GPS</button>

<button class="mastok" onclick="toggleMastOK(this)">Mast OK</button>

<div id="punkter"></div>

<button onclick="lagre()">Lagre mast</button>
<button onclick="lastNedExcel()">Last ned Excel</button>
<button onclick="nyMast()">Ny mast</button>

</div>

<script>

// Kontrollpunkter
const data = [
["Skjev mast/fundament",["Skjev","Setning","Fundamentfeil"]],
["Barduner",["Rust","Slakk","Brudd"]],
["Stolper",["Råte","Sprekk"]],
["Stålmast",["Korrosjon","Skade"]],
["Topphette",["Manglende","Skadet"]],
["Traversfeste",["Løs","Skade"]],
["Travers",["Skjev","Skade"]],
["Isolatorfeste",["Løs","Korrosjon"]],
["Isolator",["Knust","Krypestrøm"]],
["Bendsling",["Løs","Brudd"]],
["Liner",["Kordelbrudd","Korrosjon"]],
["Strekking",["Skjev"]],
["Skjøter/klemmer",["Korrosjon","Brudd"]],
["Topp/jordline og beslag",["Skade","Løs"]],
["Jordinger",["Brudd","Løs"]],
["Trasé",["Skog","Kratt"]],
["Merking",["Mangler","Defekt"]]
];

// Lag UI
let html="";
data.forEach(p=>{
    html += `<button class="kontrollpunkt" onclick="toggle(this)">${p[0]}</button>`;
    html += `<div class="detalj">`;

    p[1].forEach(a=>{
        html += `<button class="avvik" onclick="avvik(this)">${a}</button>`;
    });

    html += `
    <button>📷 Ta bilde</button>
    <input type="file" accept="image/*">
    <textarea placeholder="Merknad"></textarea>
    </div>`;
});
document.getElementById("punkter").innerHTML = html;

// Funksjoner
function toggle(btn){
    let d = btn.nextElementSibling;
    d.style.display = d.style.display==="block"?"none":"block";
}

function avvik(btn){
    let k = btn.closest(".detalj").previousElementSibling;
    k.classList.add("rød");
}

function toggleMastOK(btn){
    btn.classList.toggle("aktiv");
}

// GPS
let watch=null;
function startGPS(){
    watch = navigator.geolocation.watchPosition(p=>{
        gps.value = p.coords.latitude.toFixed(6)+", "+p.coords.longitude.toFixed(6);
    });
}
function stopGPS(){
    if(watch) navigator.geolocation.clearWatch(watch);
}

// Lagre (placeholder)
function lagre(){
    alert("Mast lagret");
}

// Excel (placeholder)
function lastNedExcel(){
    alert("Excel eksport kommer");
}

// Ny mast
function nyMast(){

    if(!confirm("Er du sikker på ny mast?")) return;

    let n = netteier.value;
    let l = linje.value;
    let g = gps.value;

    document.querySelectorAll("input, textarea").forEach(e=>e.value="");

    netteier.value = n;
    linje.value = l;
    gps.value = g;

    document.querySelectorAll(".kontrollpunkt").forEach(b=>b.classList.remove("rød"));
    document.querySelectorAll(".detalj").forEach(d=>d.style.display="none");
    document.querySelectorAll(".mastok").forEach(b=>b.classList.remove("aktiv"));
}
</script>

</body>
</html>
