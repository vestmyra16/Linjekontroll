<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Linjekontroll v1.7</title>

<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="icon" href="./icon-192.png">

<style>

body {
font-family: Arial;
margin:0;
background:#f2f2f2;
}

/* HEADER */
.header {
background:white;
padding:10px;
position:sticky;
top:0;
z-index:10;
border-bottom:2px solid #ccc;
}

h2 { margin:5px 0; }

label {
display:block;
font-weight:bold;
color:black;
margin-top:6px;
}

input, textarea {
width:100%;
padding:10px;
margin:4px 0;
font-size:15px;
border:1px solid #999;
border-radius:6px;
}

#gps {
font-size:12px;
margin-bottom:5px;
}

/* BUTTONS */
button {
width:100%;
padding:16px;
margin:4px 0;
border:none;
border-radius:8px;
font-size:16px;
}

.cat {
background:#2e7d32;
color:white;
font-weight:bold;
}

.option {
background:#e0e0e0;
}

.bottom {
background:#ccc;
}

.camera {
background:#0288d1;
color:white;
}

</style>
</head>

<body>

<div class="header">

<h2>Linjekontroll v1.7</h2>

<label>Netteier</label>
<input id="netteier">

<label>LinjeID</label>
<input id="linje">

<label>Mast nr</label>
<input id="mast">

<div id="gps">GPS henter...</div>

<button class="cat" onclick="mastOK()">Mast OK</button>

</div>

<div id="app"></div>

<div style="padding:10px;">
<button class="bottom" onclick="next()">Neste mast</button>
<button class="bottom" onclick="excel()">Last ned Excel</button>
</div>

<script>

let current = null;
let log = [];

const data = {

"Skjev mast": ["Skjev", "Setning", "Fund.feil"],
"Barduner": ["Slakk", "Brudd", "Rust"],
"Stolper": ["Råte", "Sprekk"],
"Stålmast": ["Korrosjon", "Skade"],
"Topphette": ["Mangler", "Skadet"],
"Traversfeste": ["Løs", "Skade"],
"Travers": ["Skjev", "Skade"],
"Isolatorfeste": ["Slitasje", "Skade"],
"Isolator": ["Knust", "Sprekk"],
"Bendsling": ["Slakk", "Feil"],
"Liner": ["Korrosjon", "Kordelbrudd"],
"Strekning": ["Lav høyde", "Hinder"],
"Skjøter/klemmer": ["Korrosjon", "Kordelbrudd"],
"Toppline": ["Slakk", "Korrosjon"],
"Jordinger": ["Brudd", "Rust"],
"Trasé": ["Skog", "Kratt"],
"Merking": ["Manglende", "Uleselig"]

};

// START
function init(){
let html = "";

for (let key in data){
html += `<button class="cat" onclick="openCat('${key}')">${key}</button>`;
}

document.getElementById("app").innerHTML = html;
}

// ÅPNE
function openCat(name){
current = name;

let html = `<button class="cat">${name}</button>`;

// AVVIK
data[name].forEach(avvik => {
html += `<button class="option" onclick="select('${avvik}')">${avvik}</button>`;
});

// 📸 BILDE
html += `<button class="camera" onclick="takePhoto()">📸 Ta bilde</button>`;

// 📝 MERKNAD
html += `<textarea id="note" placeholder="Merknad..."></textarea>`;

// TILBAKE
html += `<button class="bottom" onclick="saveNote()">Lagre / tilbake</button>`;

document.getElementById("app").innerHTML = html;
}

// VELG AVVIK
function select(avvik){
log.push({
punkt: current,
avvik: avvik
});
init();
}

// LAGRE MERKNAD
function saveNote(){
let note = document.getElementById("note").value;

if(note){
log.push({
punkt: current,
merknad: note
});
}

init();
}

// 📸
function takePhoto(){
let input = document.createElement("input");
input.type = "file";
input.accept = "image/*";
input.capture = "environment";

input.onchange = () => {
log.push({
punkt: current,
bilde: "ja"
});
};

input.click();
}

// MAST OK
function mastOK(){
log.push({
mast: document.getElementById("mast").value,
status: "OK"
});
alert("Mast registrert som OK");
}

// NY MAST
function next(){
document.getElementById("mast").value="";
log = [];
}

// EXCEL (kommer)
function excel(){
console.log(log);
alert("Excel eksport kommer i neste steg");
}

// GPS
navigator.geolocation.getCurrentPosition(pos=>{
document.getElementById("gps").innerHTML =
"GPS: " + pos.coords.latitude.toFixed(6) + ", " +
pos.coords.longitude.toFixed(6);
});

init();

</script>

</body>
</html>
