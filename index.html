<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linjekontroll</title>

<style>
body { font-family: Arial; margin:0; background:#f4f4f4; }

/* 🔒 Sticky topp */
.header {
  position: sticky;
  top: 0;
  background: #ffffff;
  padding: 10px;
  z-index: 1000;
  border-bottom: 2px solid #ddd;
}

h1 { margin:0 0 5px 0; font-size:20px; }

/* Input tydelig og svart */
input {
  width:100%;
  padding:10px;
  margin:5px 0;
  font-size:16px;
  color:#000;
  background:#fff;
  border:1px solid #ccc;
}

/* Knapper */
.btn {
  width:100%;
  padding:14px;
  margin:4px 0;
  border:none;
  border-radius:6px;
  font-size:16px;
}

.green { background:#2e7d32; color:white; }
.lightgreen { background:#66bb6a; color:white; }
.red { background:#c62828; color:white; }
.gray { background:#e0e0e0; color:black; }

.section { margin:5px; }
.hidden { display:none; }

textarea {
  width:100%;
  height:60px;
  margin-top:5px;
  font-size:14px;
}
</style>
</head>

<body>

<div class="header">
  <h1>Linjekontroll v1.18</h1>

  <input id="netteier" placeholder="Netteier">
  <input id="linje" placeholder="LinjeID">
  <input id="mast" placeholder="Mast nr">

  <div id="gps">GPS: henter...</div>
</div>

<button class="btn lightgreen" onclick="mastOK()">Mast OK</button>

<div id="kontroll"></div>

<button class="btn gray" onclick="nesteMast()">Neste mast</button>

<script>

// 📍 GPS
navigator.geolocation.getCurrentPosition(pos=>{
  document.getElementById("gps").innerText =
  "GPS: " + pos.coords.latitude.toFixed(5) + ", " + pos.coords.longitude.toFixed(5);
});

// 📊 Data
const data = {
"Skjev mast":["Skjev","Setning","Fund.feil"],
"Barduner":["Slakk","Brudd","Rust"],
"Stolper":["Råte","Sprekk"],
"Stålmast":["Korrosjon","Skade"],
"Topphatte":["Mangler","Skadet"],
"Traversfeste":["Løs","Skade"],
"Travers":["Skjev","Skade"],
"Isolatorfeste":["Slitasje","Skade"],
"Isolator":["Knust","Krypestrømsvei"],
"Bendsling":["Løs","Brudd"],
"Liner":["Korrosjon","Kordelbrudd"],
"Strekking":["Skjev"],
"Skjøter/Klemmer":["Korrodert"],
"Toppline":["Slakk","Korrosjon"],
"Jordinger":["Løs","Brudd"],
"Trasé":["Skog","Kratt"],
"Merking":[]
};

const container = document.getElementById("kontroll");

function lagUI(){
  container.innerHTML = "";

  for(let key in data){

    let div = document.createElement("div");
    div.className = "section";

    let btn = document.createElement("button");
    btn.className = "btn green";
    btn.innerText = key;

    btn.onclick = () => toggle(div);
    div.appendChild(btn);

    let inner = document.createElement("div");
    inner.className = "hidden";

    // 🔴 Avvik
    data[key].forEach(avvik=>{
      let b = document.createElement("button");
      b.className = "btn gray";
      b.innerText = avvik;

      b.onclick = ()=>{
        setRed(btn);
      };

      inner.appendChild(b);
    });

    // 📸 Kamera (skjult input)
    let cam = document.createElement("input");
    cam.type = "file";
    cam.accept = "image/*";
    cam.capture = "environment";
    cam.multiple = true;
    cam.style.display = "none";

    cam.onchange = ()=>{
      if(cam.files.length > 0){
        setRed(btn);
      }
    };

    // 📸 Knapp
    let camBtn = document.createElement("button");
    camBtn.className = "btn gray";
    camBtn.innerText = "📸 Ta bilde";

    camBtn.onclick = ()=>{
      cam.click();
    };

    inner.appendChild(camBtn);
    inner.appendChild(cam);

    // 📝 Merknad
    let txt = document.createElement("textarea");
    txt.placeholder = "Merknad";

    txt.oninput = ()=>{
      if(txt.value.length > 0){
        setRed(btn);
      }
    };

    inner.appendChild(txt);

    div.appendChild(inner);
    container.appendChild(div);
  }
}

function toggle(div){
  div.children[1].classList.toggle("hidden");
}

function setRed(btn){
  btn.classList.remove("green","lightgreen");
  btn.classList.add("red");
}

// 🟢 Mast OK
function mastOK(){
  document.querySelectorAll(".section button:first-child").forEach(b=>{
    b.classList.remove("green","red");
    b.classList.add("lightgreen");
  });
}

// 🔄 Neste mast
function nesteMast(){

  // behold Netteier + LinjeID
  let netteier = document.getElementById("netteier").value;
  let linje = document.getElementById("linje").value;

  // reset UI
  lagUI();

  // sett tilbake verdier
  document.getElementById("netteier").value = netteier;
  document.getElementById("linje").value = linje;

  // nullstill mast
  document.getElementById("mast").value = "";
}

lagUI();

</script>

</body>
</html>
