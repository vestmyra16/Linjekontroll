<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Linjekontroll v3</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{font-family:Arial;max-width:700px;margin:auto;padding:15px;}
h3{margin-top:20px;}

button{
    width:100%;
    padding:14px;
    margin-top:5px;
    font-size:16px;
    border:none;
}

/* Kontrollpunkt */
.punkt{
    background:#ddd;
}

/* Avvik */
.avvik{
    background:#eee;
}

/* Registrert avvik */
.registrert{
    background:red;
    color:white;
}

/* Mast OK */
.ok{
    background:darkgreen;
    color:white;
}
</style>
</head>

<body>

<h2>Grunnlagsdata</h2>

<label>Netteier</label>
<input id="netteier">

<label>Linje</label>
<input id="linje">

<label>Mastnr</label>
<input id="mast">

<button class="ok" onclick="mastOK()">✔ Mast OK</button>

<hr>

<div id="container"></div>

<button onclick="lastNed()">Last ned Excel</button>

<script>

let alleData=[];

/* Definisjon av kontrollpunkter */
let punkter = {
    "Barduner": ["Brudd","Rust","Løs"],
    "Toppline": ["Slakk","Korrosjon"],
    "Jording": ["Brudd","Løs"],
    "Merking": ["Mangler","Utydelig"]
};

/* Bygg UI */
let container=document.getElementById("container");

Object.keys(punkter).forEach(punkt=>{

    let div=document.createElement("div");

    let pBtn=document.createElement("button");
    pBtn.innerText=punkt;
    pBtn.className="punkt";

    div.appendChild(pBtn);

    punkter[punkt].forEach(avvik=>{

        let btn=document.createElement("button");
        btn.innerText=avvik;
        btn.className="avvik";

        btn.onclick=function(){
            registrer(punkt,avvik,btn,pBtn);
        }

        div.appendChild(btn);
    });

    /* bilde + merknad */
    let textarea=document.createElement("textarea");
    textarea.placeholder="Merknad";

    let bildeBtn=document.createElement("button");
    bildeBtn.innerText="📷 Ta bilde";

    div.appendChild(bildeBtn);
    div.appendChild(textarea);

    container.appendChild(div);
});

/* Registrer */
function registrer(punkt,avvik,btn,pBtn){

btn.classList.add("registrert");
pBtn.classList.add("registrert");

alleData.push({
    netteier:netteier.value,
    linje:linje.value,
    mast:mast.value,
    punkt:punkt,
    avvik:avvik
});
}

/* Mast OK */
function mastOK(){

alleData.push({
    netteier:netteier.value,
    linje:linje.value,
    mast:mast.value,
    punkt:"Mast OK",
    avvik:"Ingen"
});

mast.value="";
}

/* Excel */
function lastNed(){

let wb=XLSX.utils.book_new();
let ws=XLSX.utils.json_to_sheet(alleData);

XLSX.utils.book_append_sheet(wb,ws,"Data");

XLSX.writeFile(wb,"linjekontroll.xlsx");
}

</script>

</body>
</html>
