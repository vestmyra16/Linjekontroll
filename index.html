<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linjekontroll</title>

<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.png">

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f4f4f4;
}

.header {
    padding: 10px;
    background: white;
}

h1 {
    margin: 0;
    font-size: 20px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 5px 0;
    font-size: 16px;
}

.btn {
    width: 100%;
    padding: 14px;
    margin: 4px 0;
    border: none;
    border-radius: 6px;
    font-size: 16px;
}

.green { background:#2e7d32; color:white; }
.lightgreen { background:#66bb6a; color:white; }
.red { background:#c62828; color:white; }
.gray { background:#ccc; }

.section {
    margin: 5px;
}

.hidden {
    display:none;
}
</style>
</head>

<body>

<div class="header">
    <h1>Linjekontroll</h1>
    <input id="netteier" placeholder="Netteier">
    <input id="linje" placeholder="LinjeID">
    <input id="mast" placeholder="Mast nr">
    <div id="gps">GPS: henter...</div>
</div>

<button class="btn lightgreen" onclick="mastOK()">Mast OK</button>

<div id="kontroll"></div>

<button class="btn gray" onclick="nesteMast()">Neste mast</button>

<script>

// GPS
navigator.geolocation.getCurrentPosition(pos => {
    document.getElementById("gps").innerText =
        "GPS: " + pos.coords.latitude.toFixed(5) + ", " + pos.coords.longitude.toFixed(5);
});

// Kontrollpunkter og avvik
const data = {
    "Skjev mast": ["Skjev","Setning","Fund.feil"],
    "Barduner": ["Slakk","Brudd","Rust"],
    "Stolper": ["Råte","Sprekk"],
    "Stålmast": ["Korrosjon","Skade"],
    "Topphatte": ["Mangler","Skadet"],
    "Traversfeste": ["Løs","Skade"],
    "Travers": ["Skjev","Skade"],
    "Isolatorfeste": ["Slitasje","Skade"],
    "Isolator": ["Knust","Krypestrømsvei"],
    "Bendsling": ["Løs","Brudd"],
    "Liner": ["Korrosjon","Kordelbrudd"],
    "Strekking": ["Skjev"],
    "Skjøter/Klemmer": ["Korrodert"],
    "Toppline": ["Slakk","Korrosjon"],
    "Jordinger": ["Løs","Brudd"],
    "Trasé": ["Skog","Kratt"],
    "Merking": []
};

const container = document.getElementById("kontroll");

function lagUI(){
    container.innerHTML = "";
    for (let key in data){

        let div = document.createElement("div");
        div.className = "section";

        let btn = document.createElement("button");
        btn.className = "btn green";
        btn.innerText = key;

        btn.onclick = () => toggle(div);

        div.appendChild(btn);

        let inner = document.createElement("div");
        inner.className = "hidden";

        // avvik
        data[key].forEach(avvik=>{
            let b = document.createElement("button");
            b.className = "btn gray";
            b.innerText = avvik;

            b.onclick = () => {
                btn.classList.remove("green");
                btn.classList.add("red");
            };

            inner.appendChild(b);
        });

        // kamera
        let cam = document.createElement("input");
        cam.type = "file";
        cam.accept = "image/*";
        cam.capture = "environment";
        cam.multiple = true;
        inner.appendChild(cam);

        // merknad
        let txt = document.createElement("textarea");
        txt.placeholder = "Merknad";
        txt.style.width="100%";
        txt.style.height="60px";
        inner.appendChild(txt);

        div.appendChild(inner);
        container.appendChild(div);
    }
}

function toggle(div){
    let inner = div.children[1];
    inner.classList.toggle("hidden");
}

function mastOK(){
    document.querySelectorAll(".section button:first-child").forEach(b=>{
        b.classList.remove("green","red");
        b.classList.add("lightgreen");
    });
}

function nesteMast(){
    document.getElementById("mast").value = "";

    document.querySelectorAll(".section button:first-child").forEach(b=>{
        b.classList.remove("red","lightgreen");
        b.classList.add("green");
    });

    document.querySelectorAll("textarea").forEach(t=>t.value="");
    document.querySelectorAll("input[type=file]").forEach(f=>f.value="");
}

lagUI();

</script>

</body>
</html>
