<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Linjekontroll</title>

<link rel="manifest" href="manifest.json">

<style>
body {
    font-family: Arial;
    background: #f2f2f2;
    margin: 0;
}

.header {
    padding: 10px;
    background: white;
    position: sticky;
    top: 0;
    z-index: 10;
}

h1 {
    margin: 0;
    font-size: 20px;
}

label {
    font-weight: bold;
    color: black;
}

input {
    width: 100%;
    padding: 8px;
    margin-bottom: 10px;
}

.btn {
    background: #2e7d32;
    color: white;
    padding: 12px;
    margin: 6px;
    border-radius: 8px;
    text-align: center;
    cursor: pointer;
}

.avvik {
    background: #ddd;
    margin: 4px;
    padding: 10px;
    border-radius: 6px;
}

.ok {
    background: #66bb6a;
}

.hidden {
    display: none;
}
</style>
</head>

<body>

<div class="header">
    <h1 id="versjon"></h1>

    <label>Netteier</label>
    <input id="netteier">

    <label>LinjeID</label>
    <input id="linje">

    <label>Mast nr</label>
    <input id="mast">
</div>

<div class="btn ok" onclick="mastOK()">Mast OK</div>

<div id="app"></div>

<div class="btn" onclick="reset()">Neste mast</div>

<script>

// =====================
// 🔢 SETT VERSJON HER
// =====================
const VERSION = "1.8";

// vis versjon automatisk
document.getElementById("versjon").innerText = "Linjekontroll v" + VERSION;


// =====================
// 📋 DATA (kontrollpunkt)
// =====================
const data = {
    "Skjev mast": ["Skjev", "Setning", "Fund.feil"],
    "Barduner": ["Slakk", "Brudd", "Rust"],
    "Stolper": ["Råte", "Sprekk"],
    "Stålmast": ["Korrosjon", "Skade"],
    "Topphette": ["Mangler", "Skadet"],
    "Traversfeste": ["Løs", "Skade"],
    "Travers": ["Skjev", "Skade"],
    "Isolatorfeste": ["Slitasje", "Skade"],
    "Isolator": ["Skadet"],
    "Bendsling": ["Løs"],
    "Liner": ["Korrosjon", "Kordelbrudd"],
    "Strekning": ["Heng"],
    "Skjøter/Klemmer": ["Korrosjon", "Kordelbrudd"],
    "Toppline": ["Slakk", "Korrosjon"],
    "Jordinger": ["Brudd"],
    "Trasé": ["Skog", "Kratt"],
    "Merking": ["Mangler"]
};


// =====================
// 📦 GENERER UI
// =====================
const app = document.getElementById("app");

for (let key in data) {

    let div = document.createElement("div");

    div.innerHTML = `
        <div class="btn" onclick="toggle('${key}')">${key}</div>

        <div id="${key}" class="hidden">
            ${data[key].map(a => `<div class="avvik">${a}</div>`).join("")}

            <input type="file" accept="image/*" capture="environment">
            <input placeholder="Merknad">
        </div>
    `;

    app.appendChild(div);
}


// =====================
// 🔘 FUNKSJONER
// =====================
function toggle(id) {
    let el = document.getElementById(id);
    el.classList.toggle("hidden");
}

function mastOK() {
    alert("Mast registrert som OK");
}

function reset() {
    document.querySelectorAll("input").forEach(i => i.value = "");
}

</script>

</body>
</html>
