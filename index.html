<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Linjekontroll v29</title>
<style>
    body {font-family: sans-serif; background:#f4f4f4; margin:0; padding:10px;}
    .container {max-width:600px; margin:auto; background:white; padding:20px; border-radius:10px;}
    button {width:100%; padding:15px; margin:5px 0; border:none; border-radius:8px; cursor:pointer;}
    .green {background:#2e7d32; color:white;}
    input, textarea {width:100%; padding:10px; margin:5px 0; box-sizing:border-box;}
    .bilde-knapp {background:#1565c0; color:white; margin-top:5px;}
    .preview {max-width: 100px; display:block; margin: 5px 0;}
</style>
</head>
<body>

<div class="container" id="app">
    <h2>Linjekontroll v29</h2>
    <input id="netteier" placeholder="Netteier">
    <input id="linje" placeholder="LinjeID">
    <input id="mast" placeholder="Mast nr">
    <input id="gps" placeholder="GPS-koordinater">
    <button class="green" onclick="hentGPS()">Hent GPS</button>

    <div id="punkter"></div>

    <button class="green" onclick="lagre()">Lagre mast</button>
    <button class="green" onclick="lastNed()">Last ned CSV</button>
</div>

<script>
let status = {};
let bilder = {}; // Lagrer bilde-data her

// Hent lagrede data ved oppstart
window.onload = () => {
    let saved = localStorage.getItem("linjedata");
    if (saved) data = JSON.parse(saved);
    render();
};

function hentGPS() {
    navigator.geolocation.getCurrentPosition(p => {
        document.getElementById("gps").value = `${p.coords.latitude.toFixed(6)}, ${p.coords.longitude.toFixed(6)}`;
    });
}

function render() {
    let html = "";
    punkter.forEach((p, i) => {
        html += `<div style="margin-top:10px; border-bottom:1px solid #ccc">
                 <button onclick="toggle(${i})">${p.navn}</button>`;
        
        if (status[i]) {
            html += `<input type="file" accept="image/*" capture="environment" onchange="taBilde(${i}, event)">
                     <div id="imgPrev${i}"></div>
                     <textarea id="m${i}" placeholder="Merknad"></textarea>`;
        }
        html += `</div>`;
    });
    document.getElementById("punkter").innerHTML = html;
}

function taBilde(i, event) {
    const file = event.target.files[0];
    const reader = new FileReader();
    reader.onload = (e) => {
        bilder[i] = e.target.result; // Lagrer bilde som base64
        document.getElementById(`imgPrev${i}`).innerHTML = `<img src="${e.target.result}" class="preview">`;
    };
    reader.readAsDataURL(file);
}

// Resten av logikken din for lagre() og lastNed()...
// Husk å legge til 'bilder[i]' i CSV-eksporten din.

</script>
</body>
</html>
