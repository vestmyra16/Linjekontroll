<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Linjekontroll</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">

<meta name="theme-color" content="#2e7d32">

<style>
body { font-family: Arial; margin:10px; background:#f5f5f5; }

.header {
    position: sticky;
    top:0;
    background:white;
    z-index:1000;
}

label { font-weight:bold; color:black; }

input {
    width:100%;
    padding:8px;
    margin-bottom:6px;
}

.btn {
    background:#2e7d32;
    color:white;
    padding:12px;
    margin:4px 0;
    border-radius:6px;
    cursor:pointer;
}

.btn.ok { background:#66bb6a; }
.btn.error { background:#c62828; }

.sub {
    background:#e0e0e0;
    padding:10px;
    margin:2px 0;
    border-radius:4px;
    color:black;
}

.hidden { display:none; }

.camera {
    background:#2e7d32;
    color:white;
    padding:10px;
    text-align:center;
    border-radius:5px;
    margin-top:5px;
}
</style>
</head>

<body>

<div class="header">
<h3>Linjekontroll v1.40</h3>

<label>Netteier</label>
<input id="netteier" oninput="saveHeader()">

<label>LinjeID</label>
<input id="linje" oninput="saveHeader()">

<label>Mast nr</label>
<input id="mast">

<div id="gps"></div>
</div>

<div id="app"></div>

<div class="btn" onclick="nextMast()">Neste mast</div>
<div class="btn" onclick="downloadExcel()">Last ned Excel</div>

<script>
let data = {};
let open = null;

const controls = [
["Mast OK", []],
["Skjev mast", ["Skjev","Setning","Fund.feil"]],
["Barduner", ["Slakk","Brudd","Rust"]],
["Stolper", ["Råte","Sprekk"]],
["Stålmast", ["Korrosjon","Skade"]],
["Topphette", ["Mangler","Skadet"]],
["Traversfeste", ["Løs","Skade"]],
["Travers", ["Skjev","Skade"]],
["Isolatorfeste", ["Slitasje","Skade"]],
["Isolator", ["Knust","Krypestrømsvei"]],
["Bendsling", ["Løs","Brudd"]],
["Liner", ["Korrosjon","Kordelbrudd"]],
["Strekking", ["Skjev"]],
["Skjøter/Klemmer", ["Korrodert"]],
["Toppline", ["Slakk","Korrosjon"]],
["Jordinger", ["Løs","Brudd"]],
["Trasé", ["Skog","Kratt"]],
["Merking", ["HS mangler/defekt","Mnr mangler/defekt"]]
];

function render(){
    let html="";
    controls.forEach((c,i)=>{

        html += `<div id="main${i}" class="btn" onclick="toggle(${i})">${c[0]}</div>`;
        html += `<div id="sub${i}" class="${open===i?'':'hidden'}">`;

        c[1].forEach((s)=>{
            html += `<div class="sub" onclick="setAvvik(${i},'${s}')">${s}</div>`;
        });

        html += `
        <div class="camera">
            <label style="cursor:pointer;">
                📸 Ta bilde
                <input type="file" accept="image/*" capture="environment"
                style="display:none;"
                onchange="setPhoto(${i})">
            </label>
        </div>

        <textarea placeholder="Merknad" onchange="setNote(${i},this.value)"></textarea>
        </div>
        `;
    });

    document.getElementById("app").innerHTML = html;
    update();
}

function toggle(i){
    open = open===i ? null : i;
    render();
}

function setAvvik(i,val){
    data[i] = {avvik:val};
    update();
}

function setPhoto(i){
    data[i] = data[i] || {};
    data[i].img = true;
    update();
}

function setNote(i,val){
    data[i] = data[i] || {};
    data[i].note = val;
    update();
}

function update(){
    controls.forEach((c,i)=>{
        let el = document.getElementById("main"+i);
        if(!el) return;

        el.classList.remove("ok","error");

        if(data[i]){
            if(data[i].avvik || data[i].img || data[i].note){
                el.classList.add("error");
            } else {
                el.classList.add("ok");
            }
        }
    });
}

function nextMast(){
    document.getElementById("mast").value="";
    data = {};
    open = null;
    render();
}

function saveHeader(){
    localStorage.setItem("netteier",netteier.value);
    localStorage.setItem("linje",linje.value);
}

function loadHeader(){
    netteier.value = localStorage.getItem("netteier") || "";
    linje.value = localStorage.getItem("linje") || "";
}

function downloadExcel(){
    let csv = "Netteier,LinjeID,Mast,Kontrollpunkt,Avvik,Merknad,Bilde\n";

    controls.forEach((c,i)=>{
        let d = data[i] || {};
        csv += `${netteier.value},${linje.value},${mast.value},${c[0]},${d.avvik||""},${d.note||""},${d.img?"Ja":"Nei"}\n`;
    });

    let blob = new Blob([csv], {type:"text/csv"});
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "linjekontroll.csv";
    a.click();
}

loadHeader();
render();

navigator.geolocation.getCurrentPosition(pos=>{
    document.getElementById("gps").innerHTML =
    "GPS: " + pos.coords.latitude.toFixed(5) + ", " +
    pos.coords.longitude.toFixed(5);
});
</script>

</body>
</html>
