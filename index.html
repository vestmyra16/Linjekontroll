<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" sizes="180x180" href="./icon-180.png">

<title>Linjekontroll v21</title>

<style>

body {font-family: Arial; background:#f4f4f4;}
.container {max-width:600px; margin:auto; padding:12px;}

label {font-weight:bold; margin-top:10px; display:block; font-size:18px;}
input {width:100%; padding:12px; font-size:18px;}

.kontroll {
  background:#2e7d32;
  color:white;
  padding:16px;
  margin-top:10px;
  border:none;
  width:100%;
  border-radius:10px;
  font-size:18px;
}

.avvik {
  background:#e0e0e0;
  padding:12px;
  margin-top:6px;
  border:none;
  width:100%;
  border-radius:8px;
}

.aktiv {
  background:#c62828 !important;
  color:white;
}

.kamera {
  background:#2e7d32;
  color:white;
  padding:12px;
  margin-top:6px;
  border:none;
  width:100%;
  border-radius:8px;
}

textarea {
  width:100%;
  padding:10px;
  margin-top:6px;
  font-size:16px;
}

.bunn {
  background:#1b5e20;
  color:white;
  padding:16px;
  margin-top:12px;
  border:none;
  width:100%;
  border-radius:10px;
  font-size:18px;
}

.hidden {display:none;}

</style>
</head>

<body>
<div class="container">

<h2>Linjekontroll v21</h2>

<label>Netteier</label>
<input id="netteier">

<label>LinjeID</label>
<input id="linje">

<label>Mast nr</label>
<input id="mast">

<label>GPS</label>
<input id="gps">
<button class="kontroll" onclick="gps()">Slå på GPS</button>

<button class="kontroll" id="mastok" onclick="toggleMastOK()">Mast OK</button>

<!-- FUNDAMENT -->
<button class="kontroll" onclick="toggle('f')">Skjev mast/fundament</button>
<div id="f" class="hidden">
  <button class="avvik" onclick="velg('f')">Skjev</button>
  <button class="avvik" onclick="velg('f')">Setning</button>
  <button class="avvik" onclick="velg('f')">Fundamentfeil</button>
  <button class="kamera">📷 Ta bilde</button>
  <textarea placeholder="Merknad"></textarea>
</div>

<!-- BARDUN -->
<button class="kontroll" onclick="toggle('b')">Barduner</button>
<div id="b" class="hidden">
  <button class="avvik" onclick="velg('b')">Slakk</button>
  <button class="avvik" onclick="velg('b')">Rust</button>
  <button class="avvik" onclick="velg('b')">Brudd</button>
  <button class="kamera">📷 Ta bilde</button>
  <textarea placeholder="Merknad"></textarea>
</div>

<!-- ISOLATOR -->
<button class="kontroll" onclick="toggle('i')">Isolator</button>
<div id="i" class="hidden">
  <button class="avvik" onclick="velg('i')">Knust</button>
  <button class="avvik" onclick="velg('i')">Krypestrøm</button>
  <button class="kamera">📷 Ta bilde</button>
  <textarea placeholder="Merknad"></textarea>
</div>

<button class="bunn" onclick="lagre()">Lagre mast</button>
<button class="bunn">Last ned Excel</button>
<button class="bunn" onclick="nyMast()">Ny mast</button>

</div>

<script>

/* GPS */
function gps(){
 navigator.geolocation.getCurrentPosition(p=>{
  document.getElementById("gps").value =
  p.coords.latitude.toFixed(6)+","+p.coords.longitude.toFixed(6);
 });
}

/* Åpne/lukke */
function toggle(id){
 let el=document.getElementById(id);
 el.classList.toggle("hidden");
}

/* Velg avvik */
function velg(id){
 let parent=document.getElementById(id);
 parent.previousElementSibling.classList.add("aktiv");
}

/* Mast OK toggle */
function toggleMastOK(){
 document.getElementById("mastok").classList.toggle("aktiv");
}

/* Lagre */
function lagre(){
 alert("Lagret");
}

/* Ny mast */
function nyMast(){
 document.querySelectorAll(".aktiv").forEach(e=>e.classList.remove("aktiv"));
 document.querySelectorAll(".hidden").forEach(e=>e.classList.add("hidden"));
 document.querySelectorAll("textarea").forEach(e=>e.value="");
 document.getElementById("mast").value="";
 document.getElementById("gps").value="";
}

</script>

</body>
</html>
