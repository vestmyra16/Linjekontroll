<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linjekontroll v10</title>

<style>
body {
    font-family: Arial;
    background:#f4f4f4;
    margin:0;
}

.container {
    max-width:500px;
    margin:auto;
    padding:10px;
}

h2 {
    text-align:center;
}

input {
    width:100%;
    padding:10px;
    margin:5px 0;
    font-size:16px;
}

.knapp {
    width:100%;
    padding:16px;
    margin:6px 0;
    border:none;
    border-radius:10px;
    background:#e0e0e0;
    font-size:16px;
}

.knapp.rød {
    background:#d32f2f;
    color:white;
}

.knapp.grønn {
    background:#2e7d32;
    color:white;
}

.valg {
    display:none;
    margin-bottom:10px;
}

.valg button {
    width:100%;
    padding:12px;
    margin:3px 0;
    border:none;
    border-radius:8px;
    background:#f0f0f0;
}

textarea {
    width:100%;
    padding:8px;
    margin-top:5px;
}

</style>
</head>

<body>

<div class="container">

<h2>Linjekontroll v10</h2>

<input placeholder="Netteier" id="netteier">
<input placeholder="LinjeID" id="linje">
<input placeholder="Mast nr" id="mast">

<button id="mastok" class="knapp" onclick="mastOK()">✔ Mast OK</button>

<div id="punkter"></div>

<button class="knapp" onclick="lagre()">Lagre mast</button>
<button class="knapp" onclick="nyMast()">Ny mast</button>

</div>

<script>

const kontrollpunkter = {
"Skjev mast/fundament":["Skjev"],
"Barduner":["Anvisere defekt","Slakk","Rust"],
"Stolper":["Råte","Sprekk"],
"Stålmast":["Armering synlig","Fundament erodert","Fundament oppsprukket"],
"Topphette":["Mangler","Defekt"],
"Traversfeste":["Defekt","Sprukket"],
"Travers":["Skade","Mosegrodd","Skjev"],
"Isolatorfeste":["Slitasje","Rust"],
"Isolator":["Sprukket","Knust","Krypestrømsvei"],
"Bendsling":["Korrosjon","Løs"],
"Liner":["Korrosjon","Kordelbrudd"],
"Strekking":["Skjev","Lav høyde"],
"Skjøter/klemmer":["Korrodert","Varmgang","Tape i klemme"],
"Topp/jordline":["Korrosjon","Beslag rust"],
"Jordinger":["Brudd","Løs"],
"Trasé":["Kratt","Sideskog","Underskog"],
"Merking":["Hinderlys","HS mangler","Mnr mangler","Farvannskilt"]
};

const container = document.getElementById("punkter");

Object.keys(kontrollpunkter).forEach(navn => {

    let wrapper = document.createElement("div");

    let knapp = document.createElement("button");
    knapp.className = "knapp";
    knapp.innerText = navn;

    let valgDiv = document.createElement("div");
    valgDiv.className = "valg";

    kontrollpunkter[navn].forEach(avvik => {
        let b = document.createElement("button");
        b.innerText = avvik;

        b.onclick = () => {
            knapp.classList.add("rød");   // 🔴 HER skjer riktig farging
            valgtData[navn] = avvik;
            valgDiv.style.display = "none";
        };

        valgDiv.appendChild(b);
    });

    let merknad = document.createElement("textarea");
    merknad.placeholder = "Merknad";
    merknad.oninput = () => {
        valgtMerknad[navn] = merknad.value;
    };

    knapp.onclick = () => {
        valgDiv.style.display =
            valgDiv.style.display === "block" ? "none" : "block";
    };

    wrapper.appendChild(knapp);
    wrapper.appendChild(valgDiv);
    wrapper.appendChild(merknad);

    container.appendChild(wrapper);
});

let valgtData = {};
let valgtMerknad = {};

function mastOK(){
    document.getElementById("mastok").classList.add("grønn");
}

function lagre(){
    alert("Mast lagret (Excel kommer neste steg)");
}

function nyMast(){
    document.querySelectorAll("textarea").forEach(t=>t.value="");
    document.querySelectorAll(".knapp").forEach(k=>{
        k.classList.remove("rød","grønn");
    });
    valgtData = {};
    valgtMerknad = {};
}

</script>

</body>
</html>
