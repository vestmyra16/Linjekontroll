<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Linjekontroll</title>

<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-180.png">

<style>
body { font-family: Arial; background:#f2f2f2; padding:10px; }

input {
  width:100%;
  padding:10px;
  margin-bottom:8px;
  border:2px solid #999;
  border-radius:6px;
}

button {
  width:100%;
  padding:16px;
  margin-top:6px;
  border:none;
  border-radius:10px;
  font-size:16px;
  text-align:left;
}

.kp { background:#2e7d32; color:#fff; }
.kp.feil { background:#c62828; }

.avvikBtn { background:#ddd; color:#000; }
.avvikBtn.active { background:#999; }

.camBtn { background:#2e7d32; color:#fff; }

.saveBtn { background:#1565c0; color:#fff; }
</style>
</head>

<body>

<h2>Linjekontroll v2.34</h2>

<label>Netteier</label>
<input id="netteier">

<label>LinjeID</label>
<input id="linje">

<label>Mast nr</label>
<input id="mast">

<p id="gps"></p>

<div id="app"></div>

<button onclick="nesteMast()">➡️ Neste mast</button>
<button class="saveBtn" onclick="lagreMast()">💾 Lagre mast</button>
<button onclick="lastNed()">📥 Last ned Excel</button>
<button onclick="nyKontroll()">🆕 Ny kontroll</button>

<script>

let registreringer = [];
let current = {};
let sistLagretMast = "";

// GPS
navigator.geolocation.getCurrentPosition(p=>{
  gps.innerText = "GPS: " + p.coords.latitude.toFixed(5) + ", " + p.coords.longitude.toFixed(5);
});

// STRUKTUR
const struktur = {
  "Mast OK": [],
  "Skjev mast": ["Skjev","Setning","Fund.feil"],
  "Barduner": ["Slakk","Brudd","Rust"],
  "Stolper": ["Råte","Sprekk"],
  "Stålmast": ["Korrosjon","Skade"],
  "Topphette": ["Mangler","Skadet"],
  "Traversfeste": ["Løs"],
  "Travers": ["Skade"],
  "Isolatorfeste": ["Skade"],
  "Isolator": ["Knust","Krypestrøm"],
  "Bendsling": ["Løs","Brudd"],
  "Liner": ["Korrosjon","Kordelbrudd"],
  "Strekking": ["Skjev"],
  "Skjøter/Klemmer": ["Korrosjon","Kordelbrudd"],
  "Toppline": ["Slakk","Korrosjon"],
  "Jordinger": ["Løs","Brudd"],
  "Trasé": ["Skog","Kratt"],
  "Merking": ["HS mangler/defekt","Mnr mangler/defekt"]
};

const app = document.getElementById("app");

Object.keys(struktur).forEach(kp=>{

  let btn = document.createElement("button");
  btn.innerText = kp;
  btn.className = "kp";

  let container = document.createElement("div");
  container.style.display = "none";

  btn.onclick = () => {
    container.style.display =
      container.style.display === "none" ? "block" : "none";
  };

  app.appendChild(btn);
  app.appendChild(container);

  // AVVIK
  struktur[kp].forEach(a=>{

    let ab = document.createElement("button");
    ab.innerText = a;
    ab.className = "avvikBtn";

    ab.onclick = ()=>{

      ab.classList.toggle("active");

      if (!current[kp]) current[kp] = [];

      if (current[kp].includes(a)) {
        current[kp] = current[kp].filter(x=>x!==a);
      } else {
        current[kp].push(a);
      }

      // farge kontrollpunkt
      if (current[kp].length > 0){
        btn.classList.add("feil");
      } else {
        btn.classList.remove("feil");
      }
    };

    container.appendChild(ab);
  });

  // 📸 Kamera
  let camInput = document.createElement("input");
  camInput.type = "file";
  camInput.accept = "image/*";
  camInput.capture = "environment";
  camInput.multiple = true;
  camInput.style.display = "none";

  let camBtn = document.createElement("button");
  camBtn.innerHTML = "📸 Ta bilde";
  camBtn.className = "camBtn";

  camBtn.onclick = () => camInput.click();

  camInput.onchange = () => {
    current[kp+"_bilder"] = camInput.files.length;
  };

  container.appendChild(camBtn);
  container.appendChild(camInput);

  // 📝 Merknad
  let note = document.createElement("input");
  note.placeholder = "Merknad";

  note.oninput = ()=>{
    current[kp+"_merknad"] = note.value;
  };

  container.appendChild(note);
});

// 💾 LAGRE MAST
function lagreMast(){

  if (!mast.value){
    alert("Mastnr mangler");
    return;
  }

  if (mast.value === sistLagretMast){
    alert("Allerede lagret");
    return;
  }

  registreringer.push({
    netteier: netteier.value,
    linje: linje.value,
    mast: mast.value,
    data: current
  });

  sistLagretMast = mast.value;

  alert("Mast lagret");
}

// ➡️ NESTE MAST
function nesteMast(){

  lagreMast();

  mast.value = "";
  current = {};

  document.querySelectorAll(".kp").forEach(k=>{
    k.classList.remove("feil");
  });
}

// 📥 EXCEL
function lastNed(){

  let csv = "Netteier,Linje,Mast,Kontrollpunkt,Avvik,Merknad\n";

  registreringer.forEach(r=>{
    Object.keys(struktur).forEach(kp=>{

      let avvik = r.data[kp] || [];

      if (kp === "Mast OK" && avvik.length === 0){
        csv += `${r.netteier},${r.linje},${r.mast},Mast OK,Ingen,\n`;
      }

      if (avvik.length > 0){
        csv += `${r.netteier},${r.linje},${r.mast},${kp},${avvik.join("|")},${r.data[kp+"_merknad"]||""}\n`;
      }
    });
  });

  let blob = new Blob([csv], {type:"text/csv"});
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "linjekontroll.csv";
  a.click();
}

// 🆕 NY KONTROLL
function nyKontroll(){

  registreringer = [];
  current = {};
  sistLagretMast = "";

  document.querySelectorAll("input").forEach(i=>{
    if (i.id !== "netteier" && i.id !== "linje") i.value = "";
  });

  alert("Ny kontroll startet");
}

</script>

</body>
</html>
