<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Linjekontroll</title>

<style>
body { font-family: Arial; margin:10px; background:#f5f5f5; }

.header { position:sticky; top:0; background:white; }

input { width:100%; padding:8px; margin-bottom:6px; }

.btn {
    background:#2e7d32;
    color:white;
    padding:12px;
    margin:4px 0;
    border-radius:6px;
    cursor:pointer;
}

.btn.error { background:#c62828; }
.sub { background:#e0e0e0; padding:10px; margin:2px 0; }
.hidden { display:none; }
</style>
</head>

<body>

<div class="header">
<h3>Linjekontroll v1.50</h3>

<input id="netteier" placeholder="Netteier">
<input id="linje" placeholder="LinjeID">
<input id="mast" placeholder="Mast nr">

<div id="gps"></div>
</div>

<div id="app"></div>

<div class="btn" onclick="saveMast()">💾 Lagre mast</div>
<div class="btn" onclick="nextMast()">➡ Neste mast</div>
<div class="btn" onclick="downloadExcel()">📥 Last ned Excel</div>

<script>
let current = {};
let allMasts = [];
let open = null;

const controls = [
["Mast OK", []],
["Skjev mast", ["Skjev","Setning","Fund.feil"]],
["Barduner", ["Slakk","Brudd","Rust"]],
["Stolper", ["Råte","Sprekk"]],
["Stålmast", ["Korrosjon","Skade"]],
["Topphette", ["Mangler","Skadet"]],
["Traversfeste", ["Løs","Skade"]],
["Travers", ["Skjev","Skade"]],
["Isolatorfeste", ["Slitasje","Skade"]],
["Isolator", ["Knust","Krypestrømsvei"]],
["Bendsling", ["Løs","Brudd"]],
["Liner", ["Korrosjon","Kordelbrudd"]],
["Strekking", ["Skjev"]],
["Skjøter/Klemmer", ["Korrodert"]],
["Toppline", ["Slakk","Korrosjon"]],
["Jordinger", ["Løs","Brudd"]],
["Trasé", ["Skog","Kratt"]],
["Merking", ["HS mangler/defekt","Mnr mangler/defekt"]]
];

function render(){
    let html="";
    controls.forEach((c,i)=>{
        html += `<div class="btn" onclick="toggle(${i})">${c[0]}</div>`;
        html += `<div class="${open===i?'':'hidden'}">`;

        c[1].forEach(s=>{
            html += `<div class="sub" onclick="setAvvik(${i},'${s}')">${s}</div>`;
        });

        html += `<textarea placeholder="Merknad" onchange="setNote(${i},this.value)"></textarea>`;
        html += `</div>`;
    });
    app.innerHTML = html;
}

function toggle(i){ open = open===i ? null : i; render(); }

function setAvvik(i,val){
    current[i] = current[i] || {};
    current[i].avvik = val;
}

function setNote(i,val){
    current[i] = current[i] || {};
    current[i].note = val;
}

/* LAGRE MAST */
function saveMast(){

    let mastData = {
        netteier: netteier.value,
        linje: linje.value,
        mast: mast.value,
        data: JSON.parse(JSON.stringify(current))
    };

    allMasts.push(mastData);

    alert("Mast lagret!");
}

/* NESTE MAST */
function nextMast(){
    saveMast();

    mast.value = "";
    current = {};
    open = null;
    render();
}

/* EXCEL */
function downloadExcel(){

    let csv = "Netteier,LinjeID,Mast,Kontrollpunkt,Avvik,Merknad\n";

    allMasts.forEach(m=>{
        controls.forEach((c,i)=>{

            let d = m.data[i] || {};

            let avvik = d.avvik || (c[0]=="Mast OK" ? "Ingen" : "");

            csv += `${m.netteier},${m.linje},${m.mast},${c[0]},${avvik},${d.note||""}\n`;
        });
    });

    let blob = new Blob([csv], {type:"text/csv"});
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "linjekontroll.csv";
    a.click();
}

render();

navigator.geolocation.getCurrentPosition(pos=>{
    gps.innerHTML =
    "GPS: " + pos.coords.latitude.toFixed(5) + ", " +
    pos.coords.longitude.toFixed(5);
});
</script>

</body>
</html>
