<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Linjekontroll</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">

<meta name="theme-color" content="#2e7d32">

<style>
body { font-family: Arial; margin:10px; background:#f5f5f5; }

.header {
    position: sticky;
    top:0;
    background:white;
    z-index:1000;
    padding-bottom:5px;
}

label { font-weight:bold; color:black; }
input {
    width:100%;
    padding:8px;
    margin-bottom:6px;
    border:1px solid #ccc;
}

/* KNAPPER */
.btn {
    background:#2e7d32;
    color:white;
    padding:12px;
    margin:4px 0;
    text-align:center;
    border-radius:6px;
    cursor:pointer;
}

.btn.ok { background:#66bb6a; }
.btn.error { background:#c62828; }

.sub {
    background:#e0e0e0;
    padding:10px;
    margin:2px 0;
    border-radius:4px;
    cursor:pointer;
    color:black;
}

/* Kamera */
.camera {
    background:#2e7d32;
    color:white;
    padding:10px;
    text-align:center;
    border-radius:5px;
    margin-top:5px;
}

textarea {
    width:100%;
    margin-top:5px;
}

.footer { margin-top:10px; }
</style>
</head>

<body>

<div class="header">
<h3>Linjekontroll</h3>

<label>Netteier</label>
<input id="netteier" oninput="saveHeader()">

<label>LinjeID</label>
<input id="linje" oninput="saveHeader()">

<label>Mast nr</label>
<input id="mast">

<div id="gps"></div>
</div>

<div id="app"></div>

<div class="footer">
<div class="btn" onclick="nextMast()">Neste mast</div>
</div>

<script>
let data = {};

const controls = [
["Mast OK", []],
["Skjev mast", ["Skjev","Setning","Fund.feil"]],
["Barduner", ["Slakk","Brudd","Rust"]],
["Stolper", ["Råte","Sprekk"]],
["Stålmast", ["Korrosjon","Skade"]],
["Topphatte", ["Mangler","Skadet"]],
["Traversfeste", ["Løs","Skade"]],
["Travers", ["Skjev","Skade"]],
["Isolatorfeste", ["Slitasje","Skade"]],
["Isolator", ["Knust","Krypestrømsvei"]],
["Bendsling", ["Løs","Brudd"]],
["Liner", ["Korrosjon","Kordelbrudd"]],
["Strekking", ["Skjev"]],
["Skjøter/Klemmer", ["Korrodert"]],
["Toppline", ["Slakk","Korrosjon"]],
["Jordinger", ["Løs","Brudd"]],
["Trasé", ["Skog","Kratt"]],
["Merking", []]
];

function render(){
    let html="";
    controls.forEach((c,i)=>{

        html += `<div id="main${i}" class="btn" onclick="setOK(${i})">${c[0]}</div>`;

        c[1].forEach((s,j)=>{
            html += `<div class="sub" onclick="setAvvik(${i})">${s}</div>`;
        });

        html += `
        <div class="camera">
            <label style="cursor:pointer;">
                📸 Ta bilde
                <input type="file" accept="image/*" capture="environment"
                style="display:none;"
                onchange="takePhoto(${i})">
            </label>
        </div>

        <textarea placeholder="Merknad" onchange="setNote(${i},this.value)"></textarea>
        `;
    });

    document.getElementById("app").innerHTML = html;
}

/* FUNKSJONER */

function setOK(i){
    data[i] = {ok:true};
    update();
}

function setAvvik(i){
    data[i] = {avvik:true};
    update();
}

function takePhoto(i){
    data[i] = data[i] || {};
    data[i].img = true;
    update();
}

function setNote(i,val){
    data[i] = data[i] || {};
    data[i].note = val;
    update();
}

function update(){
    controls.forEach((c,i)=>{
        let el = document.getElementById("main"+i);
        if(!el) return;

        el.classList.remove("ok","error");

        if(data[i]){
            if(data[i].avvik || data[i].img || data[i].note){
                el.classList.add("error");
            } else {
                el.classList.add("ok");
            }
        }
    });
}

/* NESTE MAST */
function nextMast(){
    document.getElementById("mast").value="";
    data = {};
    update();
}

/* LAGRING */
function saveHeader(){
    localStorage.setItem("netteier",netteier.value);
    localStorage.setItem("linje",linje.value);
}

function loadHeader(){
    netteier.value = localStorage.getItem("netteier") || "";
    linje.value = localStorage.getItem("linje") || "";
}

loadHeader();
render();

/* GPS */
navigator.geolocation.getCurrentPosition(pos=>{
    document.getElementById("gps").innerHTML =
    "GPS: " + pos.coords.latitude.toFixed(5) + ", " +
    pos.coords.longitude.toFixed(5);
});
</script>

</body>
</html>
