<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Linjekontroll</title>

<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">

<style>
body{font-family:Arial;max-width:700px;margin:auto;padding:15px;background:#f5f5f5;}
h2{text-align:center;}

label{font-weight:bold;color:black;margin-top:10px;display:block;}
input{width:100%;padding:12px;margin-top:5px;border-radius:6px;border:1px solid #888;font-size:16px;}

.knapp{
width:100%;
padding:14px;
margin-top:8px;
border:none;
border-radius:6px;
font-size:16px;
text-align:left;
}

.gronn{background:#1f7a1f;color:white;}
.rod{background:#c62828;color:white;}
.graa{background:#e0e0e0;color:black;}

</style>
</head>

<body onload="sjekkTilgang()">

<h2>Linjekontroll v9</h2>

<label>Netteier</label>
<input id="netteier">

<label>LinjeID</label>
<input id="linje">

<label>Mast nr</label>
<input id="mast">

<button class="knapp gronn" onclick="mastOK()">✔ Mast OK</button>

<div id="kontroll"></div>

<button class="knapp gronn" onclick="lagreData()">💾 Lagre mast</button>
<button class="knapp gronn" onclick="lastNedExcel()">📄 Last ned Excel</button>
<button class="knapp graa" onclick="nyMast()">➕ Ny mast</button>

<script>

// 🔐 BESKYTTELSE
const KODE="stolpe2026";
const DAGER=60;

function sjekkTilgang(){
let start=localStorage.getItem("startDato");
let idag=new Date().getTime();

if(!start){
localStorage.setItem("startDato", idag);
}else{
let diff=(idag-start)/(1000*60*60*24);
if(diff>DAGER){
document.body.innerHTML="<h2>Tilgang utløpt</h2>";
return;
}
}

let input=prompt("Kode:");
if(input!==KODE){
document.body.innerHTML="<h2>Feil kode</h2>";
}
}

// 📋 KONTROLLPUNKTER
const kontrollpunkter = {
"Skjev mast/fundament": ["Skjev","Setning","Fundamentfeil"],
"Barduner": ["Slakk","Brudd","Rust"],
"Stolper": ["Råte","Sprekk"],
"Topphatte": ["Mangler","Defekt"],
"Traversfeste": ["Sprukket","Defekt"],
"Travers": ["Skade","Mosegrodd"],
"Isolatorfeste": ["Slitasje","Rust"],
"Toppline": ["Korrosjon"],
"Jordinger": ["Løs","Brudd"],
"Merking": ["HS mangler","Mnr mangler"]
};

let valgtAvvik = {};
let registreringer=[];

// 🔧 BYGG UI
function bygg(){

let div=document.getElementById("kontroll");
div.innerHTML="";

for(let kp in kontrollpunkter){

let btn=document.createElement("button");
btn.className="knapp gronn";
btn.innerText=kp;

btn.onclick=function(){
visAvvik(kp,btn);
};

div.appendChild(btn);
}
}

function visAvvik(kp,btn){

let eksisterende=document.getElementById("sub_"+kp);

if(eksisterende){
eksisterende.remove();
return;
}

let sub=document.createElement("div");
sub.id="sub_"+kp;

kontrollpunkter[kp].forEach(avvik=>{

let b=document.createElement("button");
b.className="knapp graa";
b.innerText=avvik;

b.onclick=function(){

b.classList.remove("graa");
b.classList.add("rod");

btn.classList.remove("gronn");
btn.classList.add("rod");

if(!valgtAvvik[kp]) valgtAvvik[kp]=[];
valgtAvvik[kp].push(avvik);

};

sub.appendChild(b);
});

btn.after(sub);
}

// ✔ MAST OK
function mastOK(){
valgtAvvik={"Mast OK":["Ingen avvik"]};
alert("Mast registrert som OK");
}

// 💾 LAGRE
function lagreData(){

for(let kp in valgtAvvik){
valgtAvvik[kp].forEach(avvik=>{

registreringer.push([
netteier.value,
linje.value,
mast.value,
kp,
avvik
]);

});
}

alert("Mast lagret");
}

// 📄 EXCEL
function lastNedExcel(){

let header=["Netteier","Linje","Mast","Kontrollpunkt","Avvik"];

let data=[header,...registreringer];

let csv=data.map(e=>e.join(";")).join("\n");

let blob=new Blob([csv],{type:"text/csv"});
let link=document.createElement("a");

link.href=URL.createObjectURL(blob);
link.download="linjekontroll.csv";
link.click();
}

// 🔄 NY MAST
function nyMast(){

let n=netteier.value;
let l=linje.value;

valgtAvvik={};

document.querySelectorAll("button").forEach(b=>{
if(b.classList.contains("rod")){
b.classList.remove("rod");
b.classList.add("gronn");
}
});

document.querySelectorAll("div[id^='sub_']").forEach(d=>d.remove());

mast.value="";

netteier.value=n;
linje.value=l;
}

// START
bygg();

</script>

</body>
</html>
