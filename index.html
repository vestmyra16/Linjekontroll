<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Linjekontroll v2.22</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { font-family: Arial; max-width:700px; margin:auto; padding:15px; }
label { font-weight:bold; display:block; margin-top:10px; }

input, textarea {
  width:100%;
  padding:10px;
  margin-top:5px;
}

button {
  width:100%;
  padding:14px;
  margin-top:8px;
  font-size:18px;
  border:none;
  border-radius:10px;
  background:green;
  color:white;
}

.okBtn { background:green; }
.hidden { display:none; }
</style>
</head>

<body>

<h2>Linjekontroll v2.22</h2>

<label>Netteier</label>
<input id="netteier">

<label>LinjeID</label>
<input id="linje">

<label>Mast nr</label>
<input id="mast">

<p id="gps"></p>

<!-- Mast OK -->
<button id="mastOKbtn" class="okBtn" onclick="mastOK()">
Ingen synlige avvik - Mast OK
</button>

<!-- Kontrollpunkter -->
<button onclick="registrerAvvik('Skjev mast/fundament')">Skjev mast/fundament</button>
<button onclick="registrerAvvik('Barduner')">Barduner</button>
<button onclick="registrerAvvik('Stolper')">Stolper</button>
<button onclick="registrerAvvik('Stålmast')">Stålmast</button>
<button onclick="registrerAvvik('Topphette')">Topphette</button>
<button onclick="registrerAvvik('Traversfeste')">Traversfeste</button>
<button onclick="registrerAvvik('Travers')">Travers</button>
<button onclick="registrerAvvik('Isolatorfeste')">Isolatorfeste</button>
<button onclick="registrerAvvik('Isolator')">Isolator</button>
<button onclick="registrerAvvik('Bendsling, heng, avspenning')">Bendsling, heng, avspenning</button>
<button onclick="registrerAvvik('Liner')">Liner</button>
<button onclick="registrerAvvik('Strekking')">Strekking</button>
<button onclick="registrerAvvik('Skjøter/klemmer')">Skjøter/klemmer</button>
<button onclick="registrerAvvik('Topp/jordline og beslag')">Topp/jordline og beslag</button>
<button onclick="registrerAvvik('Jordinger')">Jordinger</button>
<button onclick="registrerAvvik('Trasé')">Trasé</button>
<button onclick="registrerAvvik('Merking')">Merking</button>

<!-- Bilde -->
<div id="bildeContainer">
  <button onclick="taBilde()">📷 Ta bilde</button>
  <input type="file" id="kamera" accept="image/*" capture="environment" class="hidden">
</div>

<!-- Merknad -->
<div id="merknadContainer">
  <label>Merknad</label>
  <textarea id="merknad"></textarea>
</div>

<button onclick="nyMast()">Ny mast</button>
<button onclick="lastNed()">Last ned Excel</button>

<script>

let alleData = [];
let harAvvik = false;

/* GPS */
if(navigator.geolocation){
  navigator.geolocation.getCurrentPosition(pos=>{
    document.getElementById("gps").innerText =
      "GPS: " + pos.coords.latitude.toFixed(5) + ", " + pos.coords.longitude.toFixed(5);
  });
}

/* Mast OK */
function mastOK(){

  if(harAvvik){
    alert("Mast har avvik – Mast OK kan ikke brukes");
    return;
  }

  alleData.push({
    netteier: netteier.value,
    linje: linje.value,
    mast: mast.value,
    punkt: "Mast OK",
    avvik: "Ingen",
    merknad: ""
  });

  document.getElementById("bildeContainer").style.display = "none";
  document.getElementById("merknadContainer").style.display = "none";

  alert("Mast registrert som OK");
}

/* Registrer avvik */
function registrerAvvik(punkt){

  harAvvik = true;

  document.getElementById("mastOKbtn").style.display = "none";

  alleData.push({
    netteier: netteier.value,
    linje: linje.value,
    mast: mast.value,
    punkt: punkt,
    avvik: "Registrert",
    merknad: document.getElementById("merknad").value
  });
}

/* Kamera */
function taBilde(){
  document.getElementById("kamera").click();
}

/* Ny mast */
function nyMast(){

  mast.value="";
  document.getElementById("merknad").value="";

  document.getElementById("mastOKbtn").style.display = "block";
  document.getElementById("bildeContainer").style.display = "block";
  document.getElementById("merknadContainer").style.display = "block";

  harAvvik = false;
}

/* Excel */
function lastNed(){

  let wb = XLSX.utils.book_new();
  let ws = XLSX.utils.json_to_sheet(alleData);

  XLSX.utils.book_append_sheet(wb, ws, "Data");

  let navn = linje.value ? linje.value + "_linjekontroll.xlsx" : "linjekontroll.xlsx";

  XLSX.writeFile(wb, navn);
}

</script>

</body>
</html>
