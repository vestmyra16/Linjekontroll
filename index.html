<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linjekontroll v33</title>
    <style>
        body {font-family: Arial, sans-serif; background:#f4f4f4; margin:0; padding:5px; font-size: 14px;}
        .container {max-width:600px; margin:auto; background:white; padding:10px; border-radius:8px;}
        h2 {text-align:center; color:#1b5e20; margin: 5px 0;}
        input, textarea {width:100%; padding:8px; margin:2px 0; box-sizing:border-box; border:1px solid #ccc; border-radius:4px;}
        
        #punkter {max-height: 50vh; overflow-y: auto; border: 1px solid #ddd; padding: 5px; margin: 10px 0;}
        
        .kp {background:#2e7d32; color:white; width:100%; padding:10px; margin-top:4px; border:none; border-radius:6px; cursor:pointer;}
        .kp.vis {background:#f57c00;}
        
        .avvik-wrapper {background:#f9f9f9; padding:5px; margin:5px 0; border:1px solid #ddd; border-radius:4px;}
        .avvik-knapp {background:#fff; border:1px solid #333; width:65%; padding:8px; border-radius:4px; cursor:pointer;}
        .kamera-knapp {background:#1565c0; color:white; width:30%; padding:8px; border:none; border-radius:4px; cursor:pointer;}
        .kamera-knapp.ok {background:#2e7d32;}
        
        .btn-main {width:100%; padding:12px; margin-top:5px; border:none; border-radius:6px; color:white; cursor:pointer;}
        .green {background:#2e7d32;}
        .darkgreen {background:#1b5e20;}
    </style>
</head>
<body>

<div id="app" class="container">
    <h2>Linjekontroll v33</h2>
    <input id="netteier" placeholder="Netteier">
    <input id="linje" placeholder="LinjeID">
    <input id="mast" placeholder="Mast nr">
    <input id="gps" placeholder="GPS">
    <button class="btn-main green" onclick="hentGPS()">Hent GPS</button>

    <div id="punkter"></div>

    <button class="btn-main darkgreen" onclick="lagre()">Lagre mast</button>
    <button class="btn-main darkgreen" onclick="lastNed()">Last ned CSV</button>
</div>

<script>
let status = {};
let bilderTatt = {}; // Holder styr på om bilde er tatt for et avvik

let punkter = [
    {navn:"Mast OK", avvik:[]},
    {navn:"Skjev mast", avvik:["Skjev","Fundament feil"]},
    {navn:"Barduner", avvik:["Løs","Brudd"]},
    {navn:"Stolper", avvik:["Råte","Skade"]},
    {navn:"Isolator", avvik:["Knust","Krypestrøm"]},
    {navn:"Trase", avvik:["Skog","Kratt"]}
];

function render(){
    let html = "";
    punkter.forEach((p,i)=>{
        let cls = "kp" + (status[i]=="vis" ? " vis" : "");
        html += `<button class="${cls}" onclick="toggle(${i})">${p.navn}</button>`;
        
        if(status[i]=="vis"){
            p.avvik.forEach(a=>{
                let id = i + "_" + a;
                let kamCls = "kamera-knapp" + (bilderTatt[id] ? " ok" : "");
                html += `<div class="avvik-wrapper">
                            <span class="avvik-knapp">${a}</span>
                            <button class="${kamCls}" onclick="taBilde('${id}', '${a}')">📸 Foto</button>
                         </div>`;
            });
            html += `<textarea id="m${i}" placeholder="Merknad"></textarea>`;
        }
    });
    document.getElementById("punkter").innerHTML = html;
}

function toggle(i){ status[i] = (status[i] == "vis") ? "" : "vis"; render(); }

function taBilde(id, navn){
    let net = document.getElementById("netteier").value || "Net";
    let lin = document.getElementById("linje").value || "Linje";
    let mas = document.getElementById("mast").value || "Mast";
    let filnavn = `${net}_${lin}_${mas}_${navn}`;
    
    navigator.clipboard.writeText(filnavn);
    bilderTatt[id] = true; // Marker som tatt
    alert("Filnavn kopiert:\n" + filnavn + "\n\nLim inn i OneDrive når du tar bildet.");
    render();
}

function hentGPS(){
    navigator.geolocation.getCurrentPosition(p => {
        document.getElementById("gps").value = p.coords.latitude.toFixed(6) + ", " + p.coords.longitude.toFixed(6);
    });
}

function lagre(){
    let netteier = document.getElementById("netteier").value;
    let linje = document.getElementById("linje").value;
    let mast = document.getElementById("mast").value;
    let gps = document.getElementById("gps").value;

    punkter.forEach((p, i) => {
        if (status[i] == "vis") {
            let data = JSON.parse(localStorage.getItem("linjedata")) || [];
            data.push({ netteier, linje, mast, gps, avvik: p.navn, kommentar: document.getElementById("m"+i)?.value || "" });
            localStorage.setItem("linjedata", JSON.stringify(data));
        }
    });
    alert("Lagret!");
}

function lastNed(){
    let data = JSON.parse(localStorage.getItem("linjedata")) || [];
    let csv = "Netteier,Linje,Mast,GPS,Avvik,Kommentar\n";
    data.forEach(d => { csv += `${d.netteier},${d.linje},${d.mast},"${d.gps}","${d.avvik}","${d.kommentar}"\n`; });
    let a = document.createElement("a");
    a.href = "data:text/csv;charset=utf-8," + encodeURI(csv);
    a.download = "kontroll_data.csv";
    a.click();
}

render();
</script>
</body>
</html>
