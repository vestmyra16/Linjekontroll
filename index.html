<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Linjekontroll</title>

<!-- APP ICON -->
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" href="icon.png">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Linjekontroll">

<style>
body { font-family: Arial; margin: 10px; background:#f4f4f4; }
input { width:100%; padding:10px; margin:5px 0; border-radius:8px; border:1px solid #ccc;}
button { width:100%; padding:14px; margin:5px 0; border-radius:10px; border:none; font-size:16px; }
.btn { background:#ddd; }
.active { background:#ff6b6b; color:white; }
.green { background:#2e7d32; color:white; }
.box { background:white; padding:10px; border-radius:10px; margin-bottom:10px; }
.hidden { display:none; }
.small { font-size:12px; color:#555; }
</style>
</head>

<body>

<div class="box">
<h2>Linjekontroll</h2>

<input id="netteier" placeholder="Netteier">
<input id="linje" placeholder="LinjeID">
<input id="mast" type="number" placeholder="Mast nr">

<div id="gps" class="small">GPS henter...</div>

<button class="green" onclick="mastOK()">Ingen synlige avvik – Mast OK</button>
</div>

<h3>Registrer avvik</h3>
<div id="categories"></div>

<button onclick="nextMast()">Neste mast</button>
<button onclick="exportExcel()">Last ned Excel</button>

<script>

let data = [];
let gps = {lat:"", lon:""};

// ⚠️ HER legger vi inn dine Excel-avvik 1:1
const avvikData = {
"Skjev mast": ["Skjev", "Setning", "Fundamentfeil"],
"Barduner": ["Slakk", "Brudd", "Rust"],
"Stolper": ["Råte", "Sprekk"],
"Stålmast": ["Korrosjon", "Skade"],
"Topphette": ["Mangler", "Skadet"],
"Travers": ["Skjev", "Skadet"],
"Isolator": ["Knust", "Sprekk", "Forurensning"],
"Liner": ["Slitasje", "Bruddtråd"],
"Jordinger": ["Brudd", "Korrosjon"],
"Trasé": ["Vegetasjon", "Hindring"],
"Merking": ["Manglende", "Utydelig"]
};

const container = document.getElementById("categories");

Object.keys(avvikData).forEach(cat => {

let div = document.createElement("div");

let btn = document.createElement("button");
btn.innerText = cat;
btn.className = "btn";

let options = document.createElement("div");
options.className = "hidden";

avvikData[cat].forEach(a => {
let o = document.createElement("button");
o.innerText = a;
o.onclick = () => addAvvik(cat, a, options);
options.appendChild(o);
});

btn.onclick = () => {
options.classList.toggle("hidden");
};

div.appendChild(btn);
div.appendChild(options);

container.appendChild(div);

});

function addAvvik(cat, type, parent){

let note = prompt("Merknad (valgfritt):") || "";

let entry = {
netteier: val("netteier"),
linje: val("linje"),
mast: val("mast"),
kategori: cat,
type: type,
merknad: note,
lat: gps.lat,
lon: gps.lon,
tid: new Date().toLocaleString()
};

data.push(entry);

parent.previousSibling.classList.add("active");
}

function mastOK(){
data.push({
netteier: val("netteier"),
linje: val("linje"),
mast: val("mast"),
kategori: "OK",
type: "",
merknad: "",
lat: gps.lat,
lon: gps.lon,
tid: new Date().toLocaleString()
});
nextMast();
}

function nextMast(){
document.getElementById("mast").value =
parseInt(val("mast") || 0) + 1;

document.querySelectorAll(".btn").forEach(b=>b.classList.remove("active"));
}

function exportExcel(){

let csv = "Netteier,Linje,Mast,Kategori,Type,Merknad,Lat,Lon,Tid\n";

data.forEach(d=>{
csv += `${d.netteier},${d.linje},${d.mast},${d.kategori},${d.type},${d.merknad},${d.lat},${d.lon},${d.tid}\n`;
});

let blob = new Blob([csv], {type:"application/vnd.ms-excel"});
let a = document.createElement("a");
a.href = URL.createObjectURL(blob);
a.download = "Linjekontroll.xls";
a.click();
}

function val(id){ return document.getElementById(id).value; }

// GPS
navigator.geolocation.watchPosition(pos=>{
gps.lat = pos.coords.latitude.toFixed(6);
gps.lon = pos.coords.longitude.toFixed(6);

document.getElementById("gps").innerText =
"GPS: " + gps.lat + ", " + gps.lon;

});

</script>

</body>
</html>
