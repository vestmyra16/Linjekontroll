<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linjekontroll</title>

<link rel="icon" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">

<style>
body{font-family:Arial;background:#f2f2f2;padding:10px}
.section{background:#fff;padding:12px;margin-top:15px;border-radius:8px}
label{font-weight:bold;display:block;margin-top:10px}
input{width:100%;padding:10px;border:2px solid #999;border-radius:6px}
button{width:100%;padding:14px;margin-top:10px;background:#2e7d32;color:#fff;border:none;border-radius:8px}
.btn-red{background:#c62828}
.hidden{display:none}
</style>
</head>

<body>

<h2>Linjekontroll v2.30</h2>

<div class="section">
<label>Netteier</label><input id="netteier">
<label>LinjeID</label><input id="linje">
<label>Mast nr</label><input id="mast">
<div id="gps">GPS: henter...</div>
</div>

<div class="section" id="punkter"></div>

<button onclick="nesteMast()">➡️ Neste mast</button>
<button onclick="lagreMast()">💾 Lagre mast</button>
<button onclick="lastNed()">📥 Last ned Excel</button>
<button onclick="nyKontroll()">🆕 Ny kontroll</button>

<script>
let data = [];
let valgt = {};

const punkter = {
"Skjev mast":["Skjev","Setning","Fund.feil"],
"Barduner":["Slakk","Brudd","Rust"],
"Stolper":["Råte","Sprekk"],
"Stålmast":["Korrosjon","Skade"],
"Topphette":["Mangler","Skadet"],
"Traversfeste":["Løs","Skade"],
"Travers":["Skade"],
"Isolatorfeste":["Skade"],
"Isolator":["Knust","Krypestrømsvei"],
"Bendsling":["Løs","Brudd"],
"Liner":["Korrosjon","Kordelbrudd"],
"Strekking":["Skjev"],
"Skjøter/Klemmer":["Korrodert"],
"Toppline":["Slakk","Korrosjon"],
"Jordinger":["Løs","Brudd"],
"Trasé":["Skog","Kratt"],
"Merking":["HS mangler/defekt","Mnr mangler/defekt"]
};

function byggUI(){
let html="";
for(let p in punkter){
html+=`<button onclick="toggle('${p}')">${p}</button>`;
html+=`<div id="${p}" class="hidden">`;
punkter[p].forEach(a=>{
html+=`<button onclick="velg('${p}','${a}',this)">${a}</button>`;
});
html+=`
<label>📸</label>
<input type="file" accept="image/*" capture="environment" multiple>
<label>📝</label>
<input id="m_${p}">
`;
html+=`</div>`;
}
document.getElementById("punkter").innerHTML=html;
}

function toggle(p){
let el=document.getElementById(p);
el.classList.toggle("hidden");
}

function velg(p,a,btn){
valgt[p]=a;
btn.classList.toggle("btn-red");
}

function lagreMast(){
if(!mast.value) return alert("Mastnr mangler");

for(let p in valgt){
data.push({
netteier:netteier.value,
linje:linje.value,
mast:mast.value,
punkt:p,
avvik:valgt[p],
merknad:document.getElementById("m_"+p).value
});
}
valgt={};
}

function nesteMast(){
lagreMast();
mast.value="";
}

function lastNed(){
let csv="Netteier,Linje,Mast,Kontrollpunkt,Avvik,Merknad\n";
data.forEach(r=>{
csv+=`${r.netteier},${r.linje},${r.mast},${r.punkt},${r.avvik},${r.merknad}\n`;
});
let a=document.createElement("a");
a.href=URL.createObjectURL(new Blob([csv]));
a.download="linjekontroll.csv";
a.click();
}

function nyKontroll(){
let n=netteier.value,l=linje.value;
document.querySelectorAll("input").forEach(i=>i.value="");
netteier.value=n; linje.value=l;
data=[];
}

navigator.geolocation.getCurrentPosition(p=>{
gps.innerText=`GPS: ${p.coords.latitude.toFixed(5)}, ${p.coords.longitude.toFixed(5)}`
});

byggUI();
</script>

</body>
</html>
