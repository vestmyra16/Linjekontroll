<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" sizes="180x180" href="./icon-180.png">

<title>Linjekontroll v20</title>

<style>
body {font-family: Arial; background:#f4f4f4;}
.container {max-width:600px; margin:auto; padding:12px;}

label {font-weight:bold; display:block; margin-top:10px;}
input {width:100%; padding:10px; margin-top:5px;}

.kontroll {
  background:#2e7d32;
  color:white;
  padding:14px;
  margin-top:10px;
  border:none;
  width:100%;
  border-radius:8px;
  font-size:16px;
}

.avvik {
  background:#ddd;
  padding:10px;
  margin-top:5px;
  border:none;
  width:100%;
  border-radius:6px;
}

.rod {background:#c62828 !important; color:white;}
.hidden {display:none;}

.kamera {
  background:#2e7d32;
  color:white;
  padding:10px;
  margin-top:5px;
  border:none;
  width:100%;
}

.bunn {
  background:#1b5e20;
  color:white;
  padding:14px;
  margin-top:12px;
  border:none;
  width:100%;
}
</style>
</head>

<body>
<div class="container">

<h2>Linjekontroll v20</h2>

<label>Netteier</label>
<input>

<label>LinjeID</label>
<input>

<label>Mast nr</label>
<input>

<label>GPS</label>
<input id="gps">
<button class="kontroll" onclick="gps()">Slå på GPS</button>

<button class="kontroll" onclick="toggle('mastok', this)">Mast OK</button>

<!-- FUNDAMENT -->
<button class="kontroll" onclick="vis('f')">Skjev mast/fundament</button>
<div id="f" class="hidden">
  <button class="avvik" onclick="velg('f',this)">Skjev</button>
  <button class="avvik" onclick="velg('f',this)">Setning</button>
  <button class="avvik" onclick="velg('f',this)">Fundamentfeil</button>
  <button class="kamera">📷 Ta bilde</button>
</div>

<!-- BARDUN -->
<button class="kontroll" onclick="vis('b')">Barduner</button>
<div id="b" class="hidden">
  <button class="avvik" onclick="velg('b',this)">Slakk</button>
  <button class="avvik" onclick="velg('b',this)">Rust</button>
  <button class="avvik" onclick="velg('b',this)">Brudd</button>
  <button class="kamera">📷 Ta bilde</button>
</div>

<!-- ISOLATOR -->
<button class="kontroll" onclick="vis('i')">Isolator</button>
<div id="i" class="hidden">
  <button class="avvik" onclick="velg('i',this)">Knust</button>
  <button class="avvik" onclick="velg('i',this)">Krypestrøm</button>
  <button class="kamera">📷 Ta bilde</button>
</div>

<button class="bunn">Lagre mast</button>
<button class="bunn">Last ned Excel</button>
<button class="bunn" onclick="resetAll()">Ny mast</button>

</div>

<script>

/* GPS */
function gps(){
 navigator.geolocation.getCurrentPosition(p=>{
  document.getElementById("gps").value =
  p.coords.latitude.toFixed(6)+","+p.coords.longitude.toFixed(6);
 });
}

/* Åpne/lukke */
function vis(id){
 let el=document.getElementById(id);
 el.classList.toggle("hidden");
}

/* Velg avvik */
function velg(id,btn){
 let parent=document.getElementById(id);
 parent.previousElementSibling.classList.add("rod");
}

/* Toggle Mast OK */
function toggle(id,btn){
 btn.classList.toggle("rod");
}

/* Reset */
function resetAll(){
 document.querySelectorAll(".rod").forEach(e=>e.classList.remove("rod"));
 document.querySelectorAll(".hidden").forEach(e=>e.style.display="none");
 document.querySelectorAll("input").forEach(e=>e.value="");
}

</script>

</body>
</html>
