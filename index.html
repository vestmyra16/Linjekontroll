<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linjekontroll v1.5</title>

<style>
body {
font-family: Arial;
margin:0;
background:#f2f2f2;
}

.header {
background:white;
padding:10px;
position:sticky;
top:0;
z-index:10;
}

h2 {
margin:5px 0;
}

label {
display:block;
font-weight:bold;
color:black;
margin-top:6px;
}

input {
width:100%;
padding:8px;
margin:2px 0 6px 0;
font-size:14px;
color:black;
background:white;
border:1px solid #999;
border-radius:6px;
}

#gps {
font-size:12px;
color:black;
margin-bottom:5px;
}

button {
width:100%;
padding:14px;
margin:4px 0;
border:none;
border-radius:6px;
font-size:16px;
}

.cat {
background:#2e7d32;
color:white;
font-weight:bold;
}

.option {
background:#e0e0e0;
color:black;
}

.bottom {
background:#ccc;
}

</style>
</head>

<body>

<div class="header">

<h2>Linjekontroll v1.5</h2>

<label>Netteier</label>
<input id="netteier">

<label>LinjeID</label>
<input id="linje">

<label>Mast nr</label>
<input id="mast" type="number">

<div id="gps">GPS henter...</div>

<button class="cat" onclick="mastOK()">Mast OK</button>

</div>

<div id="app"></div>

<div style="padding:10px;">
<button class="bottom" onclick="next()">Neste mast</button>
<button class="bottom" onclick="excel()">Last ned Excel</button>
</div>

<script>

let current = null;

// AVVIK PER KONTROLLPUNKT (riktig struktur)
const data = {

"Skjev mast": ["Skjev", "Setning", "Fund.feil"],

"Barduner": ["Slakk", "Brudd", "Rust"],

"Stolper": ["Råte", "Sprekk"],

"Stålmast": ["Korrosjon", "Skade"],

"Topphette": ["Mangler", "Skadet"],

"Traversfeste": ["Løs", "Skade"],

"Travers": ["Skjev", "Skade"],

"Isolatorfeste": ["Slitasje", "Skade"],

"Isolator": ["Knust", "Sprekk"],

"Bendsling": ["Slakk", "Feil"],

"Liner": ["Korrosjon", "Kordelbrudd"],

"Strekning": ["Lav høyde", "Hinder"],

"Skjøter/klemmer": ["Korrosjon", "Kordelbrudd"],

"Toppline": ["Slakk", "Korrosjon"],

"Jordinger": ["Brudd", "Rust"],

"Trasé": ["Skog", "Kratt"],

"Merking": ["Manglende", "Uleselig"]

};

// START
function init(){
let html = "";

for (let key in data){
html += `<button class="cat" onclick="openCat('${key}')">${key}</button>`;
}

document.getElementById("app").innerHTML = html;
}

function openCat(name){
current = name;

let html = `<button class="cat">${name}</button>`;

data[name].forEach(avvik => {
html += `<button class="option" onclick="select('${avvik}')">${avvik}</button>`;
});

html += `<button class="bottom" onclick="init()">Tilbake</button>`;

document.getElementById("app").innerHTML = html;
}

function select(avvik){
console.log(current + ": " + avvik);
init();
}

function mastOK(){
console.log("Mast OK");
}

function next(){
document.getElementById("mast").value="";
}

function excel(){
alert("Excel kommer senere");
}

// GPS
navigator.geolocation.getCurrentPosition(pos=>{
document.getElementById("gps").innerHTML =
"GPS: " + pos.coords.latitude.toFixed(6) + ", " +
pos.coords.longitude.toFixed(6);
});

// START
init();

</script>

</body>
</html>
