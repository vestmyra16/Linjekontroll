<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Linjekontroll</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">

<script>
const VERSION = "1.14";
</script>

<style>
body {
  font-family: Arial, sans-serif;
  margin:0;
  background:#f2f2f2;
}

.container {
  padding:10px;
}

h1 {
  font-size:20px;
  margin-bottom:10px;
}

label {
  font-weight:bold;
  color:#000;
}

input, textarea {
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:6px;
  border:1px solid #ccc;
  font-size:16px;
}

.knapp {
  background:#2e7d32;
  color:#fff;
  padding:14px;
  border:none;
  border-radius:8px;
  margin-bottom:8px;
  width:100%;
  font-size:16px;
}

.knapp:active {
  background:#1b5e20;
}

.valg {
  background:#ddd;
  padding:12px;
  border-radius:6px;
  margin-bottom:6px;
}

.seksjon {
  margin-bottom:15px;
}

.bilde-preview img {
  width:80px;
  margin:5px;
  border-radius:6px;
}

.mastOK {
  background:#66bb6a;
}
</style>
</head>

<body>

<div class="container">

<h1 id="tittel"></h1>

<label>Netteier</label>
<input id="netteier">

<label>LinjeID</label>
<input id="linje">

<label>Mast nr</label>
<input id="mast">

<p id="gps"></p>

<button class="knapp mastOK" onclick="mastOK()">Mast OK</button>

<div id="kontroller"></div>

<button class="knapp" onclick="neste()">Neste mast</button>
<button class="knapp" onclick="lastNed()">Last ned Excel</button>

</div>

<script>

// Versjon
document.getElementById("tittel").innerText = "Linjekontroll v" + VERSION;

// GPS
navigator.geolocation.getCurrentPosition(pos=>{
  document.getElementById("gps").innerText =
    "GPS: " + pos.coords.latitude.toFixed(6) + ", " + pos.coords.longitude.toFixed(6);
});

// Kontrollpunkter (OPPDATERT)
const data = [
  {navn:"Skjev mast", avvik:["Skjev","Setning","Fund.feil"]},
  {navn:"Barduner", avvik:["Slakk","Brudd","Rust"]},
  {navn:"Stolper", avvik:["Råte","Sprekk"]},
  {navn:"Stålmast", avvik:["Korrosjon","Skade"]},
  {navn:"Topphatte", avvik:["Mangler","Skadet"]},
  {navn:"Traversfeste", avvik:["Løs","Skade"]},
  {navn:"Travers", avvik:["Skjev","Skade"]},
  {navn:"Isolatorfeste", avvik:["Slitasje","Skade"]},
  {navn:"Isolator", avvik:["Knust","Krypestømsvei"]},
  {navn:"Bendsling", avvik:["Løs","Brudd"]},
  {navn:"Liner", avvik:["Korrosjon","Kordelbrudd"]},

  {navn:"Strekning", avvik:["Skjev"]},

  {navn:"Skjøter/klemmer", avvik:["Korrodert"]},
  {navn:"Toppline", avvik:["Slakk","Korrosjon"]},
  {navn:"Jordinger", avvik:["Løs","Brudd"]},
  {navn:"Trasé", avvik:["Skog","Kratt"]},
  {navn:"Merking", avvik:["Manglende","Feil"]}
];

const container = document.getElementById("kontroller");

// UI
data.forEach((punkt,i)=>{
  const div = document.createElement("div");
  div.className="seksjon";

  div.innerHTML = `
    <button class="knapp" onclick="toggle(${i})">${punkt.navn}</button>

    <div id="felt${i}" style="display:none">

      ${punkt.avvik.map(a=>`<div class="valg">${a}</div>`).join("")}

      <button class="knapp" onclick="taBilde(this)">📸 Ta bilde</button>

      <input type="file" accept="image/*" capture="environment" multiple style="display:none" onchange="lagreBilder(this)">

      <div class="bilde-preview"></div>

      <textarea placeholder="Merknad"></textarea>

    </div>
  `;
  container.appendChild(div);
});

// Åpne/lukke
function toggle(i){
  const el = document.getElementById("felt"+i);
  el.style.display = el.style.display==="none" ? "block" : "none";
}

// Kamera
function taBilde(btn){
  const input = btn.nextElementSibling;
  input.click();
}

// Lagre bilder
function lagreBilder(input){
  const preview = input.nextElementSibling;
  preview.innerHTML="";

  Array.from(input.files).forEach(f=>{
    const r = new FileReader();
    r.onload = e=>{
      const img=document.createElement("img");
      img.src=e.target.result;
      preview.appendChild(img);
    };
    r.readAsDataURL(f);
  });
}

// Mast OK
function mastOK(){
  alert("Mast registrert som OK");
}

// 🔥 KORRIGERT NESTE MAST
function neste(){

  // Tøm kun mastnr
  document.getElementById("mast").value = "";

  // Tøm merknader
  document.querySelectorAll("textarea").forEach(e=>e.value="");

  // Tøm bilder
  document.querySelectorAll(".bilde-preview").forEach(e=>e.innerHTML="");

  // IKKE rør Netteier og LinjeID
}

// Excel placeholder
function lastNed(){
  alert("Excel eksport kommer neste steg");
}

</script>

</body>
</html>
