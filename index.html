<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Linjekontroll v17</title>

<style>
body { font-family: Arial; background:#f4f4f4; margin:0; }
.container { max-width:600px; margin:auto; padding:12px; }

h2 { text-align:center; }

label { font-weight:bold; display:block; margin-top:10px; }

input, textarea {
    width:100%;
    padding:12px;
    margin-top:5px;
    font-size:16px;
}

button {
    width:100%;
    padding:16px;
    margin-top:10px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:#2e7d32;
    color:white;
}

.kontrollpunkt.rød { background:#c62828; }

.mastok { background:#2e7d32; }
.mastok.aktiv { background:#66bb6a; }

.detalj { display:none; margin-bottom:10px; }
</style>
</head>

<body>
<div class="container">

<h2>Linjekontroll v17</h2>

<label>Netteier</label>
<input id="netteier">

<label>LinjeID</label>
<input id="linje">

<label>Mast nr</label>
<input id="mastnr">

<label>GPS (Lat, Lon)</label>
<input id="gps" readonly>

<button onclick="startGPS()">Slå på GPS</button>
<button onclick="stopGPS()">Slå av GPS</button>

<button class="mastok" onclick="toggleMastOK(this)">Mast OK</button>

<!-- FUNKSJON FOR Å LAGE KONTROLLPUNKT -->
<script>
function punkt(navn, avvik){
    return `
    <button class="kontrollpunkt" onclick="togglePunkt(this)">${navn}</button>
    <div class="detalj">
        ${avvik.map(a=>`<button onclick="markerAvvik(this)">${a}</button>`).join("")}
        <button>📷 Ta bilde</button>
        <input type="file" accept="image/*">
        <textarea placeholder="Merknad"></textarea>
    </div>`;
}
</script>

<div id="punkter"></div>

<button onclick="nyMast()">Ny mast</button>

</div>

<script>

// LISTE
const allePunkt = [
["Skjev mast/fundament",["Skjev","Setning","Fundamentfeil"]],
["Barduner",["Rust","Slakk","Brudd"]],
["Stolper",["Råte","Sprekk"]],
["Stålmast",["Korrosjon","Skade"]],
["Topphette",["Manglende","Skadet"]],
["Traversfeste",["Løs","Skade"]],
["Travers",["Skjev","Skade"]],
["Isolatorfeste",["Løs","Korrosjon"]],
["Isolator",["Knust","Krypestrøm"]],
["Bendsling",["Løs","Brudd"]],
["Liner",["Kordelbrudd","Korrosjon"]],
["Strekking",["Skjev"]],
["Skjøter/klemmer",["Korrosjon","Brudd"]],
["Topp/jordline og beslag",["Skade","Løs"]],
["Jordinger",["Brudd","Løs"]],
["Trasé",["Skog","Kratt"]],
["Merking",["Mangler","Defekt"]]
];

// RENDER
let html="";
allePunkt.forEach(p=>{
    html += punkt(p[0],p[1]);
});
document.getElementById("punkter").innerHTML = html;

// GPS
let gpsWatch=null;

function startGPS(){
    gpsWatch = navigator.geolocation.watchPosition(pos=>{
        let lat = pos.coords.latitude.toFixed(6);
        let lon = pos.coords.longitude.toFixed(6);
        document.getElementById("gps").value = lat + ", " + lon;
    });
}

function stopGPS(){
    if(gpsWatch) navigator.geolocation.clearWatch(gpsWatch);
}

// UI
function togglePunkt(btn){
    let d = btn.nextElementSibling;
    d.style.display = d.style.display==="block" ? "none":"block";
}

function markerAvvik(btn){
    let k = btn.closest(".detalj").previousElementSibling;
    k.classList.add("rød");
}

function toggleMastOK(btn){
    btn.classList.toggle("aktiv");
}

// RESET
function nyMast(){

    if(!confirm("Er du sikker på ny mast?")) return;

    let netteier = netteierEl.value;
    let linje = linjeEl.value;
    let gps = gpsEl.value;

    document.querySelectorAll("input, textarea").forEach(e=>e.value="");

    netteierEl.value = netteier;
    linjeEl.value = linje;
    gpsEl.value = gps;

    document.querySelectorAll(".kontrollpunkt").forEach(b=>b.classList.remove("rød"));
    document.querySelectorAll(".detalj").forEach(d=>d.style.display="none");
    document.querySelectorAll(".mastok").forEach(b=>b.classList.remove("aktiv"));

}

const netteierEl = document.getElementById("netteier");
const linjeEl = document.getElementById("linje");
const gpsEl = document.getElementById("gps");

</script>

</body>
</html>
