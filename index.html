<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linjekontroll v2.23</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {font-family:Arial; max-width:700px; margin:auto; padding:10px;}

input, textarea {
  width:100%;
  padding:10px;
  margin-top:5px;
}

button {
  width:100%;
  padding:12px;
  margin-top:5px;
  border:none;
  color:white;
  font-size:16px;
}

.kp {background:#2e7d32; text-align:left;}
.kp.red {background:red;}

.avvikBtn {
  background:#ddd;
  color:black;
  text-align:left;
}
.avvikBtn.red {
  background:red;
  color:white;
}

.mastok {
  background:#4CAF50;
  font-weight:bold;
}

.section {
  border-bottom:1px solid #ccc;
  margin-bottom:10px;
  padding-bottom:10px;
}
</style>
</head>

<body>

<h2>Linjekontroll v2.23</h2>

<label>Netteier</label>
<input id="netteier">

<label>LinjeID</label>
<input id="linje">

<label>Mast nr</label>
<input id="mast">

<div id="gps"></div>

<button class="mastok" onclick="mastOK()">Ingen synlige avvik - Mast OK</button>

<div id="kontrollListe"></div>

<button onclick="lagre()">Lagre</button>
<button onclick="lastExcel()">Last ned Excel</button>

<script>

let data = [];
let currentMastOK = false;

const kontrollpunkter = [
  {navn:"Skjev mast/fundament", avvik:["Skjev","Setning","Fundament feil"]},
  {navn:"Barduner", avvik:["Slakk","Brudd","Rust"]},
  {navn:"Stolper", avvik:["Råte","Sprekk"]},
  {navn:"Stålmast", avvik:["Korrosjon","Skade"]},
  {navn:"Topphette", avvik:["Mangler","Skade"]},
  {navn:"Traversfeste", avvik:["Løs","Skade"]},
  {navn:"Travers", avvik:["Skjev","Skade"]},
  {navn:"Isolatorfeste", avvik:["Løs","Skade"]},
  {navn:"Isolator", avvik:["Knust","Krypestrøm"]},
  {navn:"Bendsling, heng, avspenning", avvik:["Løs","Brudd"]},
  {navn:"Liner", avvik:["Kordelbrudd","Korrosjon"]},
  {navn:"Strekking", avvik:["Skjev"]},
  {navn:"Skjøter/klemmer", avvik:["Korrosjon","Brudd"]},
  {navn:"Topp/jordline og beslag", avvik:["Slakk","Skade"]},
  {navn:"Jordinger", avvik:["Løs","Brudd"]},
  {navn:"Trasé", avvik:["Skog","Kratt"]},
  {navn:"Merking", avvik:["Mangler","Defekt"]}
];

function byggListe(){
  let container = document.getElementById("kontrollListe");
  container.innerHTML = "";

  kontrollpunkter.forEach((kp,i)=>{

    let div = document.createElement("div");
    div.className = "section";

    div.innerHTML = `
      <button class="kp" id="kp_${i}">${kp.navn}</button>

      <div id="under_${i}">
        ${kp.avvik.map(a => `<button class="avvikBtn" onclick="velgAvvik(this,${i},'${a}')">${a}</button>`).join("")}

        <button onclick="taBilde()">📷 Ta bilde</button>
        <textarea placeholder="Merknad"></textarea>
      </div>
    `;

    container.appendChild(div);
  });
}

function velgAvvik(btn,i,avvik){
  currentMastOK = false;

  btn.classList.add("red");
  document.getElementById("kp_"+i).classList.add("red");

  data.push({
    netteier: netteier.value,
    linje: linje.value,
    mast: mast.value,
    kontrollpunkt: kontrollpunkter[i].navn,
    avvik: avvik
  });
}

function mastOK(){
  currentMastOK = true;

  data.push({
    netteier: netteier.value,
    linje: linje.value,
    mast: mast.value,
    kontrollpunkt: "Mast OK",
    avvik: "Ingen"
  });
}

function lagre(){
  alert("Lagret");
}

function lastExcel(){
  let ws = XLSX.utils.json_to_sheet(data);
  let wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Kontroll");

  XLSX.writeFile(wb, linje.value + "_" + mast.value + ".xlsx");
}

function taBilde(){
  alert("Bruk mobilkamera direkte (lagres med mastnr)");
}

navigator.geolocation.getCurrentPosition(pos=>{
  document.getElementById("gps").innerHTML =
    "GPS: " + pos.coords.latitude.toFixed(5) + ", " + pos.coords.longitude.toFixed(5);
});

byggListe();

</script>

</body>
</html>
