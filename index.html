<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">

<title>Linjekontroll v22</title>

<style>
body {
 font-family: Arial;
 background:#f4f4f4;
 margin:0;
}

.container {
 max-width:600px;
 margin:auto;
 padding:12px;
}

h2 { text-align:center; }

/* INPUT */
label { font-weight:bold; display:block; margin-top:10px; }
input, textarea {
 width:100%;
 padding:12px;
 margin-top:5px;
 font-size:16px;
}

/* KNAPPER */
button {
 width:100%;
 padding:16px;
 margin-top:10px;
 border:none;
 border-radius:10px;
 font-size:16px;
}

/* Kontrollpunkt */
.kontroll {
 background:#2e7d32;
 color:white;
}

/* Avvik */
.avvik {
 background:#ccc;
}

/* Aktiv */
.aktiv {
 background:#c62828 !important;
 color:white;
}

/* Skjult */
.hidden {
 display:none;
}
</style>
</head>

<body>

<div class="container">

<h2>Linjekontroll v22</h2>

<label>Netteier</label>
<input id="netteier">

<label>LinjeID</label>
<input id="linje">

<label>Mast nr</label>
<input id="mast">

<label>GPS</label>
<input id="gps">

<button class="kontroll" onclick="startGPS()">Slå på GPS</button>

<!-- MAST OK -->
<button id="mastok" class="kontroll" onclick="toggleAktiv('mastok')">Mast OK</button>

<!-- SKEIV -->
<button class="kontroll" onclick="toggle('skjev')">Skjev mast/fundament</button>
<div id="skjev" class="hidden">
    <button class="avvik" onclick="velg(this)">Skjev</button>
    <textarea placeholder="Merknad"></textarea>
</div>

<!-- BARDUN -->
<button class="kontroll" onclick="toggle('bardun')">Barduner</button>
<div id="bardun" class="hidden">
    <button class="avvik" onclick="velg(this)">Løs</button>
    <button class="avvik" onclick="velg(this)">Brudd</button>
    <textarea placeholder="Merknad"></textarea>
</div>

<!-- ISOLATOR -->
<button class="kontroll" onclick="toggle('isolator')">Isolator</button>
<div id="isolator" class="hidden">
    <button class="avvik" onclick="velg(this)">Knust</button>
    <button class="avvik" onclick="velg(this)">Krypestrøm</button>
    <textarea placeholder="Merknad"></textarea>
</div>

<!-- LAGRE -->
<button class="kontroll" onclick="lagre()">Lagre mast</button>

<button class="kontroll" onclick="excel()">Last ned Excel</button>

<button class="kontroll" onclick="nyMast()">Ny mast</button>

</div>

<script>

/* GPS */
function startGPS(){
 navigator.geolocation.getCurrentPosition(p=>{
  document.getElementById("gps").value =
  p.coords.latitude.toFixed(6)+","+p.coords.longitude.toFixed(6);
 });
}

/* Åpne/lukke */
function toggle(id){
 let el=document.getElementById(id);
 el.classList.toggle("hidden");
}

/* Velg avvik */
function velg(btn){
 btn.classList.toggle("aktiv");
}

/* Toggle grønn/rød */
function toggleAktiv(id){
 document.getElementById(id).classList.toggle("aktiv");
}

/* Lagre */
function lagre(){
 alert("Mast lagret");
}

/* Excel */
function excel(){
 alert("Excel eksport kommer");
}

/* Ny mast */
function nyMast(){

 // fjern aktive
 document.querySelectorAll(".aktiv").forEach(e=>e.classList.remove("aktiv"));

 // skjul alle
 document.querySelectorAll(".hidden").forEach(e=>e.classList.add("hidden"));

 // nullstill felt
 document.getElementById("mast").value="";
 document.getElementById("gps").value="";
 document.querySelectorAll("textarea").forEach(e=>e.value="");

}

</script>

</body>
</html>
