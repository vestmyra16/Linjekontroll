<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Linjekontroll v2.23</title>

<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {
  font-family: Arial;
  max-width: 700px;
  margin: auto;
  padding: 10px;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
}

/* Kontrollpunkt */
.kp {
  background: #2e7d32;
  color: white;
  text-align: left;
  padding: 14px;
  margin-top: 6px;
  border: none;
  font-size: 16px;
}

/* Kontrollpunkt brukt */
.kp.red {
  background: red;
}

/* Avvik */
.avvikBtn {
  background: #e0e0e0;
  color: black;
  text-align: left;
  padding: 12px;
  margin-top: 3px;
  border: none;
}

/* Mast OK */
.mastok {
  background: #4CAF50;
  color: white;
  font-weight: bold;
  padding: 14px;
  margin-top: 10px;
}

.section {
  margin-bottom: 10px;
}
</style>
</head>

<body>

<h2>Linjekontroll v2.23</h2>

<label>Netteier</label>
<input id="netteier">

<label>LinjeID</label>
<input id="linje">

<label>Mast nr</label>
<input id="mast">

<div id="gps"></div>

<button class="mastok" onclick="mastOK()">Ingen synlige avvik - Mast OK</button>

<div id="kontrollListe"></div>

<button onclick="lagre()">Lagre</button>
<button onclick="lastExcel()">Last ned Excel</button>

<script>

let data = [];
let mastOKvalgt = false;

const kontrollpunkter = [
  {navn:"Skjev mast/fundament", avvik:["Skjev","Setning","Fundament feil"]},
  {navn:"Barduner", avvik:["Slakk","Brudd","Rust"]},
  {navn:"Stolper", avvik:["Råte","Sprekk"]},
  {navn:"Stålmast", avvik:["Korrosjon","Skade"]},
  {navn:"Topphette", avvik:["Mangler","Skade"]},
  {navn:"Traversfeste", avvik:["Løs","Skade"]},
  {navn:"Travers", avvik:["Skjev","Skade"]},
  {navn:"Isolatorfeste", avvik:["Løs","Skade"]},
  {navn:"Isolator", avvik:["Knust","Krypestrøm"]},
  {navn:"Bendsling, heng, avspenning", avvik:["Løs","Brudd"]},
  {navn:"Liner", avvik:["Kordelbrudd","Korrosjon"]},
  {navn:"Strekking", avvik:["Skjev"]},
  {navn:"Skjøter/klemmer", avvik:["Korrosjon","Brudd"]},
  {navn:"Topp/jordline og beslag", avvik:["Slakk","Skade"]},
  {navn:"Jordinger", avvik:["Løs","Brudd"]},
  {navn:"Trasé", avvik:["Skog","Kratt"]},
  {navn:"Merking", avvik:["Mangler","Defekt"]}
];

function byggListe(){

  let container = document.getElementById("kontrollListe");
  container.innerHTML = "";

  kontrollpunkter.forEach((kp,i)=>{

    let div = document.createElement("div");
    div.className = "section";

    div.innerHTML = `
      <button class="kp" id="kp_${i}" onclick="toggle(${i})">${kp.navn}</button>

      <div id="under_${i}" style="display:none">

        ${kp.avvik.map(a =>
          `<button class="avvikBtn" onclick="registrer(${i}, '${a}')">${a}</button>`
        ).join("")}

        <button onclick="taBilde()">📷 Ta bilde</button>
        <textarea placeholder="Merknad"></textarea>

      </div>
    `;

    container.appendChild(div);
  });
}

function toggle(i){
  let el = document.getElementById("under_" + i);
  el.style.display = el.style.display === "none" ? "block" : "none";
}

function registrer(i,avvik){

  mastOKvalgt = false;

  document.getElementById("kp_" + i).classList.add("red");

  data.push({
    netteier: netteier.value,
    linje: linje.value,
    mast: mast.value,
    kontrollpunkt: kontrollpunkter[i].navn,
    avvik: avvik
  });
}

function mastOK(){

  mastOKvalgt = true;
  data = []; // fjerner avvik

  data.push({
    netteier: netteier.value,
    linje: linje.value,
    mast: mast.value,
    kontrollpunkt: "Mast OK",
    avvik: "Ingen"
  });
}

function lagre(){
  alert("Lagret");
}

function lastExcel(){

  let exportData = mastOKvalgt ? data.filter(d => d.kontrollpunkt === "Mast OK") : data;

  let ws = XLSX.utils.json_to_sheet(exportData);
  let wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Kontroll");

  XLSX.writeFile(wb, linje.value + "_" + mast.value + ".xlsx");
}

function taBilde(){
  alert("Ta bilde med mobilkamera og lagre med mastnr");
}

navigator.geolocation.getCurrentPosition(pos=>{
  document.getElementById("gps").innerHTML =
    "GPS: " + pos.coords.latitude.toFixed(5) + ", " + pos.coords.longitude.toFixed(5);
});

byggListe();

</script>

</body>
</html>
