<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Linjekontroll</title>

<style>
body {
    font-family: Arial;
    margin: 10px;
    background:#f5f5f5;
}

/* FAST HEADER */
.header {
    position: sticky;
    top: 0;
    background: white;
    z-index: 1000;
}

/* TYDELIG SVART TEKST */
label {
    font-weight: bold;
    color: black;
}

input {
    width:100%;
    padding:8px;
    margin-bottom:6px;
    color:black;
}

/* KNAPPER */
.btn {
    background:#2e7d32;
    color:white;
    padding:12px;
    margin:4px 0;
    border-radius:6px;
    cursor:pointer;
}

.btn.active {
    background:#c62828;
}

/* AVVIK */
.sub {
    background:#e0e0e0;
    padding:10px;
    margin:2px 0;
    cursor:pointer;
}

/* KAMERA */
.camera {
    background:#1b5e20;
    color:white;
    padding:10px;
    text-align:center;
    border-radius:6px;
    margin-top:4px;
}
</style>
</head>

<body>

<div class="header">

<h3>Linjekontroll v1.60</h3>

<label>Netteier</label>
<input id="netteier">

<label>LinjeID</label>
<input id="linje">

<label>Mast nr</label>
<input id="mast">

<div id="gps"></div>

</div>

<div id="app"></div>

<div class="btn" onclick="nextMast()">Neste mast</div>
<div class="btn" onclick="downloadExcel()">Last ned Excel</div>

<script>

let allMasts = [];
let current = {};
let open = null;

const controls = [
["Mast OK", []],
["Skjev mast", ["Skjev","Setning","Fund.feil"]],
["Barduner", ["Slakk","Brudd","Rust"]],
["Stolper", ["Råte","Sprekk"]],
["Stålmast", ["Korrosjon","Skade"]],
["Topphette", ["Mangler","Skadet"]],
["Traversfeste", ["Løs","Skade"]],
["Travers", ["Skjev","Skade"]],
["Isolatorfeste", ["Slitasje","Skade"]],
["Isolator", ["Knust","Krypestrømsvei"]],
["Bendsling", ["Løs","Brudd"]],
["Liner", ["Korrosjon","Kordelbrudd"]],
["Strekking", ["Skjev"]],
["Skjøter/Klemmer", ["Korrodert"]],
["Toppline", ["Slakk","Korrosjon"]],
["Jordinger", ["Løs","Brudd"]],
["Trasé", ["Skog","Kratt"]],
["Merking", ["HS mangler/defekt","Mnr mangler/defekt"]]
];

function render(){

    let html="";

    controls.forEach((c,i)=>{

        let active = current[i] ? "active" : "";

        html += `<div class="btn ${active}" onclick="toggle(${i})">${c[0]}</div>`;

        if(open===i){

            c[1].forEach(s=>{
                html += `<div class="sub" onclick="setAvvik(${i},'${s}')">${s}</div>`;
            });

            html += `<div class="camera">📷 Ta bilde</div>`;

            html += `<textarea placeholder="Merknad" onchange="setNote(${i},this.value)"></textarea>`;
        }

    });

    app.innerHTML = html;
}

function toggle(i){
    open = open===i ? null : i;
    render();
}

function setAvvik(i,val){
    current[i] = current[i] || {};
    current[i].avvik = val;
    render();
}

function setNote(i,val){
    current[i] = current[i] || {};
    current[i].note = val;
}

/* LAGRER AUTOMATISK */
function nextMast(){

    allMasts.push({
        netteier: netteier.value,
        linje: linje.value,
        mast: mast.value,
        data: JSON.parse(JSON.stringify(current))
    });

    mast.value = "";
    current = {};
    open = null;

    render();
}

/* EXCEL */
function downloadExcel(){

    let csv = "Netteier,LinjeID,Mast,Kontrollpunkt,Avvik,Merknad\n";

    allMasts.forEach(m=>{
        controls.forEach((c,i)=>{

            let d = m.data[i] || {};

            let avvik = d.avvik || (c[0]=="Mast OK" ? "Ingen" : "");

            csv += `${m.netteier},${m.linje},${m.mast},${c[0]},${avvik},${d.note||""}\n`;

        });
    });

    let blob = new Blob([csv], {type:"text/csv"});
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "linjekontroll.csv";
    a.click();
}

/* GPS */
navigator.geolocation.getCurrentPosition(pos=>{
    gps.innerHTML =
    "GPS: " + pos.coords.latitude.toFixed(5) + ", " +
    pos.coords.longitude.toFixed(5);
});

render();

</script>

</body>
</html>
