<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linjekontroll</title>

<style>
body{
font-family:Arial;
max-width:420px;
margin:auto;
background:#f2f2f2;
padding:10px;
}

h2{text-align:center;}

label{
font-weight:bold;
display:block;
margin-top:8px;
}

input{
width:100%;
padding:12px;
margin:4px 0 8px 0;
border-radius:6px;
border:1px solid #ccc;
font-size:16px;
}

button{
width:100%;
padding:12px;
margin:6px 0;
border-radius:6px;
background:#2e7d32;
color:white;
border:none;
font-size:16px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
}

.hidden{display:none;}

.avvik{
background:#ccc;
color:#000;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
<h3>Linjekontroll</h3>

<label>Passord</label>
<input type="password" id="pass">

<button onclick="login()">Logg inn</button>
</div>

<div id="app" style="display:none;">

<h2>Linjekontroll</h2>

<h3>Grunnlagsdata</h3>

<label>Netteier</label>
<input id="netteier">

<label>LinjeID</label>
<input id="linje">

<label>Mastnr</label>
<input id="mast">

<button onclick="nyMast()">Ny mast</button>

<h3>Kontrollpunkt</h3>

<div class="grid">
<button onclick="velg('Isolator')">Isolator</button>
<button onclick="velg('Liner')">Liner</button>
<button onclick="velg('Klemmer')">Klemmer</button>
<button onclick="velg('Toppline')">Toppline</button>
<button onclick="velg('Trase')">Trase</button>
<button onclick="velg('Jording')">Jording</button>
</div>

<div id="valgBox" class="hidden">
<h3 id="tittel"></h3>

<div id="avvikBox"></div>

<label>Merknad</label>
<input id="merknad">

</div>

<button onclick="lagre()">Lagre</button>
<button onclick="lastCSV()">Last ned Excel</button>

</div>

<script>

// PASSORD
const PASSORD="Linje2026";

function login(){
let p=document.getElementById("pass").value;

if(p===PASSORD){
document.getElementById("loginBox").style.display="none";
document.getElementById("app").style.display="block";
}else{
alert("Feil passord");
}
}

// AVVIK LISTE
const avvikData={
Isolator:["Skadet","Slitt"],
Liner:["Korrosjon","Brudd"],
Klemmer:["Løs","Korrosjon"],
Toppline:["Slakk","Skadet"],
Trase:["Skog","Kratt"],
Jording:["Brudd","Løs"]
};

function velg(type){
valgBox.classList.remove("hidden");
tittel.innerText=type;

let box=document.getElementById("avvikBox");
box.innerHTML="";

avvikData[type].forEach(a=>{
box.innerHTML+=`<button class="avvik" onclick="velgAvvik('${a}')">${a}</button>`;
});
}

let valgtAvvik=[];

function velgAvvik(a){
valgtAvvik.push(a);
alert("Valgt: "+a);
}

// DATA
let data=[];

function lagre(){

data.push({
netteier:netteier.value,
linje:linje.value,
mast:mast.value,
avvik:valgtAvvik.join("|"),
merknad:merknad.value,
dato:new Date().toLocaleDateString("no-NO")
});

valgtAvvik=[];
merknad.value="";

alert("Lagret");
}

// CSV
function lastCSV(){
let csv=Object.keys(data[0]||{}).join(",")+"\n";
data.forEach(d=>{csv+=Object.values(d).join(",")+"\n";});

let a=document.createElement("a");
a.href=URL.createObjectURL(new Blob([csv]));
a.download="linjekontroll.csv";
a.click();
}

// NY MAST
function nyMast(){
let n=netteier.value;
let l=linje.value;

document.querySelectorAll("input").forEach(i=>i.value="");

netteier.value=n;
linje.value=l;

valgBox.classList.add("hidden");
valgtAvvik=[];
}

</script>

</body>
</html>
