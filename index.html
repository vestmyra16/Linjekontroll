<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Linjekontroll v23</title>

<style>
body { font-family:Arial; background:#f4f4f4; margin:0; }
.container { max-width:600px; margin:auto; padding:12px; }

h2 { text-align:center; }

label { font-weight:bold; display:block; margin-top:10px; }
input, textarea {
 width:100%;
 padding:12px;
 margin-top:5px;
 font-size:16px;
}

button {
 width:100%;
 padding:16px;
 margin-top:10px;
 border:none;
 border-radius:10px;
 font-size:16px;
}

.kontroll { background:#2e7d32; color:white; }
.avvik { background:#ccc; }
.aktiv { background:#c62828 !important; color:white; }

.hidden { display:none; }
</style>
</head>

<body>

<div class="container">

<h2>Linjekontroll v23</h2>

<label>Netteier</label>
<input id="netteier">

<label>LinjeID</label>
<input id="linje">

<label>Mast nr</label>
<input id="mast">

<label>GPS</label>
<input id="gps">

<button class="kontroll" id="gpsBtn">Slå på GPS</button>

<button id="mastok" class="kontroll">Mast OK</button>

<button class="kontroll" id="btnSkjev">Skjev mast/fundament</button>
<div id="skjev" class="hidden">
    <button class="avvik">Skjev</button>
    <textarea placeholder="Merknad"></textarea>
</div>

<button class="kontroll" id="btnBardun">Barduner</button>
<div id="bardun" class="hidden">
    <button class="avvik">Løs</button>
    <button class="avvik">Brudd</button>
    <textarea placeholder="Merknad"></textarea>
</div>

<button class="kontroll" id="btnIsolator">Isolator</button>
<div id="isolator" class="hidden">
    <button class="avvik">Knust</button>
    <button class="avvik">Krypestrøm</button>
    <textarea placeholder="Merknad"></textarea>
</div>

<button class="kontroll" id="lagre">Lagre mast</button>
<button class="kontroll" id="excel">Last ned Excel</button>
<button class="kontroll" id="ny">Ny mast</button>

</div>

<script>

/* GPS */
document.getElementById("gpsBtn").onclick = function(){
 navigator.geolocation.getCurrentPosition(p=>{
  document.getElementById("gps").value =
  p.coords.latitude.toFixed(6)+","+p.coords.longitude.toFixed(6);
 });
};

/* Mast OK toggle */
document.getElementById("mastok").onclick = function(){
 this.classList.toggle("aktiv");
};

/* Åpne/lukke */
document.getElementById("btnSkjev").onclick = function(){
 document.getElementById("skjev").classList.toggle("hidden");
};

document.getElementById("btnBardun").onclick = function(){
 document.getElementById("bardun").classList.toggle("hidden");
};

document.getElementById("btnIsolator").onclick = function(){
 document.getElementById("isolator").classList.toggle("hidden");
};

/* Avvik toggle */
document.querySelectorAll(".avvik").forEach(btn=>{
 btn.onclick = function(){
  this.classList.toggle("aktiv");
 };
});

/* Lagre */
document.getElementById("lagre").onclick = function(){
 alert("Lagret");
};

/* Excel */
document.getElementById("excel").onclick = function(){
 alert("Excel kommer");
};

/* Ny mast */
document.getElementById("ny").onclick = function(){

 document.querySelectorAll(".aktiv").forEach(e=>e.classList.remove("aktiv"));
 document.querySelectorAll(".hidden").forEach(e=>e.classList.add("hidden"));

 document.getElementById("mast").value="";
 document.getElementById("gps").value="";
 document.querySelectorAll("textarea").forEach(e=>e.value="");

};

</script>

</body>
</html>
