<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Linjekontroll</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">

<meta name="theme-color" content="#2e7d32">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
body {
    font-family: Arial;
    margin: 10px;
    background:#f5f5f5;
}

/* TOPP FELT */
.header {
    position: sticky;
    top:0;
    background:white;
    z-index:1000;
    padding-bottom:5px;
}

label {
    font-weight:bold;
    color:black;
    display:block;
}

input {
    width:100%;
    padding:8px;
    margin-bottom:6px;
    border:1px solid #ccc;
}

/* KNAPPER */
.btn {
    background:#2e7d32;
    color:white;
    padding:12px;
    margin:4px 0;
    text-align:center;
    border-radius:6px;
    cursor:pointer;
}

.btn.active {
    background:#66bb6a;
}

.btn.red {
    background:#c62828;
}

.sub {
    background:#e0e0e0;
    padding:10px;
    margin:2px 0;
    border-radius:4px;
    cursor:pointer;
}

/* BILDE */
.camera {
    background:#2e7d32;
    color:white;
    padding:10px;
    text-align:center;
    margin-top:5px;
    border-radius:5px;
}

textarea {
    width:100%;
    margin-top:5px;
}

/* BUNN */
.footer {
    margin-top:10px;
}
</style>
</head>

<body>

<div class="header">
<h3>Linjekontroll</h3>

<label>Netteier</label>
<input id="netteier" oninput="saveHeader()">

<label>LinjeID</label>
<input id="linje" oninput="saveHeader()">

<label>Mast nr</label>
<input id="mast">

<div id="gps"></div>
</div>

<div id="app"></div>

<div class="footer">
<div class="btn" onclick="nextMast()">Neste mast</div>
</div>

<script>
let data = {};

const controls = [
["Mast OK", []],
["Skjev mast", ["Skjev","Setning","Fund.feil"]],
["Barduner", ["Slakk","Brudd","Rust"]],
["Stolper", ["Råte","Sprekk"]],
["Stålmast", ["Korrosjon","Skade"]],
["Topphatte", ["Mangler","Skadet"]],
["Traversfeste", ["Løs","Skade"]],
["Travers", ["Skjev","Skade"]],
["Isolatorfeste", ["Slitasje","Skade"]],
["Isolator", ["Knust","Krypestrømsvei"]],
["Bendsling", ["Løs","Brudd"]],
["Liner", ["Korrosjon","Kordelbrudd"]],
["Strekking", ["Skjev"]],
["Skjøter/Klemmer", ["Korrodert"]],
["Toppline", ["Slakk","Korrosjon"]],
["Jordinger", ["Løs","Brudd"]],
["Trasé", ["Skog","Kratt"]],
["Merking", []]
];

function render() {
    let html="";
    controls.forEach((c,i)=>{
        html += `<div class="btn" onclick="selectMain(${i})">${c[0]}</div>`;

        if(c[1].length>0){
            c[1].forEach((s,j)=>{
                html += `<div class="sub" onclick="selectSub(${i},${j})">${s}</div>`;
            });
        }

        html += `
        <div class="camera">
            <input type="file" accept="image/*" capture="environment" onchange="takePhoto(event,${i})">
        </div>
        <textarea placeholder="Merknad" onchange="note(${i},this.value)"></textarea>
        `;
    });

    document.getElementById("app").innerHTML = html;
}

function selectMain(i){
    data[i] = {ok:true};
    updateColors();
}

function selectSub(i,j){
    data[i] = {avvik:j};
    updateColors();
}

function takePhoto(e,i){
    data[i] = data[i] || {};
    data[i].img = true;
    updateColors();
}

function note(i,val){
    data[i] = data[i] || {};
    data[i].note = val;
    updateColors();
}

function updateColors(){
    document.querySelectorAll(".btn").forEach((el,i)=>{
        if(data[i]){
            if(data[i].avvik!=undefined || data[i].note || data[i].img){
                el.classList.add("red");
                el.classList.remove("active");
            } else {
                el.classList.add("active");
                el.classList.remove("red");
            }
        }
    });
}

function nextMast(){
    document.getElementById("mast").value="";
    data = {};
    updateColors();
}

/* LAGRING */
function saveHeader(){
    localStorage.setItem("netteier",document.getElementById("netteier").value);
    localStorage.setItem("linje",document.getElementById("linje").value);
}

function loadHeader(){
    document.getElementById("netteier").value = localStorage.getItem("netteier")||"";
    document.getElementById("linje").value = localStorage.getItem("linje")||"";
}

loadHeader();
render();

/* GPS */
navigator.geolocation.getCurrentPosition(pos=>{
    document.getElementById("gps").innerHTML =
        "GPS: "+pos.coords.latitude.toFixed(5)+", "+pos.coords.longitude.toFixed(5);
});
</script>

</body>
</html>
